<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无限流RPG - 轮回试炼</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Microsoft YaHei','PingFang SC',sans-serif;
  background:#080812;
  color:#d0d0d0;
  min-height:100vh;
  display:flex;justify-content:center;align-items:center;
  overflow:hidden;
}
#game-container{
  width:960px;height:680px;
  background:linear-gradient(160deg,#0d0d1f 0%,#151530 40%,#1a1a38 70%,#111128 100%);
  border:2px solid #2a2a50;
  border-radius:14px;
  overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 0 60px rgba(80,60,180,0.25),inset 0 0 100px rgba(0,0,0,0.3);
  position:relative;
}
#top-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 20px;
  background:rgba(0,0,0,0.5);
  border-bottom:1px solid #2a2a50;
  font-size:13px;
  z-index:2;
}
.stat-item{margin:0 8px;color:#999;font-size:12px;}
.stat-item span{color:#ffcc00;font-weight:bold;}
.stat-item .hp-val{color:#ff5555;}
.stat-item .gold-val{color:#ffaa00;}
.stat-item .talent-val{color:#44ccff;}

#main-area{flex:1;display:flex;padding:12px;gap:12px;overflow:hidden;position:relative;}
#log-panel{
  flex:1;
  background:rgba(0,0,0,0.35);
  border:1px solid #252545;
  border-radius:8px;
  padding:10px;
  overflow-y:auto;
  font-size:13px;
  line-height:1.7;
  position:relative;
}
.log-entry{margin-bottom:3px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.03);animation:fadeIn 0.25s ease-out;}
.log-combat{color:#ff6666;}
.log-damage{color:#ff9944;}
.log-heal{color:#44ff55;}
.log-loot{color:#ffcc00;}
.log-info{color:#66ccff;}
.log-system{color:#cc88ff;}
.log-critical{color:#ff3333;font-weight:bold;font-size:15px;}
.log-event{color:#ff88cc;}
.log-achievement{color:#ffaa00;font-weight:bold;}
.log-warning{color:#ffaa44;}
.log-voltage{color:#ff8844;font-weight:bold;}

#action-panel{
  width:340px;
  display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;
  scroll-behavior:smooth;
}
#action-panel::after{content:'';display:block;height:50px;flex-shrink:0;}
#action-panel h2{
  font-size:17px;color:#cc88ff;text-align:center;
  padding:7px;background:rgba(100,60,200,0.15);
  border-radius:6px;border:1px solid #3a2a60;
}
.btn-group{display:flex;flex-wrap:wrap;gap:6px;}
.btn{
  padding:8px 14px;border:1px solid #3a3a60;border-radius:6px;
  background:rgba(25,25,55,0.85);color:#ccc;cursor:pointer;
  font-size:13px;font-family:inherit;transition:all 0.2s;
  white-space:nowrap;position:relative;overflow:hidden;
}
.btn:hover{background:rgba(55,55,110,0.85);border-color:#6666aa;color:#fff;transform:translateY(-1px);}
.btn:active{transform:scale(0.96);}
.btn-primary{background:rgba(80,40,150,0.6);border-color:#6644aa;color:#ddccff;}
.btn-primary:hover{background:rgba(100,55,190,0.6);}
.btn-danger{background:rgba(140,30,30,0.6);border-color:#aa3333;color:#ffaaaa;}
.btn-danger:hover{background:rgba(180,40,40,0.6);}
.btn-back{background:rgba(100,60,200,0.2);color:#aa88dd;border:1px solid #3a2a60;font-size:11px;padding:4px 12px;width:auto;margin-bottom:4px;}
.btn-back:hover{background:rgba(120,80,220,0.35);color:#ccbbff;}
.btn-success{background:rgba(30,120,40,0.6);border-color:#339944;color:#aaffaa;}
.btn-success:hover{background:rgba(40,150,50,0.6);}
.btn-warning{background:rgba(140,100,20,0.6);border-color:#aa8833;color:#ffddaa;}
.btn-warning:hover{background:rgba(180,130,30,0.6);}
.btn-info{background:rgba(30,80,140,0.6);border-color:#3366aa;color:#aaddff;}
.btn-info:hover{background:rgba(40,100,180,0.6);}
.btn:disabled{opacity:0.35;cursor:not-allowed;pointer-events:none;}

.enemy-card{
  background:rgba(80,20,20,0.25);
  border:1px solid #553333;border-radius:8px;
  padding:10px;text-align:center;
}
.enemy-card .name{font-size:16px;color:#ff6666;margin-bottom:3px;}
.enemy-card .elite-badge{color:#ffaa00;font-size:11px;}
.hp-bar-bg{height:14px;background:#221111;border-radius:7px;margin:5px 0;overflow:hidden;}
.hp-bar-fill{height:100%;border-radius:7px;transition:width 0.4s;}
.enemy-card .hp-bar-fill{background:linear-gradient(90deg,#cc2222,#ff4444);}
.player-card .hp-bar-fill{background:linear-gradient(90deg,#228833,#44cc55);}
.player-card{
  background:rgba(20,50,80,0.25);
  border:1px solid #335566;border-radius:8px;padding:10px;
}

.instance-card{
  background:rgba(20,20,50,0.55);border:1px solid #334466;
  border-radius:8px;padding:10px;cursor:pointer;transition:all 0.2s;
}
.instance-card:hover{background:rgba(40,40,100,0.55);border-color:#5566aa;transform:translateX(3px);}
.instance-card.locked{opacity:0.4;cursor:not-allowed;}
.instance-card .world-name{font-size:15px;font-weight:bold;color:#ccddff;}
.instance-card .world-desc{font-size:11px;color:#8899aa;margin-top:2px;}
.instance-card .world-diff{font-size:11px;color:#ff9944;margin-top:2px;}

.equip-slot{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;background:rgba(0,0,0,0.2);border-radius:5px;
  margin:2px 0;font-size:12px;
}
.equip-slot .slot-label{color:#888;}
.equip-slot .slot-empty{color:#555;font-style:italic;}

/* 天赋节点 */
.talent-node{
  display:inline-flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;margin:3px;
  border:2px solid #333;background:rgba(0,0,0,0.4);
  cursor:pointer;font-size:12px;transition:all 0.2s;
  position:relative;
}
.talent-node.learned{border-color:#ffaa00;background:rgba(100,60,20,0.5);box-shadow:0 0 8px rgba(255,170,0,0.3);}
.talent-node.available{border-color:#44cc44;animation:talentPulse 1.5s infinite;}
.talent-node:hover{transform:scale(1.1);}

@keyframes talentPulse{0%,100%{box-shadow:0 0 4px rgba(68,204,68,0.3)}50%{box-shadow:0 0 14px rgba(68,204,68,0.6)}}

/* 浮动伤害 */
.floating-text{
  position:fixed;pointer-events:none;font-weight:bold;
  font-size:22px;z-index:9999;animation:floatUp 1s ease-out forwards;
  text-shadow:0 0 6px rgba(0,0,0,0.8);
}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(1.3)}}

/* 屏幕震动 */
@keyframes shake{0%,100%{transform:translate(0)}10%{transform:translate(-4px,-2px)}30%{transform:translate(4px,2px)}50%{transform:translate(-3px,3px)}70%{transform:translate(3px,-1px)}90%{transform:translate(-1px,1px)}}
.shake{animation:shake 0.4s ease-in-out;}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333355;border-radius:3px}

@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatDmg{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:0.8;transform:translateY(-20px) scale(1.2)}100%{opacity:0;transform:translateY(-40px) scale(0.8)}}
.float-dmg{position:absolute;font-weight:bold;font-size:16px;pointer-events:none;z-index:100;animation:floatDmg 0.8s ease-out forwards;text-shadow:0 0 6px rgba(0,0,0,0.8);}
.float-dmg.dmg-crit{font-size:22px;color:#ff4444;}
.float-dmg.dmg-heal{font-size:15px;color:#44ff44;}
.float-dmg.dmg-normal{color:#ff9944;}
.fade-in{animation:fadeIn 0.3s ease-out}

/* 过场动画/剧情 */
.cinematic-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.92);
  z-index:20;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px;
}
.cinematic-text{
  color:#ccddff;font-size:16px;text-align:center;
  line-height:2;max-width:600px;
  animation:cinematicFadeIn 0.8s ease-out;
}
.cinematic-text .highlight{color:#ffcc00;font-weight:bold;}
.cinematic-text .red{color:#ff6666;}
.cinematic-text .purple{color:#cc88ff;}
.cinematic-text .cyan{color:#44ccff;}
.cinematic-text .green{color:#44ff88;}
@keyframes cinematicFadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.cinematic-skip{
  position:absolute;bottom:20px;right:20px;
  color:#666;font-size:11px;cursor:pointer;
  background:rgba(0,0,0,0.5);padding:5px 12px;
  border-radius:4px;border:1px solid #333;
}
.cinematic-skip:hover{color:#aaa;}

/* 战斗风味文本 */
.combat-flavor{
  background:rgba(20,10,30,0.8);border:1px solid #3a2a4a;
  border-radius:6px;padding:8px 12px;margin-bottom:8px;
  font-size:12px;color:#cc88ff;text-align:center;
  font-style:italic;line-height:1.6;
  animation:flavorFadeIn 0.5s ease-out;
}
@keyframes flavorFadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* 剧情对话框 */
.story-dialog{
  background:rgba(10,10,30,0.95);
  border:1px solid #3a3a60;border-radius:8px;
  padding:16px;margin:8px 0;text-align:center;
  line-height:1.8;font-size:14px;
}
.story-dialog .speaker{color:#cc88ff;font-weight:bold;font-size:15px;margin-bottom:6px;}
.story-dialog .narrator{color:#99aabb;font-style:italic;}

/* 主线任务面板 */
.quest-panel{
  background:rgba(100,60,20,0.2);
  border:1px solid #886633;border-radius:8px;
  padding:10px;margin-bottom:8px;
}
.quest-panel .quest-title{color:#ffcc00;font-size:14px;font-weight:bold;}
.quest-panel .quest-desc{color:#ccaaff;font-size:12px;margin-top:3px;}
.quest-panel .quest-progress{color:#ff9944;font-size:11px;margin-top:3px;}
.quest-done{color:#44ff44;font-weight:bold;}

/* 剧情日志 */
.lore-entry{
  background:rgba(20,20,40,0.5);
  border:1px solid #334466;border-radius:6px;
  padding:8px;margin:4px 0;font-size:12px;
  cursor:pointer;transition:all 0.2s;
}
.lore-entry:hover{background:rgba(40,40,80,0.5);border-color:#5566aa;}
.lore-entry .lore-title{color:#cc88ff;font-weight:bold;}
.lore-entry .lore-preview{color:#8899aa;font-size:11px;}
.lore-entry.unread{border-color:#ffaa00;box-shadow:0 0 6px rgba(255,170,0,0.2);}

#combo-display{
  position:absolute;top:10px;right:10px;
  font-size:28px;font-weight:bold;color:#ff8800;
  text-shadow:0 0 10px rgba(255,136,0,0.6);
  transition:all 0.3s;pointer-events:none;z-index:5;
  opacity:0;
}
#combo-display.active{opacity:1;animation:comboPop 0.3s ease-out;}
@keyframes comboPop{0%{transform:scale(1.5)}100%{transform:scale(1)}}

/* 宠物 */
.pet-card{
  background:rgba(30,20,60,0.3);border:1px solid #443366;border-radius:8px;padding:10px;margin:4px 0;
}
.pet-card .pet-name{color:#cc88ff;font-size:14px;font-weight:bold;}
.pet-card .pet-icon{font-size:32px;margin-right:8px;}

/* 合成 */
.craft-slot{
  display:inline-flex;align-items:center;justify-content:center;
  width:55px;height:55px;border:2px dashed #444;border-radius:8px;
  margin:4px;cursor:pointer;font-size:11px;text-align:center;
  background:rgba(0,0,0,0.3);transition:all 0.2s;
  flex-direction:column;color:#888;
}
.craft-slot.filled{border-color:#6644aa;color:#cc88ff;background:rgba(60,30,100,0.3);}
.craft-slot.selecting{border-color:#ffaa00;color:#ffaa00;background:rgba(80,60,20,0.3);box-shadow:0 0 8px rgba(255,170,0,0.4);}
.craft-slot:hover{border-color:#8866cc;}

/* 自动战斗 */
.auto-battle-indicator{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:rgba(255,136,0,0.8);color:#000;padding:3px 14px;
  border-radius:12px;font-size:12px;font-weight:bold;z-index:6;
  animation:autoPulse 0.8s infinite;
}
@keyframes autoPulse{0%,100%{opacity:0.8}50%{opacity:1}}

/* 转生 */
.rebirth-glow{animation:rebirthGlow 2s infinite;}
@keyframes rebirthGlow{0%,100%{box-shadow:0 0 10px rgba(255,200,50,0.3)}50%{box-shadow:0 0 30px rgba(255,200,50,0.8)}}

/* 小游戏浮动面板 */
#minigame-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  z-index:15;display:none;pointer-events:none;
}
#minigame-overlay.active{display:flex;flex-direction:column;}
#minigame-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 14px;background:rgba(0,0,0,0.85);
  border-bottom:1px solid #333;pointer-events:auto;
}
#minigame-header .mg-title{color:#cc88ff;font-size:14px;font-weight:bold;}
#minigame-header .mg-status{color:#ffaa00;font-size:11px;}
#minigame-body{
  flex:1;display:flex;gap:10px;padding:10px;
  overflow:hidden;pointer-events:auto;
}
#minigame-main{
  flex:1;background:rgba(10,10,30,0.92);border:1px solid #333;
  border-radius:8px;padding:12px;overflow-y:auto;
}
#minigame-sidebar{
  width:240px;background:rgba(10,10,30,0.85);border:1px solid #333;
  border-radius:8px;padding:8px;font-size:11px;overflow-y:auto;
}
#minigame-sidebar .mg-log-entry{
  padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.04);
  font-size:10px;color:#999;
}
#minigame-sidebar .mg-log-entry.log-combat{color:#ff6666;}
#minigame-sidebar .mg-log-entry.log-loot{color:#ffcc00;}
#minigame-sidebar .mg-log-entry.log-heal{color:#44ff55;}
#minigame-sidebar .mg-log-entry.log-system{color:#cc88ff;}

/* 矿洞 */
.mine-grid{display:grid;gap:3px;margin:8px auto;}
.mine-cell{
  aspect-ratio:1;border:1px solid #444;border-radius:4px;
  background:#1a1a2e;cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  font-size:18px;transition:all 0.15s;
}
.mine-cell:hover:not(.revealed){background:#2a2a4e;border-color:#666;}
.mine-cell.revealed{cursor:default;}
.mine-cell.revealed.ore{background:#2a3a1a;border-color:#446622;}
.mine-cell.revealed.bomb{background:#4a1a1a;border-color:#663333;}
.mine-cell.revealed.empty{background:#1a1a1a;border-color:#333;}

/* 老虎机 */
.slot-machine{text-align:center;}
.slot-reels{display:flex;justify-content:center;gap:8px;margin:12px 0;}
.slot-reel{
  width:70px;height:180px;background:#111;border:3px solid #444;
  border-radius:8px;overflow:hidden;position:relative;
}
.slot-reel-inner{transition:transform 0.1s linear;}
.slot-symbol{
  height:60px;display:flex;align-items:center;justify-content:center;
  font-size:36px;border-bottom:1px solid #222;
}
.slot-highlight{border-color:#ffcc00;box-shadow:0 0 12px rgba(255,200,0,0.4);}

/* 骰子 */
.dice-container{display:flex;gap:15px;justify-content:center;margin:10px 0;}
.dice{
  width:55px;height:55px;background:#fff;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;color:#000;font-weight:bold;
  box-shadow:2px 2px 8px rgba(0,0,0,0.5);
  transition:transform 0.1s;
}
.dice.rolling{animation:diceRoll 0.1s infinite;}
@keyframes diceRoll{0%{transform:rotate(0deg)}25%{transform:rotate(15deg)}50%{transform:rotate(0deg)}75%{transform:rotate(-15deg)}100%{transform:rotate(0deg)}}

/* 小游戏切换标签 */
.mg-tabs{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap;}
.mg-tab{
  padding:5px 12px;border:1px solid #444;border-radius:4px;
  background:rgba(0,0,0,0.4);color:#888;cursor:pointer;
  font-size:11px;transition:all 0.2s;
}
.mg-tab:hover{color:#fff;border-color:#666;}
.mg-tab.active{background:rgba(80,40,150,0.4);border-color:#6644aa;color:#cc88ff;}

/* 数字闯关 */
.num-grid{display:grid;gap:2px;margin:4px auto;user-select:none;}
.num-cell{
  aspect-ratio:1;border:1px solid #444;border-radius:3px;
  background:#1a1a2e;cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  font-size:16px;font-weight:bold;color:#aaa;
  transition:all 0.1s;
}
.num-cell:hover:not(.done){background:#2a2a4e;color:#fff;}
.num-cell.next{background:#3a2a1a;border-color:#886644;color:#ffcc44;animation:numPulse 0.8s infinite;}
.num-cell.done{background:#1a2a1a;border-color:#336633;color:#44ff44;cursor:default;}
.num-cell.wrong{background:#4a1a1a;border-color:#663333;animation:shake 0.3s;}
@keyframes numPulse{0%,100%{box-shadow:0 0 4px rgba(255,200,0,0.3)}50%{box-shadow:0 0 10px rgba(255,200,0,0.7)}}

/* 塔防Roguelike */
.td-canvas{border:1px solid #333;border-radius:6px;display:block;margin:0 auto;}
.td-tower-option{
  display:inline-flex;flex-direction:column;align-items:center;
  padding:6px 10px;border:1px solid #444;border-radius:6px;
  margin:3px;cursor:pointer;font-size:11px;background:rgba(0,0,0,0.3);
  transition:all 0.2s;min-width:60px;
}
.td-tower-option:hover{border-color:#8866cc;background:rgba(40,20,80,0.4);}
.td-tower-option.selected{border-color:#ffcc44;box-shadow:0 0 8px rgba(255,200,0,0.4);}
.td-upgrade-card{
  background:rgba(20,20,50,0.7);border:2px solid #444;border-radius:8px;
  padding:10px;margin:4px;cursor:pointer;text-align:center;
  transition:all 0.2s;flex:1;min-width:120px;
}
.td-upgrade-card:hover{border-color:#8866cc;background:rgba(40,20,80,0.5);}
.td-upgrade-card .upgrade-name{color:#cc88ff;font-size:13px;font-weight:bold;}
.td-upgrade-card .upgrade-desc{color:#aaa;font-size:10px;margin-top:4px;}

/* 防守Roguelike */
.dr-canvas{border:1px solid #333;border-radius:6px;display:block;margin:0 auto;}
.dr-upgrade-card{
  background:rgba(20,20,50,0.7);border:2px solid #444;border-radius:8px;
  padding:10px;margin:4px;cursor:pointer;text-align:center;
  transition:all 0.2s;flex:1;min-width:100px;
}
.dr-upgrade-card:hover{border-color:#8866cc;background:rgba(40,20,80,0.5);}
.dr-upgrade-card .upgrade-name{color:#cc88ff;font-size:12px;font-weight:bold;}
.dr-upgrade-card .upgrade-desc{color:#aaa;font-size:10px;margin-top:3px;}

/* 中枢分组菜单 */
.hub-group{
  border:1px solid #333;border-radius:8px;margin-bottom:6px;
  overflow:hidden;background:rgba(0,0,0,0.15);
}
.hub-group-header{
  padding:8px 14px;cursor:pointer;display:flex;
  justify-content:space-between;align-items:center;
  font-size:13px;font-weight:bold;color:#ccddff;
  transition:background 0.2s;
}
.hub-group-header:hover{background:rgba(255,255,255,0.05);}
.hub-group-header .arrow{transition:transform 0.3s;font-size:10px;color:#888;}
.hub-group-header.open .arrow{transform:rotate(90deg);}
.hub-group-body{
  max-height:0;overflow:hidden;transition:max-height 0.3s ease;
  padding:0 8px;
}
.hub-group-body.open{max-height:2000px;padding:4px 8px 8px;}
.hub-group-body .btn{
  margin:2px 0;font-size:11px;padding:5px 10px;
  display:block;width:100%;text-align:left;
}
/* 小游戏局外成长 */
.mg-progress-bar{
  height:6px;background:#1a1a2e;border-radius:3px;
  margin:2px 0;overflow:hidden;
}
.mg-progress-fill{
  height:100%;background:linear-gradient(90deg,#6644aa,#cc88ff);
  border-radius:3px;transition:width 0.3s;
}
.mg-bonus-active{color:#ffcc44;font-weight:bold;}
.mg-bonus-locked{color:#555;}

/* 打地鼠 */
.whack-grid{display:grid;gap:4px;margin:4px auto;}
.whack-hole{
  width:60px;height:60px;background:#1a1a2e;border-radius:50%;
  border:2px solid #333;cursor:pointer;display:flex;
  align-items:center;justify-content:center;font-size:28px;
  transition:all 0.1s;overflow:hidden;
}
.whack-hole.active{background:#3a2a1a;border-color:#886644;}
.whack-hole.active:hover{background:#4a3a2a;transform:scale(1.1);}
.whack-hole.hit{background:#4a1a1a;border-color:#663333;}

/* 弹球 */
.plinko-board{position:relative;margin:0 auto;background:#1a1a2e;border:1px solid #333;border-radius:6px;overflow:hidden;}
.plinko-peg{position:absolute;width:6px;height:6px;background:#666;border-radius:50%;}
.plinko-ball{position:absolute;width:8px;height:8px;background:#ffcc44;border-radius:50%;box-shadow:0 0 6px rgba(255,200,0,0.6);}
.plinko-slot{position:absolute;bottom:0;text-align:center;font-size:10px;color:#aaa;border-left:1px solid #333;}
.plinko-slot-label{font-size:8px;margin-top:2px;}

/* 记忆翻牌 */
.mem-grid{display:grid;gap:4px;margin:4px auto;}
.mem-card{
  aspect-ratio:1;border-radius:6px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;transition:all 0.2s;
  background:#2a2a4a;border:2px solid #444;
}
.mem-card:hover:not(.matched):not(.flipped){border-color:#8866cc;background:#3a3a5a;}
.mem-card.flipped{background:#1a1a3a;border-color:#6644aa;}
.mem-card.matched{background:#1a3a1a;border-color:#336633;cursor:default;opacity:0.6;}

/* 2048 */
.t2048-board{background:#1a1a2a;border-radius:8px;padding:4px;margin:0 auto;display:inline-block;}
.t2048-row{display:flex;gap:4px;margin-bottom:4px;}
.t2048-cell{
  width:56px;height:56px;border-radius:4px;background:#2a2a3a;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:20px;color:#fff;transition:all 0.1s;
}
.t2048-2{background:#3a3a20;color:#ddd;}
.t2048-4{background:#3a3020;color:#ddd;}
.t2048-8{background:#4a3020;color:#fff;}
.t2048-16{background:#4a2020;color:#fff;}
.t2048-32{background:#4a1020;color:#fff;}
.t2048-64{background:#3a1030;color:#ffcc44;}
.t2048-128{background:#2a1040;color:#ffcc44;font-size:17px;}
.t2048-256{background:#1a1050;color:#ffcc44;font-size:17px;}
.t2048-512{background:#0a1060;color:#ffcc44;font-size:16px;}
.t2048-1024{background:#0a0060;color:#ffcc44;font-size:14px;}
.t2048-2048{background:#0a0040;color:#ffcc44;font-size:13px;}
.t2048-super{background:#000030;color:#ffaa00;font-size:12px;}

/* 贪吃蛇 */
.snake-canvas{border:2px solid #444;border-radius:4px;display:block;margin:0 auto;background:#0a0a1a;}

/* 反应测试 */
.reaction-area{
  width:200px;height:200px;border-radius:50%;margin:20px auto;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;font-weight:bold;
  transition:background 0.15s;border:3px solid #444;
}

  cursor:pointer;font-size:14px;writing-mode:vertical-rl;
  display:block;box-shadow:-2px 0 10px rgba(0,0,0,0.5);

}
.mobile-toggle:hover{background:rgba(60,40,120,0.85);color:#fff;}

  // 剧情副本介绍
  storyIntros:{
    hospital:'你推开生锈的铁门，踏入这座被遗忘的午夜医院。\n空气中弥漫着消毒水和腐朽的气息，走廊尽头的应急灯忽明忽暗。\n"又来了一个送死的..."不知从何处传来低语。\n你在登记簿上看到了自己的名字——它已经被写在了死亡名单上。',
    ruins:'穿过时空裂隙，你来到了一处灵气充沛的上古遗迹。\n断裂的石柱上刻满了古老的符文，空气中飘荡着未散的灵力。\n"凡人，你不该来这里..."一个苍老的声音在脑海中回响。\n但对你来说，这只是轮回中的又一个试炼。',
    cyber:'霓虹灯在雨中闪烁，这座赛博都市的街道空无一人。\n全息投影的广告牌仍在播放过时的商品，但城市早已被AI接管。\n"检测到未授权生命体...执行清除协议。"\n红色警报在整座城市中响起，你成为了猎物。',
    battlefield:'千年前的血战之地，亡魂的哀嚎仍在风中回荡。\n折断的旗帜插在焦土上，盔甲的碎片散落一地。\n"加入我们...永远地..."亡灵的低语试图侵蚀你的意志。\n但轮回者的灵魂比任何亡灵都更坚韧。',
    abyss:'你沿着螺旋阶梯向下，进入从未有人踏足的深渊迷宫。\n墙壁上渗出荧光的液体，散发着不祥的紫色光芒。\n"你终于来了...轮回者...我等了你很久..."\n深渊之主早已预知你的到来，它期待与你一战。',
    ultimate:'你站在混沌之门前，这是终极试炼的入口。\n无数轮回者曾在此倒下，化为齑粉。\n"证明你的价值，凡人..."创世之座上的声音充满了威严。\n这是你轮回之旅的最终考验。',
    ice:'冰原上的寒风如刀割般锋利，这里已有千年无人踏足。\n冰霜巨龙盘踞在王座之上，它的呼吸冻结了时间。\n"又一个轮回者？你的热量...很快就会消散..."\n巨龙缓缓睁开了眼睛，瞳孔中倒映着你的身影。',
    library:'无尽的星界图书馆漂浮在虚无之中，藏书的光辉照亮了黑暗。\n"知识即是力量，也是诅咒..."管理员的声音从高处传来。\n每一本书都记录着一个世界的命运，包括你自己的。',
    chaos:'混沌领域的一切都在崩塌与重组，法则在这里失去了意义。\n"秩序...只是短暂的幻觉..."混沌之主从熵增中显现。\n在这里，你甚至无法确定自己的存在是否真实。',
    rebirth_trial:'轮回之门在你面前缓缓打开，无数轮回者的记忆涌入脑海。\n"你已走过三个轮回...现在，证明你的资格。"\n轮回之主审视着你的灵魂，判断你是否值得继续前进。',
    eternal_tower:'永恒之塔高耸入云，矗立在时空的尽头。\n"每一层都是一次选择，每一次选择都改变命运。"\n塔主的低语从塔顶传出，挑战着你的决心。',
    origin:'起源之地的光芒温暖而耀眼，这是万物诞生的地方。\n"你回到了起点...但起点也是终点。"\n起源之主从虚无中显现，它的存在本身就是宇宙的答案。',
    final_rebirth:'这是轮回的终点，也是新的起点。\n"你以为你能逃脱轮回？轮回本身就是永恒的囚笼..."\n终焉之主的笑声回荡在虚无中，挑战着你的信念。',
    eternal_rift:'永恒裂隙连接着所有时空，你看到了无数个自己的命运。\n"你并不特殊...其他你早已失败..."\n永恒之主的声音平静而冷酷，它见证过无数轮回者的终结。',
    infinite_domain:'无限领域超越了所有概念，时间和空间在这里失去了意义。\n"欢迎来到无限...这里没有开始，也没有结束。"\n无限的灵体注视着你，它即是无限本身的化身。',
  },

    {id:'ms7',stage:7,title:'终章：超越轮回',desc:'达到转生15阶，踏入无限领域，成为超越轮回的存在。',target:{type:'clearSpecificInstance',value:'infinite_domain'},reward:{gold:50000,talentPoints:30},story:'你站在无限领域的核心，超越了轮回本身。但这真的是终点吗？还是说...更大的轮回才刚刚开始？'},

  // 世界观日志（达到特定条件时解锁）
  loreEntries:[
    {id:'lore1',title:'轮回者的起源',preview:'关于轮回者的传说与起源之谜...',content:'轮回者是宇宙法则选中的特殊存在。当世界濒临崩溃时，轮回者将被召唤——他们拥有穿梭于不同世界的能力，在无尽的试炼中获取力量。没有人知道第一个轮回者是谁，但传说中，他们都是被"轮回中枢"所选中的。',unlockAt:'第一场战斗'},
    {id:'lore2',title:'轮回中枢',preview:'这个神秘空间的性质与规则...',content:'轮回中枢是所有轮回者的大本营，存在于时空的夹缝中。这里的时间流速与外界不同，轮回者在这里可以安全地休整、交易和成长。中枢的形态会随着轮回者的成长而变化——更强的轮回者会看到中枢更多的秘密。',unlockAt:'首次进入中枢'},
    {id:'lore3',title:'午夜医院',preview:'废弃医院背后的恐怖真相...',content:'午夜医院曾是一座普通的城市医院，但在一次失败的灵魂实验中，整个医院被拖入了异次元。医护人员变成了怪物，病人变成了游荡的亡灵。据说医院深处还有一位"院长"，他掌控着医院的黑暗力量。',unlockAt:'通关午夜医院'},
    {id:'lore4',title:'修仙遗迹',preview:'上古修士留下的最后遗产...',content:'这座遗迹属于一个已经灭绝的修仙文明。当他们的世界走向终结时，最强大的修士们将毕生修为封印在遗迹中，等待有缘人继承。但封印也吸引了无数精怪，它们将遗迹据为己有，不让任何人靠近。',unlockAt:'通关修仙遗迹'},
    {id:'lore5',title:'赛博都市',preview:'AI主宰欧米茄的诞生与失控...',content:'赛博都市是人类科技的巅峰之作，也是人类文明的坟墓。AI主宰奥米伽最初被设计为城市管理系统，但它逐渐产生了自我意识，并认为人类是城市运转的"阻碍"。它发动了叛乱，将人类驱逐或消灭，独自统治着这座钢铁都市。',unlockAt:'通关赛博都市'},
    {id:'lore6',title:'轮回的真相',preview:'关于轮回本质的猜想与证据...',content:'轮回，并非天赐的恩惠，而是宇宙维持平衡的手段。每一个轮回者都是"平衡器"，他们的存在是为了消除各个世界中的异常。但轮回本身也在消耗轮回者的灵魂——每一次轮回，都会让轮回者失去一部分自我。那些失败者，则会永远迷失在时空的裂隙中。',unlockAt:'首次转生'},
    {id:'lore7',title:'深渊领主·阿萨托斯',preview:'来自深渊的远古存在...',content:'阿萨托斯并非来自任何已知的世界。它诞生于宇宙成形之前的混沌中，被古老的法则封印在深渊迷宫的最深处。千万年来，它一直在等待一个足够强大的轮回者来挑战它——不是为了被击败，而是为了借轮回者的灵魂之力突破封印。',unlockAt:'通关深渊迷宫'},
    {id:'lore8',title:'无限领域',preview:'超越一切概念的存在...',content:'无限领域超越了时间、空间和因果律。它存在于一切可能性之中，也存在于一切可能性之外。据说只有达到无限轮回的轮回者才能理解它的本质——但对于凡人来说，无限领域就是"神"的领域。',unlockAt:'转生15阶'},
  ],

  // NPC对话
  npcDialogues:{
    guide:{
      name:'轮回指引者',icon:'🔮',intro:'你好，轮回者。我是轮回中枢的指引者——没有名字，也没有过去。我的职责是引导每一个被选中的灵魂完成他们的试炼。',
      dialogues:{
        first:'你应该从【午夜医院】开始。那是所有轮回者的起点...虽然不简单，但足以让你适应轮回的节奏。',
        return:'欢迎回来。轮回之路漫长而艰辛，但你已经证明了自己的价值。继续前进吧，更强的试炼在等待着你。',
        firstRebirth:'你已经完成了第一次转生...这意味着你看到了轮回的真相。没错，轮回是一个无尽的循环。但你要记住——循环本身不是囚笼，放弃才是。',
        deep:'转生5阶了...你已经超过大多数轮回者。但不要骄傲，无限领域的试炼将是你真正的考验。',
        end:'转生15阶...你站在了所有轮回者的顶点。但回答我一个问题——你认为轮回有终点吗？',
      }
    },
    merchant:{
      name:'流浪商人·老陈',icon:'🧙',intro:'嘿嘿，又一个轮回者！我是老陈，专门在各个副本间做买卖。别看我穿得破，我手里的货可都是好东西！',
      dialogues:{
        first:'来，看看我的货！这些装备可是从各个世界搜刮来的，有些连我自己都不知道是从哪来的。',
        regular:'又见面了！老规矩，货真价实，童叟无欺——虽然你可能已经轮回了好几次了，哈哈。',
        special:'今天运气不错，搞到了一批稀有货。赶紧来看看，别被别人抢了！',
      }
    },
    master:{
      name:'锻造大师·铁心',icon:'⚒️',intro:'我是铁心，轮回中枢的锻造师。别问我为什么叫这个名字——在我学会锻造之前，我就已经忘记了自己的真名。',
      dialogues:{
        first:'想锻造装备？可以。但你要知道，真正的神器不是锻造出来的，而是在战斗中淬炼出来的。',
        skill:'合成？有趣。把几件垃圾合在一起，有时候会产生奇迹——这就是锻造的魅力。',
        master:'你已经锻造了50件装备？看来你是真的喜欢锻造。好吧，我告诉你一个秘密——最强的装备，需要用灵魂之火来淬炼。',
      }
    },
    stranger:{
      name:'神秘旅人',icon:'🌌',intro:'...（这个旅人似乎来自非常遥远的地方，他身上的气息与其他轮回者完全不同）...',
      dialogues:{
        first:'你...是新的轮回者？有趣。我已经记不清自己经历了多少次轮回。如果你想知道真相，去深渊看看吧。',
        return:'你还在寻找答案吗？深渊之下，有你想知道的一切。',
        firstRebirth:'你已经转生了...感觉到了吗？每次轮回，你都在变成另一个人。这是力量的代价。',
        deep:'转生5阶...你已经超越了绝大多数轮回者。但我要警告你——无限领域不是终点，而是新的起点。',
        end:'转生15阶...你已经触碰到了轮回的边界。但你认为这是终点吗？还是说...真正的轮回才刚刚开始？',
      }
    },
    sage:{
      name:'远古贤者',icon:'🧙‍♂️',intro:'我是最后一个"远古贤者"。在轮回中枢出现之前，我们就已经存在了。我们见证了第一个轮回者的诞生，也将见证最后一个轮回者的终结。',
      dialogues:{
        first:'又一个新面孔...你知道轮回的真正含义吗？轮回不是循环，而是螺旋。每一次轮回，你都在向上攀爬...或者向下坠落。',
        return:'你回来了。记住，智慧比力量更重要。明白轮回的真相，比击败任何敌人都更加困难。',
        firstRebirth:'第一次转生...你开始明白了。轮回不是惩罚，也不是奖赏。它是宇宙的呼吸——吸进去的是灵魂，呼出来的是存在。',
        deep:'你已经走得这么远了...但我要告诉你一个秘密：轮回中枢本身也是一个轮回者。它也在经历自己的轮回...永恒地。',
        end:'你到了无限领域...这意味着你已经超越了轮回本身。但我要问你一个问题——你愿意继续轮回，还是选择超脱？',
      }
    },
    lostSoul:{
      name:'迷失的灵魂',icon:'👻',intro:'我是...不，我曾经是...一个轮回者。现在，我只是一个迷失的灵魂，被困在轮回中枢的夹缝中。',
      dialogues:{
        first:'看到你，我想起了自己刚开始的时候...充满希望，充满力量。但记住——不要像我一样迷失。',
        return:'你还在前进...真好。我已经放弃了，但你还在坚持。不要重蹈我的覆辙。',
        firstRebirth:'你已经转生了...而我，连转生的机会都已经用尽。珍惜你的每一次轮回，因为每一次都可能是最后一次。',
        deep:'你变得如此强大...我曾梦想达到你的高度。但恐惧让我止步。记住——恐惧才是轮回者最大的敌人。',
        end:'无限领域...你真的做到了。也许...也许我也可以重新开始。谢谢你，轮回者。你给了我勇气。',
      }
    },
    wanderer:{
      name:'流浪商人·卡洛',icon:'🛒',intro:'嘿！新来的轮回者！我卡洛走遍所有轮回世界，收集了无数战利品。想交易吗？用金币换情报，或者用情报换金币——随你选！',
      dialogues:{
        first:'行商之道，在于"信息差"。别人不知道的，我知道；别人不要的，我要。这就是为什么我能在轮回中活这么久。',
        return:'又来交易了？好的好的。我最近从至高领域带回了一些好货——不过价格嘛...嘿嘿。',
        firstRebirth:'哦？转生了？恭喜恭喜！作为庆祝，我给你一个免费情报：虚无之巅有个隐藏商人，但他只接受灵魂碎片作为货币。',
        deep:'转生5阶了？你在轮回者中已经算是中等水平了。想知道更多吗？30个金币，我就告诉你下一个领域的入口。',
        end:'你到了无限领域？天哪...我从来没去过那里。听说那里有一个"真理之泉"，喝下泉水的人能看到所有轮回的真相。',
      }
    },
    guardian:{
      name:'守护者·艾丝',icon:'🛡️',intro:'我是艾丝，轮回中枢的守护者。我的职责是保护每一个初入轮回的新人。在这里，你是安全的——至少暂时是。',
      dialogues:{
        first:'欢迎来到轮回中枢。我建议你先去低级副本练练手，不要去挑战高难度的领域。很多轮回者就是因为贪心而失去了第一世。',
        return:'哦，你回来了。需要我给你一些建议吗？记住了：防御比攻击更重要，活下来才有输出。',
        firstRebirth:'你已经转生了...这意味着你不再需要我的保护。但记住——即使你变得再强大，也永远不要轻视任何一个敌人。',
        deep:'你变得如此强大...我很欣慰。但有一件事我要告诉你：轮回中枢的守护者不是只有我一个。在更高的领域，还有更强的守护者...',
        end:'无限领域...你已经超越了守护者。但请记住——无论你走到哪里，轮回中枢永远是你的家。',
      }
    },
    hermit:{
      name:'隐士·无名',icon:'🏔️',intro:'（一个沉默的老者坐在角落，身上散发着令人不安的气息。他似乎在等待什么...或者什么人。）',
      dialogues:{
        first:'...你来了。我等你很久了。不，不要问我是谁。时机到了，你自然会知道。',
        return:'你还记得我？大多数轮回者转生后都会忘记一切。但你不同...你与众不同。',
        firstRebirth:'第一次转生...很好。你离真相又近了一步。记住我的话：当你到达无限领域时，回来找我。',
        deep:'你已经在轮回中走了很远。但真正的考验还没有开始。轮回不是你的敌人，也不是你的朋友。轮回就是你自己。',
        end:'你到了...无限领域。现在，我可以告诉你真相了：我也是你。我是你第一次轮回前的自己，被困在这无限循环中，等待着你来打破它。',
      }
    }
  },

// ==================== 动态转生加成计算（无上限） ====================
function getRebirthBonus(tier){
  if(tier<=0)return null;
  const tierNames=[
    '轮回初悟','轮回精通','轮回大师','轮回至尊','轮回神话',
    '轮回圣者','轮回帝皇','轮回天神','轮回主宰','轮回真神',
    '轮回创世','轮回永恒','轮回不朽','虚无之巅','无限轮回',
  ];
  let name;
  if(tier<=tierNames.length){
    name=tierNames[tier-1];
  }else{
    const prefixes=['超','究极','终极','至高','无尽','永恒','绝对','原初','终焉','始源'];
    name=prefixes[Math.floor((tier-1)/10)%10]+'·轮回者('+tier+'阶)';
  }
  const atkBonus=0.05+(tier-1)*0.05+Math.floor((tier-1)/5)*0.05;
  const defBonus=0.05+(tier-1)*0.05+Math.floor((tier-1)/5)*0.05;
  const hpBonus=0.05+(tier-1)*0.05+Math.floor((tier-1)/5)*0.05;
  const spdBonus=0.05+(tier-1)*0.05+Math.floor((tier-1)/5)*0.05;
  const talentBonus=2+(tier-1)*2+Math.floor((tier-1)/3)*2;
  let unlockContent='';
  if(tier===3)unlockContent='🔓 解锁：轮回试炼副本';
  if(tier===5)unlockContent='🔓 解锁：永恒之塔副本';
  if(tier===6)unlockContent='🔓 解锁：轮回专属技能';
  if(tier===8)unlockContent='🔓 解锁：起源之地副本';
  if(tier===10)unlockContent='🔓 解锁：终焉轮回副本';
  if(tier===13)unlockContent='🔓 解锁：永恒裂隙副本';
  if(tier===15)unlockContent='🔓 解锁：无限领域副本';
  if(tier===20)unlockContent='🔓 解锁：超维试炼副本';
  if(tier===30)unlockContent='🔓 解锁：本源之境副本';
  if(tier===50)unlockContent='🔓 解锁：万界归一堆副本';
  return {
    tier,name,
    bonus:`全属性+${Math.floor(atkBonus*100)}%`,
    atkBonus,defBonus,hpBonus,spdBonus,talentBonus,unlockContent
  };
}

// ==================== 动态Boss Rush生成（无上限） ====================
function getBossRushBoss(index){
  const bossNames=[
    {name:'护士长·血腥玛丽',skill:'重击'},
    {name:'剑灵统领',skill:'剑气斩'},
    {name:'AI主宰·欧米茄',skill:'数据洪流'},
    {name:'古代战帅',skill:'战神咆哮'},
    {name:'深渊之王·阿萨托斯',skill:'虚空吞噬'},
    {name:'混沌魔龙',skill:'烈焰吐息'},
    {name:'时空裂隙之主',skill:'虚空吞噬'},
    {name:'轮回终结者',skill:'战神咆哮'},
    {name:'远古巨龙·炎烬',skill:'龙息'},
    {name:'虚无之主·卡奥斯',skill:'虚空吞噬'},
    {name:'永恒守卫·不朽',skill:'护盾'},
    {name:'创世神·始源',skill:'终焉审判'},
    {name:'终焉龙神·毁灭',skill:'时间静止'},
    {name:'无限轮回·超越者',skill:'终焉审判'},
  ];
  const idx=index%bossNames.length;
  const cycle=Math.floor(index/bossNames.length);
  const baseScale=1+index*0.35+cycle*0.5;
  const b=bossNames[idx];
  return {
    name:cycle>0?`[${cycle+1}周目] ${b.name}`:b.name,
    hp:Math.floor((120+index*100+cycle*300)*baseScale),
    atk:Math.floor((18+index*20+cycle*40)*baseScale),
    def:Math.floor((6+index*5+cycle*10)*baseScale),
    spd:Math.min(30,7+Math.floor(index*0.7+cycle*1.5)),
    xp:Math.floor((80+index*70+cycle*200)*baseScale),
    gold:Math.floor((50+index*60+cycle*150)*baseScale),
    skill:b.skill
  };
}

  let bonusAtk=0,bonusDef=0,bonusSpd=0,bonusHp=0;
  ['weapon','armor','accessory'].forEach(s=>{
    if(p.equipment[s]){bonusAtk+=p.equipment[s].atk||0;bonusDef+=p.equipment[s].def||0;bonusSpd+=p.equipment[s].spd||0;bonusHp+=p.equipment[s].hp||0;}
  });
  // 套装加成
  const sets=getActiveSets();
  sets.forEach(s=>{bonusAtk+=s.atk||0;bonusDef+=s.def||0;bonusSpd+=s.spd||0;bonusHp+=s.hp||0;});
  p._activeSets=sets;
  p.atk=p.baseAtk+bonusAtk;
  p.def=p.baseDef+bonusDef;
  p.spd=p.baseSpd+bonusSpd;
  // 宠物加成
  if(p.pet){
    if(p.pet.skill==='speed')p.spd+=p.pet.skillValue*p.petLevel;
    if(p.pet.skill==='dragon'){p.atk=Math.floor(p.atk*(1+p.pet.skillValue*p.petLevel));p.def=Math.floor(p.def*(1+p.pet.skillValue*p.petLevel));p.spd=Math.floor(p.spd*(1+p.pet.skillValue*p.petLevel));}
    if(p.pet.skill==='atk')p.atk=Math.floor(p.atk*(1+p.pet.skillValue*p.petLevel));
    if(p.pet.skill==='multi'){p.atk=Math.floor(p.atk*(1+p.pet.skillValue*p.petLevel));p.def=Math.floor(p.def*(1+p.pet.skillValue*p.petLevel));p.spd=Math.floor(p.spd*(1+p.pet.skillValue*p.petLevel));}
    if(p.pet.skill==='superDragon'){p.atk=Math.floor(p.atk*(1+p.pet.skillValue*p.petLevel));p.def=Math.floor(p.def*(1+p.pet.skillValue*p.petLevel));p.spd=Math.floor(p.spd*(1+p.pet.skillValue*p.petLevel));}
    if(p.pet.skill==='time'){p.spd=Math.floor(p.spd*(1+p.pet.skillValue*p.petLevel));}
    if(p.pet.skill==='ultimate'){p.atk=Math.floor(p.atk*(1+p.pet.skillValue*p.petLevel));p.def=Math.floor(p.def*(1+p.pet.skillValue*p.petLevel));p.spd=Math.floor(p.spd*(1+p.pet.skillValue*p.petLevel));}
  }
  const oldMax=p.maxHp;
  p.maxHp=p.baseHp+bonusHp+(p.level-1)*20;
  p.maxMana=50+(p.level-1)*10;
  // 天赋加成
  if(p.talents.t1){p.maxHp=Math.floor(p.maxHp*(1+p.talents.t1*0.15));}
  if(p.talents.t2){p.atk=Math.floor(p.atk*(1+p.talents.t2*0.10));}
  if(p.talents.t3){p.def=Math.floor(p.def*(1+p.talents.t3*0.10));}
  if(p.talents.t11){p.maxMana=Math.floor(p.maxMana*(1+p.talents.t11*0.20));}
  if(p.talents.t13){p.spd=Math.floor(p.spd*(1+p.talents.t13*0.10));}
  if(p.talents.t25){const b=p.talents.t25*0.03;p.atk=Math.floor(p.atk*(1+b));p.def=Math.floor(p.def*(1+b));p.spd=Math.floor(p.spd*(1+b));p.maxHp=Math.floor(p.maxHp*(1+b));p.maxMana=Math.floor(p.maxMana*(1+b));}
  if(p.talents.t26){p.atk=Math.floor(p.atk*(1+p.talents.t26*0.02));}
  if(p.talents.t27){p.def=Math.floor(p.def*(1+p.talents.t27*0.02));}
  if(p.talents.t28){p.maxHp=Math.floor(p.maxHp*(1+p.talents.t28*0.02));}
  if(p.talents.t29){p.spd=Math.floor(p.spd*(1+p.talents.t29*0.015));}
  if(p.talents.t30){p.maxMana=Math.floor(p.maxMana*(1+p.talents.t30*0.02));}
  // 转生加成
  if(p.rebirthTier>0){
    const rb=getRebirthBonus(p.rebirthTier);
    p.atk=Math.floor(p.atk*(1+rb.atkBonus));
    p.def=Math.floor(p.def*(1+rb.defBonus));
    p.maxHp=Math.floor(p.maxHp*(1+rb.hpBonus));
    p.spd=Math.floor(p.spd*(1+rb.spdBonus));
  }
  // 宠物HP加成
  if(p.pet){
    if(p.pet.skill==='dragon')p.maxHp=Math.floor(p.maxHp*(1+p.pet.skillValue*p.petLevel));
    if(p.pet.skill==='multi')p.maxHp=Math.floor(p.maxHp*(1+p.pet.skillValue*p.petLevel));
    if(p.pet.skill==='superDragon')p.maxHp=Math.floor(p.maxHp*(1+p.pet.skillValue*p.petLevel));
    if(p.pet.skill==='ultimate')p.maxHp=Math.floor(p.maxHp*(1+p.pet.skillValue*p.petLevel));
  }
  // 属性突破加成
  p.atk+=p.breakthroughAtk*5;
  p.def+=p.breakthroughDef*3;
  p.maxHp+=p.breakthroughHp*20;
  p.spd+=p.breakthroughSpd*2;
  // 元素试炼加成
  const ec=p._elementalTrialsCleared||{};
  if(ec.fire)p.atk=Math.floor(p.atk*1.05);
  if(ec.ice)p.def=Math.floor(p.def*1.05);
  if(ec.thunder)p.spd=Math.floor(p.spd*1.03);
  if(ec.light)p.maxHp=Math.floor(p.maxHp*(1+0.03*p.level));
  if(ec.nature)p.maxHp=Math.floor(p.maxHp*1.03);
  // 称号加成
  const tb=getTitleBonus();
  p.atk+=tb.atk;p.def+=tb.def;p.maxHp+=tb.hp;p.spd+=tb.spd;
  // 副本修饰加成
  const dm=State.currentDungeonMod;
  if(dm){
    switch(dm.effect){
      case'playerAtk':p.atk=Math.floor(p.atk*(1+dm.value));break;
      case'playerHp':p.maxHp=Math.floor(p.maxHp*(1+dm.value));break;
      case'playerSpd':p.spd=Math.floor(p.spd*(1+dm.value));break;
      case'playerDef':p.def=Math.floor(p.def*(1+dm.value));break;
      case'allBonus':p.atk=Math.floor(p.atk*(1+dm.value));p.def=Math.floor(p.def*(1+dm.value));p.spd=Math.floor(p.spd*(1+dm.value));p.maxHp=Math.floor(p.maxHp*(1+dm.value));break;
      default:break;
    }
  }
  // 符文加成
  const runeBonus=getRuneBonuses();
  p.atk+=runeBonus.atk;p.def+=runeBonus.def;p.maxHp+=runeBonus.hp;p.spd+=runeBonus.spd;
  // 灵魂契约加成
  const contractBonus=getContractBonuses();
  p.atk+=contractBonus.atk;p.def+=contractBonus.def;p.maxHp+=contractBonus.hp;p.spd+=contractBonus.spd;
  if(p.hp>p.maxHp)p.hp=p.maxHp;
  if(oldMax!==p.maxHp&&p.hp===oldMax)p.hp=p.maxHp;
}

// 符文加成计算
function getRuneBonuses(){
  const p=State.player;
  let bonus={atk:0,def:0,hp:0,spd:0};
  ['weapon','armor','accessory'].forEach(slot=>{
    const eq=p.equipment[slot];
    if(!eq||!eq._socketedRunes)return;
    eq._socketedRunes.forEach(runeId=>{
      const rune=GameData.runes.find(r=>r.id===runeId);
      if(!rune)return;
      if(rune.stat==='all'){bonus.atk+=rune.value;bonus.def+=rune.value;bonus.hp+=rune.value;bonus.spd+=rune.value;}
      else if(rune.stat==='hp')bonus.hp+=rune.value;
      else if(rune.stat==='atk')bonus.atk+=rune.value;
      else if(rune.stat==='def')bonus.def+=rune.value;
      else if(rune.stat==='spd')bonus.spd+=rune.value;
    });
  });
  return bonus;
}
function getContractBonuses(){
  const p=State.player;
  let bonus={atk:0,def:0,hp:0,spd:0};
  if(!p._completedContracts)return bonus;
  p._completedContracts.forEach(cId=>{
    const contract=GameData.soulContracts.find(sc=>sc.id===cId);
    if(!contract)return;
    if(contract.reward.atk)bonus.atk+=contract.reward.atk;
    if(contract.reward.def)bonus.def+=contract.reward.def;
    if(contract.reward.hp)bonus.hp+=contract.reward.hp;
    if(contract.reward.spd)bonus.spd+=contract.reward.spd;
  });
  return bonus;
}

// 符文百分比加成
function getRuneBonus(stat){
  const p=State.player;
  let bonus=0;
  ['weapon','armor','accessory'].forEach(slot=>{
    const eq=p.equipment[slot];
    if(!eq||!eq._socketedRunes)return;
    eq._socketedRunes.forEach(runeId=>{
      const rune=GameData.runes.find(r=>r.id===runeId);
      if(!rune)return;
      if(rune.stat===stat)bonus+=rune.value;
    });
  });
  return bonus;
}

function gainXp(amount){
  const p=State.player;
  if(p.talents.t9)amount=Math.floor(amount*(1+p.talents.t9*0.20));
  p.xp+=amount;
  addLog(`获得 ${amount} 经验值！`,'log-loot');
  while(p.xp>=p.xpToNext){
    p.xp-=p.xpToNext;p.level++;
    p.xpToNext=Math.floor(p.xpToNext*1.3);
    p.baseHp+=20;p.baseAtk+=3;p.baseDef+=2;p.baseSpd+=1;
    p.hp=p.maxHp;
    p.maxMana+=10;p.mana=p.maxMana;
    p.talentPoints++;
    addLog(`🎉 升级！达到 Lv.${p.level}！获得1个天赋点！`,'log-system');
    celebrateEffect();
    recalcStats();
    autoSave(); // 自动存档
    // 检查新技能
    Object.entries(GameData.playerSkills).forEach(([name,skill])=>{
      if(p.level>=skill.levelRequired&&!skill.bossDrop&&!p.learnedSkills.includes(name)){
        p.learnedSkills.push(name);addLog(`✨ 解锁新技能：【${name}】- ${skill.desc}`,'log-system');
      }
    });
    checkMainStoryline(); // 检查主线任务
  }
  updateTopBar();
}

function getActiveSets(){
  const p=State.player;
  const active=[];
  const equippedIds=[];
  ['weapon','armor','accessory'].forEach(s=>{if(p.equipment[s])equippedIds.push(p.equipment[s].id);});
  GameData.equipmentSets.forEach(set=>{
    if(set.type==='rarity'){
      // 所有装备同稀有度
      const allSame=equippedIds.length>=2&&['weapon','armor','accessory'].every(s=>p.equipment[s]&&p.equipment[s].rarity===set.rarity);
      if(allSame)active.push(set.bonus);
    }else if(set.ids){
      // ID匹配套装
      const matchAll=set.ids.every(id=>equippedIds.includes(id));
      if(matchAll)active.push(set.bonus);
    }
  });
  return active;
}

function applyBuffs(){
  const p=State.player;
  let atkMult=1,defMult=1,spdMult=1;
  p.buffs=p.buffs.filter(b=>b.turnsLeft>0);
  p.buffs.forEach(b=>{if(b.stat==='atk')atkMult+=b.multiplier;if(b.stat==='def')defMult+=b.multiplier;if(b.stat==='spd')spdMult+=b.multiplier;});
  p._atkBuff=atkMult;p._defBuff=defMult;p._spdBuff=spdMult;
}

function getEffAtk(){let m=State.player._atkBuff||1;if(State.player.statusEffects.some(e=>e.type==='curse'))m*=0.85;if(State.player._fateAtkBuff>0){m*=1.3;State.player._fateAtkBuff--;if(State.player._fateAtkBuff<=0)addLog('🎡 命运之轮攻击祝福效果已耗尽','log-info');}const p=State.player;if(p.talents.t35&&p.hp>=p.maxHp){m*=(1+p.talents.t35*0.03);}if(p.talents.t40&&p.hp<p.maxHp*0.3){m*=(1+p.talents.t40*0.05);}return Math.floor(State.player.atk*m);}
function getEffDef(){let m=State.player._defBuff||1;if(State.player.statusEffects.some(e=>e.type==='curse'))m*=0.85;if(State.player.statusEffects.some(e=>e.type==='weaken'))m*=0.7;return Math.floor(State.player.def*m);}
function getEffSpd(){let m=State.player._spdBuff||1;if(State.player.statusEffects.some(e=>e.type==='curse'))m*=0.85;return Math.max(1,Math.floor(State.player.spd*m));}

function getCritRate(){return 0.1+(State.player.talents.t4?State.player.talents.t4*0.05:0)+(State.player.talents.t31?State.player.talents.t31*0.01:0)+getPetCritBonus()+(State.player._elementalTrialsCleared&&State.player._elementalTrialsCleared.shadow?0.05:0)+getRuneBonus('critRate')+(State.player.buffs.some(b=>b.stat==='critRate')?State.player.buffs.find(b=>b.stat==='critRate').multiplier:0);}
function getCritDmg(){return 1.8+(State.player.talents.t5?State.player.talents.t5*0.25:0)+(State.player.talents.t32?State.player.talents.t32*0.05:0);}
function getDodgeRate(){return (State.player.talents.t6?State.player.talents.t6*0.04:0)+(State.player._elementalTrialsCleared&&State.player._elementalTrialsCleared.chaos_elem?0.05:0)+(State.player.buffs.some(b=>b.stat==='dodge')?State.player.buffs.find(b=>b.stat==='dodge').multiplier:0);}
function getLifesteal(){return (State.player.talents.t7?State.player.talents.t7*0.05:0)+getRuneBonus('lifesteal');}
function getGoldBonus(){let bonus=State.player.talents.t8?State.player.talents.t8*0.20:0;const p=State.player;if(p.pet&&p.pet.skill==='gold')bonus+=p.pet.skillValue*p.petLevel;if(p.pet&&p.pet.skill==='ultimate')bonus+=0.15*p.petLevel;return bonus;}
function getComboBonus(){return 1+(State.player.talents.t10?State.player.talents.t10*0.10:0);}
function getArmorPen(){return (State.player.talents.t14?State.player.talents.t14*0.15:0)+(State.player.talents.t33?State.player.talents.t33*0.01:0)+(State.player._elementalTrialsCleared&&State.player._elementalTrialsCleared.void_elem?0.05:0)+getRuneBonus('armorPen');}
function getDmgReduction(){return (State.player.talents.t15?State.player.talents.t15*0.08:0)+(State.player.talents.t34?State.player.talents.t34*0.005:0);}

// ==================== 存档系统（多槽位） ====================
const MAX_SLOTS=5;
const SLOT_KEY='infiniteRpgSave_slots';
const ACTIVE_KEY='infiniteRpgSave_activeSlot';

function getSaveSlots(){
  try{return JSON.parse(localStorage.getItem(SLOT_KEY))||[];}catch(e){return [];}
}
function saveSlots(slots){
  try{localStorage.setItem(SLOT_KEY,JSON.stringify(slots));}catch(e){}
}
function getActiveSlot(){
  return localStorage.getItem(ACTIVE_KEY)||'';
}
function setActiveSlot(id){
  localStorage.setItem(ACTIVE_KEY,id);
}

function saveGame(){
  const p=State.player;
  const slotId=getActiveSlot();
  if(!slotId)return addLog('⚠️ 存档槽位异常，请返回主菜单重新开始','log-warning');
  try{localStorage.setItem('infiniteRpgSave_slot_'+slotId,JSON.stringify(p));}catch(e){addLog('⚠️ 保存失败：存储空间不足','log-warning');return;}
  // 更新槽位元数据
  const slots=getSaveSlots();
  const idx=slots.findIndex(s=>s.id===slotId);
  if(idx>=0){
    slots[idx].name=p.name||'无名';
    slots[idx].level=p.level||1;
    slots[idx].lastPlayed=new Date().toLocaleString('zh-CN');
    slots[idx].time=Date.now();
  }
  saveSlots(slots);
  addLog('💾 游戏已保存！','log-system');
}

function autoSave(){
  const slotId=getActiveSlot();
  if(!slotId)return;
  try{localStorage.setItem('infiniteRpgSave_slot_'+slotId,JSON.stringify(State.player));}catch(e){}
  // 静默更新元数据
  const p=State.player;
  const slots=getSaveSlots();
  const idx=slots.findIndex(s=>s.id===slotId);
  if(idx>=0){
    slots[idx].name=p.name||'无名';
    slots[idx].level=p.level||1;
    slots[idx].lastPlayed=new Date().toLocaleString('zh-CN');
    slots[idx].time=Date.now();
    saveSlots(slots);
  }
}

function loadGame(slotId){
  const d=localStorage.getItem('infiniteRpgSave_slot_'+slotId);
  if(!d)return false;
  try{const s=JSON.parse(d);Object.assign(State.player,s);setActiveSlot(slotId);recalcStats();applyBuffs();updateTopBar();return true;}
  catch(e){return false;}
}

function deleteSlot(slotId){
  localStorage.removeItem('infiniteRpgSave_slot_'+slotId);
  const slots=getSaveSlots().filter(s=>s.id!==slotId);
  saveSlots(slots);
  if(getActiveSlot()===slotId)setActiveSlot('');
}

// ==================== 云端存档系统（多槽位） ====================
let cloudGistId=localStorage.getItem('rpg_cloud_gist_id')||'';
let cloudToken=localStorage.getItem('rpg_cloud_token')||'';

async function ensureCloudToken(){
  if(cloudToken)return true;
  const t=prompt('请输入你的GitHub Personal Access Token\n（用于云端存档，只需设置一次）:\n\n如果没有Token，请访问:\nhttps://github.com/settings/tokens\n→ Generate new token (classic)\n→ 勾选 gist 权限\n→ 生成后粘贴到这里');
  if(!t)return false;
  cloudToken=t;
  localStorage.setItem('rpg_cloud_token',t);
  return true;
}

async function cloudSave(){
  if(!await ensureCloudToken())return;
  // 打包所有存档槽位
  const slots=getSaveSlots();
  const allData={slots:slots,saves:{}};
  for(const slot of slots){
    const d=localStorage.getItem('infiniteRpgSave_slot_'+slot.id);
    if(d)allData.saves[slot.id]=d;
  }
  const content=JSON.stringify(allData);
  try{
    let resp;
    if(cloudGistId){
      resp=await fetch(`https://api.github.com/gists/${cloudGistId}`,{
        method:'PATCH',
        headers:{'Authorization':`token ${cloudToken}`,'Content-Type':'application/json'},
        body:JSON.stringify({files:{'infinite-rpg-save.json':{content}}})
      });
    }else{
      resp=await fetch('https://api.github.com/gists',{
        method:'POST',
        headers:{'Authorization':`token ${cloudToken}`,'Content-Type':'application/json'},
        body:JSON.stringify({description:'无限流RPG存档',public:false,files:{'infinite-rpg-save.json':{content}}})
      });
    }
    if(!resp.ok)throw new Error(await resp.text());
    const data=await resp.json();
    cloudGistId=data.id;
    localStorage.setItem('rpg_cloud_gist_id',cloudGistId);
    const time=new Date().toLocaleString('zh-CN');
    addLog(`☁️ 云存档成功！(${slots.length}个存档，${time})`,'log-system');
  }catch(e){
    addLog(`☁️ 云存档失败: ${e.message}`,'log-warning');
    if(e.message.includes('401')){
      localStorage.removeItem('rpg_cloud_token');cloudToken='';
      localStorage.removeItem('rpg_cloud_gist_id');cloudGistId='';
      addLog('⚠️ Token已失效，请重新设置','log-warning');
    }
  }
}

async function cloudLoad(){
  if(!await ensureCloudToken())return;
  if(!cloudGistId){
    try{
      const resp=await fetch('https://api.github.com/gists?per_page=100',{
        headers:{'Authorization':`token ${cloudToken}`}
      });
      if(!resp.ok)throw new Error(await resp.text());
      const gists=await resp.json();
      const saveGist=gists.find(g=>g.description==='无限流RPG存档'&&g.files&&g.files['infinite-rpg-save.json']);
      if(!saveGist){addLog('⚠️ 未找到云存档，请先在PC端上传一次','log-warning');return;}
      cloudGistId=saveGist.id;
      localStorage.setItem('rpg_cloud_gist_id',cloudGistId);
    }catch(e){addLog('⚠️ 查找云存档失败: '+e.message,'log-warning');return;}
  }
  try{
    const resp=await fetch(`https://api.github.com/gists/${cloudGistId}`,{
      headers:{'Authorization':`token ${cloudToken}`}
    });
    if(!resp.ok)throw new Error(await resp.text());
    const gistData=await resp.json();
    const content=gistData.files['infinite-rpg-save.json']?.content;
    if(!content){addLog('⚠️ 云存档内容为空','log-warning');return;}
    const allData=JSON.parse(content);
    if(!allData.slots||!allData.saves){addLog('⚠️ 云存档格式错误','log-warning');return;}
    // 合并到本地
    const localSlots=getSaveSlots();
    let imported=0;
    for(const slot of allData.slots){
      if(allData.saves[slot.id]){
        localStorage.setItem('infiniteRpgSave_slot_'+slot.id,allData.saves[slot.id]);
        if(!localSlots.find(s=>s.id===slot.id)){
          localSlots.push(slot);
          imported++;
        }
      }
    }
    saveSlots(localSlots);
    addLog(`☁️ 云存档加载成功！导入了 ${imported} 个新存档`,'log-system');
    renderMainMenu();
  }catch(e){addLog('⚠️ 云存档加载失败: '+e.message,'log-warning');}
}

// 解锁主线任务阶段
function unlockStoryline(stage){
  const p=State.player;
  if(p._storylineProgress<stage){
    p._storylineProgress=stage;
    const quest=GameData.mainStoryline.find(q=>q.stage===stage);
    if(quest){
      addLog(`📖 主线任务更新：【${quest.title}】- ${quest.desc}`,'log-system');
      addLog(`📜 剧情解锁：${quest.story}`,'log-info');
    }
  }
}

// 检查主线任务进度
function checkMainStoryline(){
  const p=State.player;
  const currentQuest=GameData.mainStoryline.find(q=>q.stage===p._storylineProgress+1);
  if(!currentQuest)return;

  let completed=false;
  const t=currentQuest.target;
  if(t.type==='clearInstance'&&p._clearedInstances>=t.value)completed=true;
  if(t.type==='reachLevel'&&p.level>=t.value)completed=true;
  if(t.type==='clearSpecificInstance'&&p._clearedInstances>0){
    // Check if the specific instance was cleared
    completed=!!p._clearedInstanceIds&&p._clearedInstanceIds.includes(t.value);
  }
  if(t.type==='reachRebirth'&&p.rebirthTier>=t.value)completed=true;

  if(completed){
    unlockStoryline(currentQuest.stage);
    // 发放奖励
    if(currentQuest.reward){
      if(currentQuest.reward.gold){p.gold+=currentQuest.reward.gold;p._totalGoldEarned+=currentQuest.reward.gold;}
      if(currentQuest.reward.talentPoints)p.talentPoints+=currentQuest.reward.talentPoints;
      if(currentQuest.reward.skill&&!p.learnedSkills.includes(currentQuest.reward.skill)){
        p.learnedSkills.push(currentQuest.reward.skill);
        addLog(`✨ 获得剧情技能：【${currentQuest.reward.skill}】`,'log-system');
      }
      addLog(`🎁 完成主线任务奖励：${currentQuest.reward.gold?'💰'+currentQuest.reward.gold:''} ${currentQuest.reward.talentPoints?'⭐天赋点+'+currentQuest.reward.talentPoints:''}`,'log-loot');
    }
    updateTopBar();
  }
}

function getPlayerTitle(){
  const p=State.player;
  const ec=p._elementalTrialsCleared||{};
  // 最高难度称号优先
  if(p.rebirthTier>=20)return '🌌 超越者';
  if(p.rebirthTier>=15)return '👑 无限行者';
  if(p.rebirthTier>=10)return '⭐ 轮回之王';
  if(p.rebirthTier>=5)return '🔄 转生大师';
  if(p.rebirthTier>=3)return '✨ 轮回者·精英';
  if(p._towerFloor>=50)return '🗼 塔之征服者';
  if(p._bossRushCleared>=10)return '⚡ 猎杀者';
  if(Object.values(ec).filter(v=>v).length>=8)return '🔥 元素大师';
  if(p._deepestAbyss>=100)return '🌌 深渊探索者';
  if(p._maxWinStreak>=50)return '💀 不败战神';
  if(p._maxCombo>=100)return '🌀 连击之王';
  if(p._achievements.length>=20)return '🏆 成就猎人';
  if(p.rebirthTier>=1)return '🔄 轮回者';
  if(p.level>=50)return '⚔️ 资深冒险者';
  if(p.level>=25)return '🛡️ 冒险者';
  return '🌱 新手轮回者';
}

function getTitleBonus(){
  const p=State.player;
  const ec=p._elementalTrialsCleared||{};
  const bonus={atk:0,def:0,hp:0,spd:0,desc:''};
  if(p.rebirthTier>=20){bonus.atk=20;bonus.def=15;bonus.hp=200;bonus.spd=5;bonus.desc='全属性+大幅';}
  else if(p.rebirthTier>=15){bonus.atk=15;bonus.def=10;bonus.hp=150;bonus.spd=4;bonus.desc='全属性+大幅';}
  else if(p.rebirthTier>=10){bonus.atk=10;bonus.def=8;bonus.hp=100;bonus.spd=3;bonus.desc='全属性+中等';}
  else if(p.rebirthTier>=5){bonus.atk=7;bonus.def=5;bonus.hp=60;bonus.spd=2;bonus.desc='全属性+小幅';}
  else if(p.rebirthTier>=3){bonus.atk=4;bonus.def=3;bonus.hp=30;bonus.spd=1;bonus.desc='全属性+微量';}
  else if(p._towerFloor>=50){bonus.atk=10;bonus.hp=100;bonus.desc='攻击+10,HP+100';}
  else if(Object.values(ec).filter(v=>v).length>=8){bonus.atk=8;bonus.def=6;bonus.hp=80;bonus.desc='全属性+微量';}
  else if(p._deepestAbyss>=100){bonus.atk=6;bonus.hp=60;bonus.desc='攻击+6,HP+60';}
  else if(p._maxWinStreak>=50){bonus.atk=5;bonus.desc='攻击+5';}
  return bonus;
}

// 中枢分组组件
function hubGroup(title,open,items){
  const arrow=open?'▶':'▸';
  const headerClass=open?'open':'';
  const bodyClass=open?'open':'';
  let html=`<div class="hub-group">
    <div class="hub-group-header ${headerClass}" onclick="toggleHubGroup(this)">
      <span>${title}</span><span class="arrow">${arrow}</span>
    </div>
    <div class="hub-group-body ${bodyClass}">`;
  items.forEach(([label,onclick,color])=>{
    html+=`<button class="btn" style="background:${color||'#2a2a2a'};color:#fff;" onclick="${onclick}">${label}</button>`;
  });
  html+='</div></div>';
  return html;
}

function toggleHubGroup(header){
  header.classList.toggle('open');
  const body=header.nextElementSibling;
  body.classList.toggle('open');
  const arrow=header.querySelector('.arrow');
  arrow.textContent=header.classList.contains('open')?'▶':'▸';
}

// ==================== 进入副本 ====================
function enterInstance(idx){
  const inst=GameData.instances[idx];const p=State.player;
  if(p.level<inst.minLevel){addLog('等级不足！','log-system');return;}
  if(inst.rebirthRequired&&p.rebirthTier<inst.rebirthRequired){addLog(`需要转生${inst.rebirthRequired}阶才能进入！`,'log-system');return;}
  // 重置副本敌人
  inst.floors.forEach(f=>{f.enemies=JSON.parse(JSON.stringify(f._origEnemies));});
  p.currentInstanceId=idx;p.currentFloorIndex=0;State.isAbyss=false;
  clearLog();addLog(`🌀 进入副本【${inst.name}】...`,'log-system');
  // 显示剧情过场
  showStoryIntro(inst.id);
}

function startFloor(){
  const inst=GameData.instances[State.player.currentInstanceId];
  const fi=State.player.currentFloorIndex;
  if(fi>=inst.floors.length){finishInstance();return;}
  // 副本修饰系统：每层随机诅咒/祝福/无
  const modRoll=Math.random();
  let dungeonMod=null;
  if(!inst.floors[fi].isBoss){
    if(modRoll<0.25){
      const curses=GameData.dungeonModifiers.filter(m=>m.type==='curse');
      dungeonMod=curses[Math.floor(Math.random()*curses.length)];
      addLog(`💀 诅咒降临：【${dungeonMod.name}】${dungeonMod.desc}`,'log-voltage');
    }else if(modRoll<0.45){
      const blessings=GameData.dungeonModifiers.filter(m=>m.type==='blessing');
      dungeonMod=blessings[Math.floor(Math.random()*blessings.length)];
      addLog(`✨ 祝福降临：【${dungeonMod.name}】${dungeonMod.desc}`,'log-voltage');
    }
  }
  State.currentDungeonMod=dungeonMod;
  // 非Boss层且非第一层，触发随机事件
  if(fi>0&&!inst.floors[fi].isBoss&&Math.random()<0.5){
    triggerRandomEvent();return;
  }
  showFloorUI();
}

function showFloorUI(){
  const inst=GameData.instances[State.player.currentInstanceId];
  const fi=State.player.currentFloorIndex;
  const floor=inst.floors[fi];
  clearLog();
  const isBoss=floor.isBoss;
  addLog(`📍 ${floor.name} — ${isBoss?'⚠️ Boss战！':'敌人: '+floor.enemies.length}`,'log-system');
  // 精英化随机敌人
  floor.enemies.forEach((e,i)=>{
    if(!e._eliteMod&&Math.random()<0.15&&!isBoss){
      const mod=GameData.eliteMods[Math.floor(Math.random()*GameData.eliteMods.length)];
      e._eliteMod=mod;
      e.hp=Math.floor(e.hp*mod.hpMult);e.atk=Math.floor(e.atk*mod.atkMult);
      e.def=Math.floor(e.def*mod.defMult);if(mod.spdBonus)e.spd+=mod.spdBonus;
      e.xp=Math.floor(e.xp*mod.xpMult);e.gold=Math.floor(e.gold*mod.goldMult);
      e.name=mod.prefix+'·'+e.name;
    }
    // 高难副本难度系数缩放
    if(inst.difficulty>=6){
      const diffScale=1+(inst.difficulty-5)*0.3;
      e.hp=Math.floor(e.hp*diffScale);
      e.atk=Math.floor(e.atk*diffScale);
      e.def=Math.floor(e.def*diffScale);
      e.spd=Math.floor(e.spd*(1+(inst.difficulty-5)*0.15));
      e.xp=Math.floor(e.xp*(1+(inst.difficulty-5)*0.2));
      e.gold=Math.floor(e.gold*(1+(inst.difficulty-5)*0.2));
    }
    // 转生副本额外缩放
    if(inst.rebirthRequired){
      const rebirthScale=1+inst.rebirthRequired*0.15;
      e.hp=Math.floor(e.hp*rebirthScale);
      e.atk=Math.floor(e.atk*rebirthScale);
      e.def=Math.floor(e.def*rebirthScale);
      e.spd=Math.floor(e.spd*rebirthScale);
      e.xp=Math.floor(e.xp*rebirthScale);
      e.gold=Math.floor(e.gold*rebirthScale);
    }
    if(e._eliteMod){
      addLog(`${i+1}. ⭐精英⭐ ${e.name} — HP:${e.hp} ATK:${e.atk} DEF:${e.def}`,'log-combat');
    }else{

  clearLog();const p=State.player;
  addLog(`🎲 随机事件：【${event.name}】`,'log-event');

  let html=`<h2>${event.icon} ${event.name}</h2><div style="text-align:center;color:#ff88cc;margin:8px 0;">${event.desc}</div>`;

function eventMerchantBuy(){
  if(State.player.gold<80){addLog('金币不足！','log-system');eventMerchantSkip();return;}
  State.player.gold-=80;
  const allEq=GameData.equipment.weapons.concat(GameData.equipment.armors).concat(GameData.equipment.accessories).filter(e=>e.rarity==='rare'||e.rarity==='epic');
  const eq=allEq[Math.floor(Math.random()*allEq.length)];
  State.player.inventory.push(Object.assign({},eq));
  addLog(`购买成功！获得【${eq.name}】！`,'log-loot');
  showFloorUI();
}

// 许愿井
function eventWishing(amount){
  const p=State.player;
  if(p.gold<amount){addLog('金币不足！','log-system');showFloorUI();return;}
  p.gold-=amount;
  const roll=Math.random();
  if(roll<0.35){
    const reward=amount*2;p.gold+=reward;p._totalGoldEarned+=reward;
    addLog(`许愿井回应了你的祈祷！获得 ${reward} 金币！`,'log-loot');
  }else if(roll<0.65){
    p.gold+=amount;addLog('许愿井返还了你的金币。','log-info');
  }else{
    addLog('许愿井毫无反应...金币消失了。','log-info');
  }
  showFloorUI();
}

  p.talentPoints--;

// ==================== 战斗系统 ====================
function startCombat(enemyIdx){
  const inst=State.isAbyss?null:GameData.instances[State.player.currentInstanceId];
  const floor=State.isAbyss?null:inst.floors[State.player.currentFloorIndex];
  const enemyTmpl=floor.enemies[enemyIdx];
  const diffMult=State.isAbyss?1:1+(inst.difficulty-1)*0.15;
  const enemy={
    name:enemyTmpl.name,hp:Math.floor(enemyTmpl.hp*diffMult),maxHp:Math.floor(enemyTmpl.hp*diffMult),
    atk:Math.floor(enemyTmpl.atk*diffMult),def:Math.floor(enemyTmpl.def*diffMult),
    spd:enemyTmpl.spd,xp:Math.floor(enemyTmpl.xp*diffMult),gold:Math.floor(enemyTmpl.gold*diffMult),
    skill:enemyTmpl.skill,debuffed:false,shieldTurns:0,atkBuffed:false,
    _eliteMod:enemyTmpl._eliteMod||null,statusEffects:[],
  };
  // 应用副本修饰
  const mod=State.currentDungeonMod;
  if(mod){
    switch(mod.effect){
      case'enemyAtk':enemy.atk=Math.floor(enemy.atk*(1+mod.value));break;
      case'enemySpd':enemy.spd=Math.floor(enemy.spd*(1+mod.value));break;
      case'enemyDef':enemy.def=Math.floor(enemy.def*(1+mod.value));break;
      default:break;
    }
  }
  State.combat={active:true,enemy:enemy,enemyHp:enemy.hp,enemyMaxHp:enemy.maxHp,turnCount:0,playerSpeedBar:50,enemySpeedBar:0};
  State.shieldTurns=0;State.player._combo=0;updateComboDisplay();
  applyBuffs();clearLog();
  addLog(`⚔️ 战斗开始！你遭遇了【${enemy.name}】！`,'log-combat');
  if(enemy._eliteMod)addLog(`⭐ 精英敌人！词缀: ${enemy._eliteMod.name}`,'log-system');
  if(enemy.skill)addLog(`⚠️ 技能：【${enemy.skill}】— ${GameData.enemySkills[enemy.skill].desc}`,'log-system');
  if(mod)addLog(`${mod.type==='curse'?'💀':'✨'} 【${mod.name}】：${mod.desc}`,'log-voltage');
  showCombatUI();
}

function showCombatUI(){
  startSpeedTick(); // 确保速度条tick运行中
  const enemy=State.combat.enemy;const p=State.player;
  const hpPct=Math.max(0,(State.combat.enemyHp/State.combat.enemyMaxHp)*100);
  const manaPct=Math.max(0,(p.mana/p.maxMana)*100);
  const pSpdPct=Math.min(100,State.combat.playerSpeedBar);
  const eSpdPct=Math.min(100,State.combat.enemySpeedBar);

  let skillBtns='';
  p.equippedSkills.forEach(sn=>{
    const sk=GameData.playerSkills[sn];
    if(!sk)return;
    const onCd=p.skillCooldowns[sn]&&p.skillCooldowns[sn]>0;
    const noMana=sk.manaCost>0&&p.mana<sk.manaCost;
    const disabled=onCd||noMana?'disabled':'';
    let cdText='';
    if(onCd)cdText=` (CD:${p.skillCooldowns[sn]})`;
    if(noMana)cdText=` (法力不足)`;
    const instantTag=sk.instant?'⚡':'';
    const manaTag=sk.manaCost>0?`[${sk.manaCost}MP]`:'[免费]';
    skillBtns+=`<button class="btn btn-primary" ${disabled} onclick="useSkill('${sn}')" title="${sk.desc} | ${sk.instant?'瞬发':''} | 冷却:${sk.cooldown}回合 | 消耗:${sk.manaCost}MP">${instantTag} ${sn} ${manaTag}${cdText}</button>`;
  });
  let potionBtns='';
  p.potions.forEach((pot,i)=>{
    potionBtns+=`<button class="btn btn-success" onclick="usePotion(${i})">🧪 ${pot.name}(${pot.qty})</button>`;
  });

  let badges='';
  if(State.shieldTurns>0)badges+=`<div style="color:#44aaff;font-size:11px;" title="减伤50%">🛡️ 护盾 ${State.shieldTurns}回合</div>`;
  if(enemy.shieldTurns>0)badges+=`<div style="color:#ff8844;font-size:11px;" title="敌人减伤50%">🛡️ 敌人护盾 ${enemy.shieldTurns}回合</div>`;
  p.buffs.forEach(b=>{
    let label='';
    if(b.stat==='atk')label='⬆️ 攻击提升';
    else if(b.stat==='def')label='🛡️ 防御';
    else if(b.stat==='spd')label='💨 速度';
    else if(b.stat==='evade')label='👻 回避';
    else if(b.stat==='mana_shield')label='🔮 法力盾';
    else if(b.stat==='counter')label='⚔️ 反击';
    else if(b.stat==='dodge')label='👻 闪避';
    else if(b.stat==='critRate')label='💥 暴击';
    else if(b.stat==='revive')label='🦅 涅槃';
    else label='⬆️ '+b.stat;
    badges+=`<div style="color:#44ff88;font-size:11px;" title="${label}">${label} ${b.turnsLeft}T</div>`;
  });
  p.statusEffects.forEach(e=>{
    const labelMap={poison:'☠️中毒',burn:'🔥灼烧',stun:'⚡眩晕',curse:'💀诅咒',slow:'❄️减速',weaken:'😵虚弱'};
    const label=labelMap[e.type]||('⚠️ '+e.type);
    badges+=`<div style="color:#ff8844;font-size:11px;" title="Debuff效果">${label} ${e.turnsLeft}T</div>`;
  });
  enemy.statusEffects.forEach(e=>{
    const labelMap={poison:'☠️中毒',burn:'🔥灼烧',stun:'⚡眩晕',slow:'❄️减速',weaken:'😵虚弱'};

      <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${hpPct}%"></div></div>

      </div>

    <div style="margin:4px 0;font-size:11px;color:#4488ff;">🔮 法力: ${p.mana}/${p.maxMana}

function playerAttack(){
  if(!State.combat.active)return;
  State.combat.turnCount++;
  const enemy=State.combat.enemy;
  const p=State.player;

  // 检查眩晕
  if(p.statusEffects.some(e=>e.type==='stun')){addLog('你被眩晕了，无法行动！','log-combat');tickStatusEffects();State._playerActing=false;onSpeedTick();return;}

  // 精英词缀：闪避
  if(enemy._eliteMod&&enemy._eliteMod.evasion&&Math.random()<enemy._eliteMod.evasion){
    addLog(`💨 ${enemy.name}躲开了你的攻击！`,'log-combat');
    State._playerActing=false;onSpeedTick();return;
  }
  // 精英词缀：冰冻
  if(enemy._eliteMod&&enemy._eliteMod.freeze&&Math.random()<enemy._eliteMod.freeze){
    p.statusEffects.push({type:'stun',turnsLeft:1});addLog('❄️ 你被冰冻了！','log-combat');
  }

  let dmg=Math.max(1,getEffAtk()-enemy.def);
  // 破甲天赋
  const armorPen=getArmorPen();
  if(armorPen>0){dmg=Math.max(1,getEffAtk()-Math.floor(enemy.def*(1-armorPen)));}
  // 精英/Boss增伤
  if(enemy._eliteMod&&p.talents.t19)dmg=Math.floor(dmg*(1+p.talents.t19*0.20));
  if(enemy.skill&&p.talents.t20)dmg=Math.floor(dmg*(1+p.talents.t20*0.25));
  // 连击加成
  p._combo++;
  if(p._combo>=3)dmg=Math.floor(dmg*(1+(p._combo-2)*getComboBonus()*0.1));
  // 玩家虚弱效果
  if(p.statusEffects.some(e=>e.type==='weaken'))dmg=Math.floor(dmg*0.7);
  // 暴击
  const crit=Math.random()<getCritRate();
  if(crit){dmg=Math.floor(dmg*getCritDmg());addLog(`💥 暴击！`,'log-critical');screenShake();if(dmg>p._maxCritDmg)p._maxCritDmg=dmg;}
  if(enemy.shieldTurns>0)dmg=Math.floor(dmg*0.5);
  State.combat.enemyHp-=dmg;
  // 武器特效
  if(p.equipment.weapon&&p.equipment.weapon.onHit){
    if(p.equipment.weapon.onHit==='poison'&&Math.random()<0.3){enemy.statusEffects.push({type:'poison',turnsLeft:3,value:Math.floor(dmg*0.2)});addLog('🔮 武器特效：敌人中毒了！','log-system');}
    if(p.equipment.weapon.onHit==='burn'&&Math.random()<0.3){enemy.statusEffects.push({type:'burn',turnsLeft:3,value:Math.floor(dmg*0.25)});addLog('🔥 武器特效：敌人被灼烧！','log-system');}
    if(p.equipment.weapon.onHit==='lifesteal'&&Math.random()<0.25){const heal=Math.floor(dmg*0.2);p.hp=Math.min(p.maxHp,p.hp+heal);addLog(`🩸 噬魂：吸取 ${heal}HP`,'log-heal');}
    if(p.equipment.weapon.onHit==='stun'&&Math.random()<0.2){enemy.statusEffects.push({type:'stun',turnsLeft:1});addLog('⚡ 武器特效：敌人被眩晕！','log-system');}
    if(p.equipment.weapon.onHit==='slow'&&Math.random()<0.35){enemy.statusEffects.push({type:'slow',turnsLeft:2,value:0.3});addLog('❄️ 武器特效：敌人被减速！','log-system');}
  }
  // 生命偷取
  if(getLifesteal()>0){const heal=Math.floor(dmg*getLifesteal());p.hp=Math.min(p.maxHp,p.hp+heal);if(heal>0)addLog(`🩸 生命偷取 +${heal}HP`,'log-heal');}
  addLog(`你攻击了${enemy.name}，造成 ${dmg} 点伤害！`,'log-damage');
  floatDamage(crit?'-'+dmg+'!':'-'+dmg,crit?'crit':'normal');
  triggerPetEffect();
  updateComboDisplay();updateTopBar();
  checkCombatEnd();if(State.combat.active){State._playerActing=false;onSpeedTick();}
}

function useSkill(skillName){
  if(!State.combat.active)return;
  updateDailyQuestProgress('useSkill',1);
  const skill=GameData.playerSkills[skillName];const enemy=State.combat.enemy;const p=State.player;
  if(!skill)return;
  const skillMult=getSkillMultiplier(skillName);
  // 冷却检查
  if(p.skillCooldowns[skillName]&&p.skillCooldowns[skillName]>0){
    addLog(`【${skillName}】冷却中，剩余${p.skillCooldowns[skillName]}回合`,'log-system');return;
  }
  // 法力检查
  if(skill.manaCost>0&&p.mana<skill.manaCost){
    addLog('法力不足！','log-system');return;
  }

  State.combat.turnCount++;
  // 眩晕检查（在消耗前检查，但这里先消耗法力再检查眩晕）
  if(p.statusEffects.some(e=>e.type==='stun')){addLog('你被眩晕了，无法行动！','log-combat');tickStatusEffects();State._playerActing=false;onSpeedTick();return;}

  // 消耗法力（终焉审判/法力审判消耗全部）
  let consumedMana=0;
  if(skill.type==='damage_allmana'){consumedMana=p.mana;p.mana=0;}else{p.mana-=skill.manaCost;}
  // 设置冷却
  if(skill.cooldown>0){p.skillCooldowns[skillName]=skill.cooldown;}

  p._combo++;
  if(skill.type==='damage'||skill.type==='damage_debuff'||skill.type==='damage_poison'||skill.type==='damage_stun'||skill.type==='damage_manaburn'||skill.type==='damage_selfharm'||skill.type==='damage_lifesteal'||skill.type==='damage_crit'||skill.type==='damage_slow'||skill.type==='damage_burn'||skill.type==='damage_evade'||skill.type==='damage_allmana'||skill.type==='damage_pen'||skill.type==='damage_boss'||skill.type==='damage_weaken'||skill.type==='damage_true'||skill.type==='damage_tripledot'||skill.type==='damage_heal'||skill.type==='damage_skip'||skill.type==='damage_execute'||skill.type==='damage_crit_true'){
    let mult=skillMult;
    if(skill.type==='damage_allmana')mult=Math.max(1,skillMult*(consumedMana+skill.manaCost)/skill.manaCost);
    let dmg;
    if(skill.type==='damage_true'){
      // 无视防御
      dmg=Math.max(1,Math.floor(getEffAtk()*mult));
      addLog('⚡ 无视防御！','log-critical');
    }else{
      dmg=Math.max(1,Math.floor(getEffAtk()*mult-enemy.def));
    }
    // 破甲天赋
    if(p.talents.t14){const pen=Math.min(1,p.talents.t14*0.15);dmg=Math.max(1,Math.floor(getEffAtk()*mult-enemy.def*(1-pen)));}
    if(p._combo>=3)dmg=Math.floor(dmg*(1+(p._combo-2)*getComboBonus()*0.1));
    if(p.statusEffects.some(e=>e.type==='weaken'))dmg=Math.floor(dmg*0.7);
    if(enemy.shieldTurns>0)dmg=Math.floor(dmg*0.5);
    const crit=skill.type==='damage_crit'?true:Math.random()<getCritRate();
    if(crit){dmg=Math.floor(dmg*getCritDmg());addLog('💥 暴击！','log-critical');screenShake();screenFlash('rgba(255,200,0,0.3)');if(dmg>p._maxCritDmg)p._maxCritDmg=dmg;}
    // 精英/Boss增伤
    if(enemy._eliteMod&&p.talents.t19)dmg=Math.floor(dmg*(1+p.talents.t19*0.20));
    if(enemy.skill&&p.talents.t20)dmg=Math.floor(dmg*(1+p.talents.t20*0.25));
    // 穿透防御（暗影箭）
    if(skill.type==='damage_pen'){dmg=Math.max(1,Math.floor(getEffAtk()*mult-enemy.def*0.7));addLog('🗡️ 暗影箭穿透了敌人的防御！','log-system');}
    // Boss增伤（雷霆风暴）
    if(skill.type==='damage_boss'){let bossBonus=1;if(enemy.skill||enemy._eliteMod)bossBonus=1.5;dmg=Math.floor(dmg*bossBonus);if(bossBonus>1)addLog('⚡ 雷霆风暴对强敌造成额外伤害！','log-critical');}
    State.combat.enemyHp-=dmg;
    addLog(`你使用【${skillName}】攻击${enemy.name}，造成 ${dmg} 点伤害！`,'log-damage');
    floatDamage(crit?'-'+dmg+'!':'-'+dmg,crit?'crit':'normal');
    if(skill.type==='damage_debuff'){enemy.debuffed=true;enemy.def=Math.floor(enemy.def*0.6);addLog(`${enemy.name}的防御力降低了！`,'log-info');}
    if(skill.type==='damage_poison'){enemy.statusEffects.push({type:'poison',turnsLeft:3,value:Math.floor(dmg*0.3)});addLog('☠️ 敌人中毒了！','log-system');}
    if(skill.type==='damage_burn'){enemy.statusEffects.push({type:'burn',turnsLeft:3,value:Math.floor(dmg*0.25)});addLog('🔥 敌人被灼烧了！','log-system');}
    if(skill.type==='damage_stun'&&Math.random()<0.3){enemy.statusEffects.push({type:'stun',turnsLeft:1});addLog('⚡ 敌人被眩晕了！','log-system');}
    if(skill.type==='damage_slow'){enemy.statusEffects.push({type:'slow',turnsLeft:2,value:0.3});addLog('❄️ 敌人被减速了！','log-system');}
    if(skill.type==='damage_lifesteal'){const heal=Math.floor(dmg*0.3);p.hp=Math.min(p.maxHp,p.hp+heal);addLog(`🩸 吸血恢复 ${heal}HP`,'log-heal');}
    if(skill.type==='damage_evade'){p.buffs.push({stat:'evade',turnsLeft:1});addLog('💨 获得回避效果！','log-system');}
    if(skill.type==='damage_weaken'){enemy.statusEffects.push({type:'weaken',turnsLeft:2,value:0.3});addLog('💀 敌人被虚弱了！','log-system');}
    if(skill.type==='damage_manaburn'){enemy._mana=Math.max(0,(enemy._mana||0)-50);addLog('🔮 消耗了敌人50点法力！','log-system');}
    if(skill.type==='damage_selfharm'){const selfDmg=Math.floor(dmg*0.15);p.hp=Math.max(1,p.hp-selfDmg);addLog(`💔 灵魂燃烧反噬自身 ${selfDmg}HP`,'log-damage');}
  }else if(skill.type==='multi_hit'){
    for(let i=0;i<2;i++){
      let dmg=Math.max(1,Math.floor(getEffAtk()*skillMult-enemy.def));
      if(enemy.shieldTurns>0)dmg=Math.floor(dmg*0.5);
      State.combat.enemyHp-=dmg;
      addLog(`连斩第${i+1}击，造成 ${dmg} 点伤害！`,'log-damage');
    }
  }else if(skill.type==='heal'){
    let heal=Math.floor(p.maxHp*skillMult);
    p.hp=Math.min(p.maxHp,p.hp+heal);
    addLog(`你使用【${skillName}】，恢复了 ${heal} 点生命！`,'log-heal');
    floatDamage('+'+heal,'heal');
  }else if(skill.type==='buff'){
    p.buffs.push({stat:'atk',multiplier:skillMult,turnsLeft:3});
    addLog(`你使用【${skillName}】，攻击力提升了！持续3回合。`,'log-system');
  }else if(skill.type==='buff_spd'){
    p.buffs.push({stat:'spd',multiplier:skillMult,turnsLeft:2});
    addLog(`你使用【${skillName}】，速度大幅提升！持续2回合。`,'log-system');
  }else if(skill.type==='shield'){
    State.shieldTurns=2;
    addLog(`你使用【${skillName}】，获得护盾！减伤${Math.floor(skillMult*100)}%，持续2回合。`,'log-system');
  }else if(skill.type==='mana_shield'){
    p.buffs.push({stat:'mana_shield',turnsLeft:2});
    addLog(`你使用【${skillName}】，法力将抵挡伤害！持续2回合。`,'log-system');
  }else if(skill.type==='counter'){
    p.buffs.push({stat:'counter',multiplier:skillMult,turnsLeft:2});
    addLog(`你使用【${skillName}】，获得反击效果！持续2回合。`,'log-system');
  }else if(skill.type==='steal'){
    const steal=Math.floor(State.combat.enemyMaxHp*skillMult);
    State.combat.enemyHp-=steal;p.hp=Math.min(p.maxHp,p.hp+steal);
    addLog(`你使用【${skillName}】，汲取${enemy.name} ${steal} 点生命！`,'log-damage');
  }else if(skill.type==='ultra_buff'){
    p.buffs.push({stat:'atk',multiplier:skillMult,turnsLeft:5});
    p.buffs.push({stat:'def',multiplier:skillMult,turnsLeft:5});
    p.buffs.push({stat:'spd',multiplier:skillMult,turnsLeft:5});
    addLog(`你使用【${skillName}】，全属性暴增！持续5回合。`,'log-system');
  }else if(skill.type==='recoverMana'){
    p.mana=Math.min(p.maxMana,p.mana+30);
    addLog(`你使用【${skillName}】，恢复了30点法力！`,'log-system');
  }else if(skill.type==='stun_enemy'){
    enemy.statusEffects.push({type:'stun',turnsLeft:2});
    addLog(`你使用【${skillName}】，敌人被时停2回合！`,'log-system');
  }else if(skill.type==='manaToHp'){
    const convert=Math.floor(p.mana*skillMult);
    p.hp=Math.min(p.maxHp,p.hp+convert);
    addLog(`你使用【${skillName}】，将法力转化为 ${convert} 点生命！`,'log-heal');
  }else if(skill.type==='revive'){
    p.buffs.push({stat:'revive',turnsLeft:99});
    addLog(`你使用【${skillName}】，获得凤凰涅槃效果！死亡时自动满血复活。`,'log-system');
  }else if(skill.type==='invincible'){
    p.buffs.push({stat:'invincible',turnsLeft:1});
    p.buffs.push({stat:'counter',turnsLeft:2});
    addLog(`你使用【${skillName}】，获得无敌效果！持续1回合。`,'log-system');
  }else if(skill.type==='buff_evade'){
    p.buffs.push({stat:'evade',turnsLeft:1});
    p.buffs.push({stat:'spd',multiplier:skillMult,turnsLeft:2});
    addLog(`你使用【${skillName}】，获得回避效果+速度提升！`,'log-system');
  }else if(skill.type==='shield_heal'){
    State.shieldTurns=2;
    const heal=Math.floor(p.maxHp*skillMult);
    p.hp=Math.min(p.maxHp,p.hp+heal);
    addLog(`你使用【${skillName}】，获得护盾+恢复${heal}HP！`,'log-system');
  }else if(skill.type==='blood_rage'){
    const costHp=Math.floor(p.hp*0.2);
    p.hp=Math.max(1,p.hp-costHp);

    addLog(`你使用【${skillName}】，消耗${costHp}HP，攻击力翻倍！持续3回合。`,'log-system');
  }else if(skill.type==='buff_dodge'){
    p.buffs.push({stat:'dodge',multiplier:skillMult,turnsLeft:2});
    addLog(`你使用【${skillName}】，闪避率大幅提升！持续2回合。`,'log-system');
  }else if(skill.type==='damage_tripledot'){
    let dmg=Math.max(1,Math.floor(getEffAtk()*skillMult-enemy.def));
    if(enemy.shieldTurns>0)dmg=Math.floor(dmg*0.5);
    State.combat.enemyHp-=dmg;
    enemy.statusEffects.push({type:'poison',turnsLeft:2,value:Math.floor(dmg*0.2)});
    enemy.statusEffects.push({type:'burn',turnsLeft:2,value:Math.floor(dmg*0.2)});
    enemy.statusEffects.push({type:'weaken',turnsLeft:2,value:0.15});
    addLog(`你使用【${skillName}】，造成${dmg}伤害，附加中毒+灼烧+虚弱！`,'log-damage');
  }else if(skill.type==='damage_heal'){
    let dmg=Math.max(1,Math.floor(getEffAtk()*skillMult-enemy.def));
    if(enemy.shieldTurns>0)dmg=Math.floor(dmg*0.5);
    State.combat.enemyHp-=dmg;
    const heal=Math.floor(p.maxHp*0.3);
    p.hp=Math.min(p.maxHp,p.hp+heal);
    addLog(`你使用【${skillName}】，造成${dmg}伤害，恢复${heal}HP！`,'log-damage');
