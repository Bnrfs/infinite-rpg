  }else if(skill.type==='ultra_cleanse'){
    p.statusEffects=[];p.buffs.push({stat:'atk',multiplier:1.2,turnsLeft:3});p.buffs.push({stat:'def',multiplier:1.2,turnsLeft:3});p.buffs.push({stat:'spd',multiplier:1.2,turnsLeft:3});
    addLog('✨ 元素爆发！清除所有负面状态，全属性+120%！','log-system');
  }else if(skill.type==='invincible_heal'){
    p.buffs.push({stat:'invincible',turnsLeft:2});
    const heal=Math.floor(p.maxHp*0.5);
    p.hp=Math.min(p.maxHp,p.hp+heal);
    addLog(`✨ 刹那永恒！无敌2回合，恢复${heal}HP！`,'log-system');
  }else if(skill.type==='damage_execute'){
    let dmg=Math.max(1,Math.floor(getEffAtk()*skillMult-enemy.def));
    if(enemy.shieldTurns>0)dmg=Math.floor(dmg*0.5);
    const heal=Math.floor(dmg);
    p.hp=Math.min(p.maxHp,p.hp+heal);
    let executed=false;
    if(Math.random()<0.5){executed=true;State.combat.enemyHp=0;addLog('💀 虚无吞噬触发即死效果！','log-critical');}
    else{State.combat.enemyHp-=dmg;addLog(`虚无吞噬造成${dmg}伤害，吸血${heal}HP！`,'log-damage');}
  }else if(skill.type==='ultra_revive'){
    p.buffs.push({stat:'atk',multiplier:2.0,turnsLeft:3});p.buffs.push({stat:'def',multiplier:2.0,turnsLeft:3});p.buffs.push({stat:'spd',multiplier:2.0,turnsLeft:3});p.buffs.push({stat:'revive',turnsLeft:99});
    addLog('🌟 创世之光！全属性+200%，获得复活效果！','log-system');
  }else if(skill.type==='damage_crit_true'){
    let dmg=Math.max(1,Math.floor(getEffAtk()*skillMult));
    dmg=Math.floor(dmg*getCritDmg());
    State.combat.enemyHp-=dmg;
    addLog(`👑 尽头·王座！无视防御暴击造成${dmg}伤害！`,'log-critical');
    screenShake();screenFlash('rgba(255,200,0,0.5)');
  }else if(skill.type==='ultra_debuff'){
    enemy.statusEffects.push({type:'stun',turnsLeft:2});enemy.statusEffects.push({type:'weaken',turnsLeft:3,value:0.6});
    enemy.atk=Math.floor(enemy.atk*0.4);enemy.def=Math.floor(enemy.def*0.4);enemy.spd=Math.floor(enemy.spd*0.4);
    addLog('🌀 超维裂隙！敌方全属性-60%且眩晕2回合！','log-system');
  }
  applyBuffs();updateTopBar();updateComboDisplay();triggerPetEffect();
  checkCombatEnd();if(State.combat.active)State._playerActing=false;onSpeedTick();
}

function usePotion(idx){
  if(!State.combat.active)return;
  const pot=State.player.potions[idx];
  if(pot.qty<=0)return;
  const p=State.player;
  if(p.statusEffects.some(e=>e.type==='stun')){addLog('你被眩晕了，无法使用道具！','log-combat');return;}
  pot.qty--;
  if(pot.heal>0){p.hp=Math.min(p.maxHp,p.hp+pot.heal);addLog(`使用${pot.name}，恢复${pot.heal}HP！`,'log-heal');}
  if(pot.clearPoison){p.statusEffects=p.statusEffects.filter(e=>e.type!=='poison');addLog('中毒效果已清除！','log-heal');}
  if(pot.clearAll){p.statusEffects=[];p.hp=p.maxHp;addLog('所有负面效果已清除，生命完全恢复！','log-heal');}
  if(pot.buffAtk){p.buffs.push({stat:'atk',multiplier:pot.buffAtk,turnsLeft:pot.buffTurns});addLog(`攻击力提升${Math.floor(pot.buffAtk*100)}%！持续${pot.buffTurns}回合。`,'log-system');}
  if(pot.buffDef){p.buffs.push({stat:'def',multiplier:pot.buffDef,turnsLeft:pot.buffTurns});addLog(`防御力提升${Math.floor(pot.buffDef*100)}%！持续${pot.buffTurns}回合。`,'log-system');}
  if(pot.buffSpd){p.buffs.push({stat:'spd',multiplier:pot.buffSpd,turnsLeft:pot.buffTurns});addLog(`速度提升${Math.floor(pot.buffSpd*100)}%！持续${pot.buffTurns}回合。`,'log-system');}
  if(pot.buffCrit){p.buffs.push({stat:'critRate',multiplier:pot.buffCrit,turnsLeft:pot.buffTurns});addLog(`暴击率提升${Math.floor(pot.buffCrit*100)}%！持续${pot.buffTurns}回合。`,'log-system');}
  if(pot.restoreMana){p.mana=Math.min(p.maxMana,p.mana+pot.restoreMana);addLog(`使用${pot.name}，恢复${pot.restoreMana}MP！`,'log-heal');}
  if(pot.revive){p.buffs.push({stat:'revive',turnsLeft:99});addLog(`使用${pot.name}，获得了复活能力！`,'log-system');}
  if(pot.giveShield){State.shieldTurns=pot.giveShield;addLog(`使用${pot.name}，获得${pot.giveShield}回合护盾！`,'log-system');}
  if(pot.qty<=0)State.player.potions.splice(idx,1);
  State._playerActing=false;onSpeedTick();
}

function playerDefend(){
  if(!State.combat.active)return;
  State.combat.turnCount++;
  State.player.buffs.push({stat:'def',multiplier:0.5,turnsLeft:1});
  State.player.buffs.push({stat:'spd',multiplier:0.3,turnsLeft:1});
  addLog('你采取了防御姿态，本回合减伤50%并获得速度提升！','log-info');
  State._playerActing=false;onSpeedTick();
}

const SPEED_TICK_MS=50; // 每50ms刷新一次速度条
const SPEED_FILL_TIME_MS=3000; // 最快者3秒填满

function advanceSpeedBars(){
  if(!State.combat||!State.combat.active)return;
  const p=State.player;const e=State.combat.enemy;
  const pSpd=getEffSpd();
  const eSpd=e.spd;
  // 新速度条填充公式：最快者每3秒填满，慢者按比例放慢
  const maxSpd=Math.max(pSpd,eSpd,1);
  const ticksToFill=SPEED_FILL_TIME_MS/SPEED_TICK_MS; // 60 ticks
  const baseFillPerTick=100/ticksToFill; // 约1.667
  State.combat.playerSpeedBar+=(pSpd/maxSpd)*baseFillPerTick;
  State.combat.enemySpeedBar+=(eSpd/maxSpd)*baseFillPerTick;
  // 生命再生天赋（每50ms tick，折算为每秒值）
  if(p.talents.t22){const regen=Math.floor(p.maxHp*(p.talents.t22*0.0015));if(regen>0)p.hp=Math.min(p.maxHp,p.hp+regen);}
  // 法力回复天赋（每50ms tick，折算为每秒值）
  if(p.talents.t12){const regen=Math.floor(p.maxMana*(p.talents.t12*0.0025));if(regen>0)p.mana=Math.min(p.maxMana,p.mana+regen);}
}

function startSpeedTick(){
  if(State._speedTickId)return;
  State._speedTickId=setInterval(onSpeedTick,SPEED_TICK_MS);
}

function stopSpeedTick(){
  if(State._speedTickId){clearInterval(State._speedTickId);State._speedTickId=null;}
  State._playerActing=false;
  State._enemyActing=false;
}

function onSpeedTick(){
  if(!State.combat||!State.combat.active){stopSpeedTick();return;}
  if(State._enemyActing||State._playerActing)return; // 有人正在行动时暂停

  advanceSpeedBars();
  updateSpeedBarDisplay(); // 实时更新速度条视觉效果

  const p=State.player;const e=State.combat.enemy;
  const pBar=State.combat.playerSpeedBar;
  const eBar=State.combat.enemySpeedBar;

  // 双方同时满条：玩家优先
  if(pBar>=100&&eBar>=100){
    State._playerActing=true;
    onPlayerCanAct();
    return;
  }
  // 玩家满条
  if(pBar>=100){
    State._playerActing=true;
    onPlayerCanAct();
    return;
  }
  // 敌人满条
  if(eBar>=100){
    State._enemyActing=true;
    onEnemyCanAct();
    return;
  }
}

function onPlayerCanAct(){
  if(!State.combat||!State.combat.active)return;
  State.combat.playerSpeedBar=Math.max(0,State.combat.playerSpeedBar-100);
  const p=State.player;
  // 减少玩家buff/debuff持续时间
  p.buffs.forEach(b=>b.turnsLeft--);
  p.buffs=p.buffs.filter(b=>b.turnsLeft>0);
  tickStatusEffects();
  // 减少技能冷却
  Object.keys(p.skillCooldowns).forEach(k=>{if(p.skillCooldowns[k]>0)p.skillCooldowns[k]--;});
  // 技能共鸣 (t39) - 概率额外减少冷却
  if(p.talents.t39){Object.keys(p.skillCooldowns).forEach(k=>{if(p.skillCooldowns[k]>0&&Math.random()<p.talents.t39*0.005)p.skillCooldowns[k]--;});}
  // 时之精灵宠物 - 额外减少冷却
  if(p.pet&&p.pet.skill==='time'&&Math.random()<0.3*p.petLevel){Object.keys(p.skillCooldowns).forEach(k=>{if(p.skillCooldowns[k]>0)p.skillCooldowns[k]--;});}
  applyBuffs();updateTopBar();
  checkCombatEnd();
  if(!State.combat.active)return;

  if(State.autoBattle){
    // 自动战斗：AI自动选择行动
    State._playerActing=false;
    const delay=State.combatSpeed>=4?0:State.combatSpeed>=2?200:600;
    if(delay>0){
      setTimeout(()=>{autoBattleAct();},delay);
    }else{
      autoBattleAct();
    }
  }else{
    // 手动模式：显示战斗UI让玩家选择
    showCombatUI();
  }
}

function onEnemyCanAct(){
  if(!State.combat||!State.combat.active){State._enemyActing=false;return;}
  State.combat.enemySpeedBar=Math.max(0,State.combat.enemySpeedBar-100);
  enemyTurn();
  State._enemyActing=false;
  // 敌人行动后检查是否玩家可以立即行动
  onSpeedTick();
}

// 更新速度条显示（不重绘整个UI）
function updateSpeedBarDisplay(){
  const pBar=document.getElementById('player-speed-fill');
  const eBar=document.getElementById('enemy-speed-fill');
  const pText=document.getElementById('player-speed-text');
  const eText=document.getElementById('enemy-speed-text');
  if(!State.combat||!State.combat.active){return;}
  const pPct=Math.min(100,State.combat.playerSpeedBar);
  const ePct=Math.min(100,State.combat.enemySpeedBar);
  if(pBar)pBar.style.width=pPct+'%';
  if(eBar)eBar.style.width=ePct+'%';
  if(pText)pText.textContent=Math.floor(pPct)+'%';
  if(eText)eText.textContent=Math.floor(ePct)+'%';
}

function tickStatusEffects(){
  const p=State.player;
  if(!State.combat||!State.combat.active)return;
  const enemy=State.combat.enemy;
  // 玩家状态
  p.statusEffects.forEach(e=>{
    if(e.type==='poison'){const dmg=Math.floor(p.maxHp*0.05);p.hp-=dmg;addLog(`☠️ 中毒伤害 -${dmg}HP`,'log-damage');}
    if(e.type==='burn'){const dmg=Math.floor(p.maxHp*0.06);p.hp-=dmg;addLog(`🔥 灼烧伤害 -${dmg}HP`,'log-damage');}
    if(e.type==='curse'){addLog('💀 诅咒之力削弱着你...','log-damage');}
  });
  p.statusEffects.forEach(e=>e.turnsLeft--);
  p.statusEffects=p.statusEffects.filter(e=>e.turnsLeft>0);
  // 敌人状态
  if(enemy){
    enemy.statusEffects.forEach(e=>{
      if(e.type==='poison'){let dmg=e.value;if(p.talents.t17)dmg=Math.floor(dmg*(1+p.talents.t17*0.30));State.combat.enemyHp-=dmg;addLog(`☠️ ${enemy.name}中毒 -${dmg}HP`,'log-damage');}
      if(e.type==='burn'){let dmg=e.value;if(p.talents.t18)dmg=Math.floor(dmg*(1+p.talents.t18*0.30));State.combat.enemyHp-=dmg;addLog(`🔥 ${enemy.name}灼烧 -${dmg}HP`,'log-damage');}
    });
    enemy.statusEffects.forEach(e=>e.turnsLeft--);
    enemy.statusEffects=enemy.statusEffects.filter(e=>e.turnsLeft>0);
  }
}

function enemyTurn(){
  if(!State.combat.active)return;
  const enemy=State.combat.enemy;
  if(enemy.shieldTurns>0)enemy.shieldTurns--;
  if(State.shieldTurns>0)State.shieldTurns--;

  // 敌人减速检查
  if(enemy.statusEffects.some(e=>e.type==='slow')){
    if(Math.random()<0.3){addLog(`${enemy.name}被减速了，行动迟缓，无法行动！`,'log-combat');
      tickStatusEffects();
      State.player.buffs.forEach(b=>b.turnsLeft--);
      State.player.buffs=State.player.buffs.filter(b=>b.turnsLeft>0);
      applyBuffs();updateTopBar();
      checkCombatEnd();return;
    }
  }

  // 敌人眩晕检查
  if(enemy.statusEffects.some(e=>e.type==='stun')){
    addLog(`${enemy.name}被眩晕了，无法行动！`,'log-combat');
    tickStatusEffects();
    State.player.buffs.forEach(b=>b.turnsLeft--);
    State.player.buffs=State.player.buffs.filter(b=>b.turnsLeft>0);
    applyBuffs();updateTopBar();
    checkCombatEnd();return;
  }

  // 精英词缀：再生
  if(enemy._eliteMod&&enemy._eliteMod.regen){
    const regen=Math.floor(State.combat.enemyMaxHp*enemy._eliteMod.regen);
    State.combat.enemyHp=Math.min(State.combat.enemyMaxHp,State.combat.enemyHp+regen);
    if(regen>0)addLog(`💚 ${enemy.name}再生恢复了${regen}HP`,'log-heal');
  }

  // 先触发状态效果
  tickStatusEffects();

  let skillUsed=false;
  if(enemy.skill&&State.combat.turnCount>=2&&Math.random()<0.35){
    const sd=GameData.enemySkills[enemy.skill];
    if(sd){
      if(sd.type==='damage'||sd.type==='damage_debuff'||sd.type==='damage_burn'||sd.type==='damage_poison'||sd.type==='damage_slow'||sd.type==='damage_stun'||sd.type==='damage_lifesteal'||sd.type==='damage_tripledot'||sd.type==='damage_pen'||sd.type==='damage_weaken'||sd.type==='damage_execute'){
        let rawDmg;if(sd.type==='damage_pen'){rawDmg=Math.max(1,Math.floor(enemy.atk*sd.multiplier-getEffDef()*0.7));}else{rawDmg=Math.max(1,Math.floor(enemy.atk*sd.multiplier-getEffDef()));}
        // 无敌效果
        if(p.buffs.some(b=>b.stat==='invincible'&&b.turnsLeft>0)){rawDmg=0;addLog('🛡️ 无敌效果抵御了所有伤害！','log-system');}
        // 虚弱效果
        if(enemy.statusEffects.some(e=>e.type==='weaken')){rawDmg=Math.floor(rawDmg*0.7);}
        // 闪避
        if(Math.random()<getDodgeRate()||p.buffs.some(b=>b.stat==='evade'&&b.turnsLeft>0)){addLog('💨 你闪避了攻击！','log-system');rawDmg=0;
          const evadeIdx=p.buffs.findIndex(b=>b.stat==='evade');if(evadeIdx>=0)p.buffs.splice(evadeIdx,1);}
        // 法力护盾
        if(rawDmg>0&&p.buffs.some(b=>b.stat==='mana_shield'&&b.turnsLeft>0)){
          const blocked=Math.min(p.mana,rawDmg);p.mana-=blocked;rawDmg-=blocked;
          addLog(`🛡️ 法力护盾抵挡了 ${blocked} 点伤害！`,'log-system');
        }
        if(State.shieldTurns>0)rawDmg=Math.floor(rawDmg*0.5);
        if(p._fateShield>0){rawDmg=0;addLog('🎡 命运之轮护盾吸收了所有伤害！','log-system');p._fateShield--;}
        // 坚韧天赋 + 轮回减伤
        const dmgRed=getDmgReduction();
        if(dmgRed>0)rawDmg=Math.floor(rawDmg*(1-Math.min(0.9,dmgRed)));
        if(rawDmg>0){State.player.hp-=rawDmg;addLog(`${enemy.name}使用【${enemy.skill}】，造成 ${rawDmg} 点伤害！`,'log-combat');floatDamage('-'+rawDmg,'normal');}
        if(sd.type==='damage_debuff'){State.player.buffs.push({stat:'def',multiplier:-0.3,turnsLeft:2});addLog('你的防御力被降低了！','log-combat');}
        if(sd.type==='damage_burn'){State.player.statusEffects.push({type:'burn',turnsLeft:3,value:Math.floor(rawDmg*0.2)});addLog('你被灼烧了！','log-combat');}
        if(sd.type==='damage_poison'){State.player.statusEffects.push({type:'poison',turnsLeft:3,value:Math.floor(rawDmg*0.2)});addLog('你中毒了！','log-combat');}
        if(sd.type==='damage_slow'){State.player.statusEffects.push({type:'slow',turnsLeft:2,value:0});addLog('你的速度被降低了！','log-combat');}
        if(sd.type==='damage_stun'&&Math.random()<0.3){State.player.statusEffects.push({type:'stun',turnsLeft:1,value:0});addLog('你被眩晕了！','log-combat');}
        if(sd.type==='damage_lifesteal'){const heal=Math.floor(rawDmg*0.3);State.combat.enemyHp=Math.min(State.combat.enemyMaxHp,State.combat.enemyHp+heal);addLog(`${enemy.name}吸取了 ${heal}HP`,'log-combat');}
        if(sd.type==='damage_tripledot'){State.player.statusEffects.push({type:'burn',turnsLeft:3,value:Math.floor(rawDmg*0.2)});State.player.statusEffects.push({type:'poison',turnsLeft:3,value:Math.floor(rawDmg*0.2)});addLog('你被灼烧和中毒了！','log-combat');}
        if(sd.type==='damage_weaken'){State.player.statusEffects.push({type:'weaken',turnsLeft:2,value:0.3});addLog('你的属性被削弱了！','log-combat');}
        if(sd.type==='damage_execute'&&Math.random()<0.5){State.player.hp=Math.max(0,State.player.hp-Math.floor(State.player.maxHp*0.5));addLog('💀 即死判定：你受到最大生命值50%的伤害！','log-combat');}
      }else if(sd.type==='heal'){
        let heal=Math.floor(State.combat.enemyMaxHp*sd.multiplier);
        State.combat.enemyHp=Math.min(State.combat.enemyMaxHp,State.combat.enemyHp+heal);
        addLog(`${enemy.name}使用【${enemy.skill}】，恢复${heal}HP！`,'log-combat');
      }else if(sd.type==='shield'){enemy.shieldTurns=2;addLog(`${enemy.name}使用【${enemy.skill}】，获得护盾！`,'log-combat');}
      else if(sd.type==='buff'){enemy.atkBuffed=true;enemy.atk=Math.floor(enemy.atk*(1+sd.multiplier));addLog(`${enemy.name}使用【${enemy.skill}】，攻击力提升！`,'log-combat');}
      skillUsed=true;
    }
  }
  if(!skillUsed){
    let rawDmg=Math.max(1,enemy.atk-getEffDef());
    // 无敌效果
    if(p.buffs.some(b=>b.stat==='invincible'&&b.turnsLeft>0)){rawDmg=0;addLog('🛡️ 无敌效果抵御了所有伤害！','log-system');}
    // 虚弱效果
    if(enemy.statusEffects.some(e=>e.type==='weaken')){rawDmg=Math.floor(rawDmg*0.7);}
    if(Math.random()<getDodgeRate()||p.buffs.some(b=>b.stat==='evade'&&b.turnsLeft>0)){addLog('💨 你闪避了攻击！','log-system');rawDmg=0;
      const evadeIdx=p.buffs.findIndex(b=>b.stat==='evade');if(evadeIdx>=0)p.buffs.splice(evadeIdx,1);}
    // 法力护盾
    if(rawDmg>0&&p.buffs.some(b=>b.stat==='mana_shield'&&b.turnsLeft>0)){
      const blocked=Math.min(p.mana,rawDmg);p.mana-=blocked;rawDmg-=blocked;
      addLog(`🛡️ 法力护盾抵挡了 ${blocked} 点伤害！`,'log-system');
    }
    if(State.shieldTurns>0)rawDmg=Math.floor(rawDmg*0.5);
    if(p._fateShield>0){rawDmg=0;addLog('🎡 命运之轮护盾吸收了所有伤害！','log-system');p._fateShield--;}
    // 坚韧天赋 + 轮回减伤
    const dmgRed2=getDmgReduction();
    if(dmgRed2>0)rawDmg=Math.floor(rawDmg*(1-Math.min(0.9,dmgRed2)));
    if(rawDmg>0){State.player.hp-=rawDmg;addLog(`${enemy.name}攻击了你，造成 ${rawDmg} 点伤害！`,'log-damage');floatDamage('-'+rawDmg,'normal');}
    // 反击
    if(rawDmg>0&&p.buffs.some(b=>b.stat==='counter'&&b.turnsLeft>0)){
      const counterDmg=Math.floor(getEffAtk()*0.4);State.combat.enemyHp-=counterDmg;
      addLog(`⚔️ 反击！对${enemy.name}造成 ${counterDmg} 点伤害！`,'log-damage');
    }
    // 荆棘反伤
    if(State.player.equipment.armor&&State.player.equipment.armor.onHit==='thorns'){const reflect=Math.floor(rawDmg*0.2);State.combat.enemyHp-=reflect;if(reflect>0)addLog(`🌿 荆棘反伤 ${enemy.name} -${reflect}HP`,'log-damage');}
  }
  // 精英吸血
  if(enemy._eliteMod&&enemy._eliteMod.lifesteal){const heal=Math.floor(State.player.hp*enemy._eliteMod.lifesteal);State.combat.enemyHp=Math.min(State.combat.enemyMaxHp,State.combat.enemyHp+heal);}
  // 精英剧毒
  if(enemy._eliteMod&&enemy._eliteMod.poison&&Math.random()<0.3){State.player.statusEffects.push({type:'poison',turnsLeft:3,value:Math.floor(State.player.maxHp*0.05)});addLog('☠️ 剧毒侵蚀！你中毒了！','log-damage');}
  // 精英冰霜
  if(enemy._eliteMod&&enemy._eliteMod.freeze&&Math.random()<0.15){State.player.statusEffects.push({type:'stun',turnsLeft:1});addLog('❄️ 冰霜之力冻结了你！','log-combat');}

  State.player.buffs.forEach(b=>b.turnsLeft--);
  State.player.buffs=State.player.buffs.filter(b=>b.turnsLeft>0);
  applyBuffs();updateTopBar();
  autoUsePotion(); // 战斗自动喝药
  checkCombatEnd();
}

function checkCombatEnd(){
  const p=State.player;
  if(State.combat.enemyHp<=0){
    State.combat.active=false;
    stopAutoBattle(); // 停止自动战斗
    stopSpeedTick(); // 停止速度条tick
    const enemy=State.combat.enemy;
    // 检查元素试炼
    if(enemy._isElementalTrial)checkElementalTrialReward();
    addLog(`🎉 你击败了【${enemy.name}】！`,'log-system');
    const victoryFlavor=getVictoryFlavor(enemy);
    if(victoryFlavor)addLog(victoryFlavor,'log-info');
    let gold=enemy.gold;
    if(getGoldBonus()>0)gold=Math.floor(gold*(1+getGoldBonus()));
    p.gold+=gold;p._totalGoldEarned+=gold;
    updateGoldBountyProgress(gold);
    // 连击金币加成 (t37)
    if(p.talents.t37&&p._combo>1){const comboGoldBonus=Math.floor(gold*p._combo*p.talents.t37*0.10);p.gold+=comboGoldBonus;p._totalGoldEarned+=comboGoldBonus;if(comboGoldBonus>0)addLog(`💥 连击x${p._combo}：额外获得 ${comboGoldBonus} 金币！`,'log-loot');}
    addLog(`获得 ${gold} 金币！`,'log-loot');
    // 副本修饰XP/金币加成
    const dm=State.currentDungeonMod;
    let xpMod=1;
    if(dm){
      if(dm.effect==='xpBonus')xpMod+=dm.value;
      if(dm.effect==='goldExp')xpMod+=0.5; // 贪婪陷阱经验+50%
      if(dm.effect==='allBonus')xpMod+=0.5;
    }
    gainXp(Math.floor(enemy.xp*xpMod));
    // 副本修饰额外金币
    if(dm&&dm.effect==='goldBonus'){const bonusGold=Math.floor(gold*dm.value);p.gold+=bonusGold;p._totalGoldEarned+=bonusGold;addLog(`✨ 祝福额外获得 ${bonusGold} 金币！`,'log-loot');}
    if(dm&&dm.effect==='allBonus'){const bonusGold=Math.floor(gold*0.5);p.gold+=bonusGold;p._totalGoldEarned+=bonusGold;addLog(`✨ 混沌赐福额外获得 ${bonusGold} 金币！`,'log-loot');}
    p.killedEnemies++;
    // 赏金追踪
    updateBountyProgress(enemy);
    // 击杀回复 (t36)
    if(p.talents.t36){const killHeal=Math.floor(p.maxHp*p.talents.t36*0.05);p.hp=Math.min(p.maxHp,p.hp+killHeal);if(killHeal>0)addLog(`💚 击杀回复 +${killHeal}HP`,'log-heal');}
    // 猎杀快感 (t38) - 击杀后速度提升
    if(p.talents.t38){p.buffs.push({stat:'spd',multiplier:p.talents.t38*0.02,turnsLeft:1});}
    // 解锁轮回者起源日志（第一场战斗）
    if(p.killedEnemies===1)addLore('lore1');
    // 解锁 lore11（击败50个敌人）
    if(p.killedEnemies>=50&&!p._unlockedLore.includes('lore11'))addLore('lore11');
    // 连胜奖励
    p._winStreak++;
    if(p._winStreak>p._maxWinStreak)p._maxWinStreak=p._winStreak;
    if(p._winStreak>=10){
      const streakBonus=Math.floor(gold*(p._winStreak*0.02));
      p.gold+=streakBonus;p._totalGoldEarned+=streakBonus;
      addLog(`🔥 ${p._winStreak}连胜！额外获得 ${streakBonus} 金币！`,'log-loot');
      updateDailyQuestProgress('winStreak',1);
    }
    // 每日任务追踪
    updateDailyQuestProgress('kills',1);
    updateKillStreak();
    if(enemy.skill)updateDailyQuestProgress('bossKill',1);
    updateDailyQuestProgress('goldEarn',gold);
    // 宠物经验
    if(p.pet){const petXpGain=Math.floor(enemy.xp*0.5);p.petXp+=petXpGain;updateDailyQuestProgress('petXp',petXpGain);while(p.petXp>=p.petXpToNext){p.petXp-=p.petXpToNext;p.petLevel++;p.petXpToNext=Math.floor(p.petXpToNext*1.5);addLog(`${p.pet.icon} ${p.pet.name} 升级了！Lv.${p.petLevel}`,'log-system');recalcStats();}}
    // Boss速通
    if(enemy.skill&&State.combat.turnCount<p._fastestBossKill)p._fastestBossKill=State.combat.turnCount;
    // 掉落 (麒麟幸运翻倍)
    let dropRate=0.3;if(enemy._eliteMod)dropRate=0.6;
    if(p.pet&&p.pet.skill==='luck')dropRate*=(1+p.pet.skillValue*(1+0.2*(p.petLevel-1)));
    if(dm&&dm.effect==='luckBonus')dropRate+=dm.value;
    if(dm&&dm.effect==='allBonus')dropRate+=0.5;
    if(Math.random()<dropRate){
      // 特殊掉落：终极Boss掉落创世装备
      if(enemy.drops==='creation'){
        const creationEq=getAllEquip().filter(e=>e.rarity==='creation'&&!e.rebirthRequired);
        const rebirthEq=getAllEquip().filter(e=>e.rarity==='creation'&&e.rebirthRequired&&e.rebirthRequired<=p.rebirthTier);
        const allCreation=[...creationEq,...rebirthEq];
        if(allCreation.length>0){const drop=allCreation[Math.floor(Math.random()*allCreation.length)];p.inventory.push(Object.assign({},drop));addLog(`🌟 创世级掉落：【${drop.name}】！`,'log-loot');updateDailyQuestProgress('getEquip',1);}
      }else{
        const allEq=getAllEquip();
        const rarityWeights={common:35,rare:25,epic:20,legendary:enemy._eliteMod?12:5,mythic:enemy._eliteMod?6:1};
        let roll=Math.random()*100,cumulative=0,targetRarity='common';
        for(const[r,w]of Object.entries(rarityWeights)){cumulative+=w;if(roll<=cumulative){targetRarity=r;break;}}
        const eligible=allEq.filter(e=>e.rarity===targetRarity);
        if(eligible.length>0){const drop=eligible[Math.floor(Math.random()*eligible.length)];p.inventory.push(Object.assign({},drop));addLog(`🎁 掉落：【${drop.name}】(${GameData.rarityNames[drop.rarity]})`,'log-loot');updateDailyQuestProgress('getEquip',1);}
      }
    }
    updateTopBar();checkAchievements();
    // Boss技能掉落
    if(enemy.skill){
      // 满血Boss击杀成就
      if(p.hp>=p.maxHp)p._fullHpBossKill=true;
      // 濒死逆转成就
      if(p.hp<p.maxHp*0.1)p._lowHpBossKill=true;
      const dropEntry=GameData.bossSkillDrops.find(d=>d.bossName===enemy.name);
      if(dropEntry){
        const skillName=dropEntry.skill;
        if(!p.learnedSkills.includes(skillName)&&Math.random()<0.4){
          p.learnedSkills.push(skillName);
          addLog(`📜 Boss掉落技能书：【${skillName}】！`,'log-loot');
        }
      }
    }
    // 挑战石碑奖励
    if(State.combat._challengeReward){
      State.combat._challengeReward=false;
      const bonusGold=80+Math.floor(Math.random()*120);
      p.gold+=bonusGold;p._totalGoldEarned+=bonusGold;
      gainXp(40+Math.floor(Math.random()*60));
      addLog(`🏆 挑战成功！额外获得 ${bonusGold} 金币！`,'log-loot');
    }

    if(State.combat._dragonLairReward){
      State.combat._dragonLairReward=false;
      const dragonGold=150+Math.floor(Math.random()*350);
      p.gold+=dragonGold;p._totalGoldEarned+=dragonGold;
      const eq=GameData.equipment.weapons.concat(GameData.equipment.armors).concat(GameData.equipment.accessories).filter(e=>e.rarity==='epic'||e.rarity==='legendary');
      const loot=eq[Math.floor(Math.random()*eq.length)];
      p.inventory.push(Object.assign({},loot));
      addLog(`🏆 击败守护龙！获得 ${dragonGold} 金币和【${loot.name}】！`,'log-loot');
    }
    // 符文掉落（Boss/精英概率掉落）
    if((enemy.skill||enemy._eliteMod)&&Math.random()<0.25){
      const runePool=GameData.runes.filter(r=>r.rarity==='common'||r.rarity==='rare');
      if(enemy._eliteMod&&enemy._eliteMod.name==='Boss')runePool.push(...GameData.runes.filter(r=>r.rarity==='epic'));
      if(enemy._eliteMod&&enemy._eliteMod.name==='Boss'&&p.rebirthTier>=5)runePool.push(...GameData.runes.filter(r=>r.rarity==='legendary'));
      const rune=runePool[Math.floor(Math.random()*runePool.length)];
      if(rune){
        const existing=p._runeInventory.find(r=>r.runeId===rune.id);
        if(existing)existing.count++;
        else p._runeInventory.push({runeId:rune.id,count:1});
        addLog(`🔮 符文掉落：【${rune.name}】(${GameData.rarityNames[rune.rarity]})`,'log-loot');
      }
    }
    // 灵魂碎片掉落
    let fragGain=enemy.skill?Math.floor(2+p.rebirthTier*0.5):Math.floor(1+p.rebirthTier*0.3);
    if(enemy._eliteMod)fragGain=Math.floor(fragGain*2);
    p._soulFragments=(p._soulFragments||0)+fragGain;
    addLog(`💀 获得 ${fragGain} 个灵魂碎片（总计: ${p._soulFragments}）`,'log-system');
    // 强化石掉落
    let stoneChance=0.4;if(enemy._eliteMod)stoneChance=0.7;if(enemy.skill)stoneChance=1.0;
    if(Math.random()<stoneChance){
      const stoneGain=1+Math.floor(Math.random()*(enemy.skill?3:2));
      p.enhancementStones=(p.enhancementStones||0)+stoneGain;
      addLog(`💎 获得 ${stoneGain} 个强化石（总计: ${p.enhancementStones}）`,'log-loot');
    }
    // 保护石掉落（仅Boss）
    if(enemy.skill&&Math.random()<0.3){
      p._protectionStones=(p._protectionStones||0)+1;
      addLog('🛡️ 获得 1 个保护石！','log-loot');
    }

    if(State.isBossRush){
      p._bossRushRound=(p._bossRushRound||0)+1;
      State.bossRushIndex++;
      actionPanel.innerHTML=`
        <h2>✅ Boss Rush 第${State.bossRushIndex}关 击破！</h2>
        <div style="text-align:center;color:#44ff44;margin:8px 0;">${enemy.name}已被击败！</div>
        <button class="btn btn-primary" style="width:100%;" onclick="nextBossRush()">➡️ 下一关</button>
        <button class="btn btn-danger" style="width:100%;margin-top:4px;" onclick="State.isBossRush=false;renderHub()">🏠 撤退</button>
      `;
    }else if(State.isArena){
      if(State.arenaWave>p._arenaHighestWave)p._arenaHighestWave=State.arenaWave;
      checkArenaMilestone();
      actionPanel.innerHTML=`
        <h2>✅ 竞技场 第${State.arenaWave}波 击破！</h2>
        <div style="text-align:center;color:#44ff44;margin:8px 0;">${enemy.name}已被击败！</div>
        <button class="btn btn-primary" style="width:100%;" onclick="nextArenaWave()">➡️ 下一波</button>
        <button class="btn btn-danger" style="width:100%;margin-top:4px;" onclick="State.isArena=false;renderHub()">🏠 撤退</button>
      `;
    }else if(State.isAbyss){
      if(State.abyssFloor>p._deepestAbyss)p._deepestAbyss=State.abyssFloor;
      if(State.abyssFloor>=50)checkMainStoryline(); // 深渊深层可能触发主线
      actionPanel.innerHTML=`
        <h2>✅ 深渊第${State.abyssFloor}层 击破</h2>
        <div style="text-align:center;color:#44ff44;margin:8px 0;">敌人已被击败！</div>
        <button class="btn btn-primary" style="width:100%;" onclick="nextAbyssFloor()">➡️ 进入第${State.abyssFloor+1}层</button>
        <button class="btn btn-danger" style="width:100%;margin-top:4px;" onclick="renderHub()">🏠 撤退</button>
      `;
    }else if(State.isTower){
      const floor=State.towerFloor;
      if(floor>p._towerFloor)p._towerFloor=floor;
      if(floor>=30)checkMainStoryline(); // 高塔层数可能触发主线
      const isBoss=floor%5===0;
      let bonusHtml='';
      if(isBoss){
        const bonusGold=Math.floor(200*floor*0.5);p.gold+=bonusGold;p._totalGoldEarned+=bonusGold;
        const bonusTalent=Math.floor(floor/10)+1;p.talentPoints+=bonusTalent;
        bonusHtml=`<div style="color:#ffdd44;margin:8px 0;">🏆 Boss层奖励：${bonusGold}金币 + ${bonusTalent}天赋点！</div>`;
      }
      actionPanel.innerHTML=`
        <h2>✅ 挑战塔 第${floor}层 击破！</h2>
        <div style="text-align:center;color:#44ff44;margin:8px 0;">${enemy.name}已被击败！</div>
        ${bonusHtml}
        <button class="btn btn-primary" style="width:100%;" onclick="nextTowerFloor()">➡️ 挑战第${floor+1}层</button>
        <button class="btn btn-danger" style="width:100%;margin-top:4px;" onclick="renderHub()">🏠 撤退</button>
      `;
    }else{
      const inst=GameData.instances[p.currentInstanceId];
      const floor=inst.floors[p.currentFloorIndex];
      const ei=floor.enemies.findIndex(e=>e.name===enemy.name||e.name.includes(enemy.name.split('·').pop()));
      if(ei>=0)floor.enemies.splice(ei,1);
      if(floor.enemies.length===0){
        p.currentFloorIndex++;
        if(p.currentFloorIndex>=inst.floors.length){finishInstance();}
        else{addLog('当前区域已清除！','log-system');actionPanel.innerHTML=`<h2>✅ 区域清除</h2><div style="color:#44ff44;text-align:center;margin:8px 0;">敌人全灭！</div><button class="btn btn-primary" style="width:100%;" onclick="startFloor()">➡️ 下一层</button>`;}
      }else{showFloorUI();}
    }
    // 自动出售和自动探索
    autoSellEquipment();
    autoExploreAfterWin();
  }else if(p.hp<=0){
    // 技能复活（凤凰涅槃）
    if(p.buffs.some(b=>b.stat==='revive')){
      p.hp=p.maxHp;p.mana=p.maxMana;p.statusEffects=[];p.buffs=p.buffs.filter(b=>b.stat!=='revive');
      p._phoenixUsed=(p._phoenixUsed||0)+1;
      addLog('🦅 凤凰涅槃！你满血复活了！','log-system');
      updateTopBar();applyBuffs();
      checkCombatEnd();return;
    }
    // 凤凰宠物复活
    if(p.pet&&p.pet.skill==='revive'){
      p.hp=p.maxHp;p.statusEffects=[];p.buffs=[];
      addLog(`🦅 ${p.pet.name}发动了涅槃重生！你满血复活了！`,'log-system');
      // 移除凤凰的复活能力（一次性）
      p.pet=null;p.petXp=0;p.petLevel=1;p.petXpToNext=30;
      addLog('凤凰已离去...','log-info');
      updateTopBar();applyBuffs();
      checkCombatEnd();return;
    }
    State.combat.active=false;stopAutoBattle();stopAutoExplore();stopSpeedTick();p.hp=1;killStreak=0;p._winStreak=0;
    p._deathCount=(p._deathCount||0)+1;
    const deathFlavor=getDeathFlavor(State.combat.enemy);
    addLog(`💀 你被击败了...${deathFlavor}`,'log-system');
    addLog('但轮回者的灵魂不会轻易消亡——你从死亡边缘归来。','log-info');
    const lostGold=Math.floor(p.gold*0.15);
    p.gold=Math.max(0,p.gold-lostGold);
    addLog(`损失了 ${lostGold} 金币。`,'log-info');
    p.statusEffects=[];
    if(State.isBossRush){
      State.isBossRush=false;
      updateTopBar();actionPanel.innerHTML=`<h2>💀 Boss Rush 失败</h2><div style="color:#ff6666;text-align:center;margin:8px 0;">通过${State.bossRushIndex}关，损失${lostGold}金币。</div><button class="btn btn-primary" style="width:100%;" onclick="renderHub()">🏠 返回中枢</button>`;
    }else if(State.isArena){
      if(State.arenaWave>p._arenaHighestWave)p._arenaHighestWave=State.arenaWave;
      State.isArena=false;
      updateTopBar();actionPanel.innerHTML=`<h2>💀 竞技场失败</h2><div style="color:#ff6666;text-align:center;margin:8px 0;">坚持到第${State.arenaWave}波，损失${lostGold}金币。</div><button class="btn btn-primary" style="width:100%;" onclick="renderHub()">🏠 返回中枢</button>`;
    }else if(State.isAbyss){
      if(State.abyssFloor>p._deepestAbyss)p._deepestAbyss=State.abyssFloor;
      updateTopBar();actionPanel.innerHTML=`<h2>💀 深渊探索失败</h2><div style="color:#ff6666;text-align:center;margin:8px 0;">达到第${State.abyssFloor}层，损失${lostGold}金币。</div><button class="btn btn-primary" style="width:100%;" onclick="renderHub()">🏠 返回中枢</button>`;
    }else if(State.isTower){
      const floor=checkTowerEnd();
      updateTopBar();actionPanel.innerHTML=`<h2>💀 挑战塔失败</h2><div style="color:#ff6666;text-align:center;margin:8px 0;">达到第${floor}层，损失${lostGold}金币。</div><button class="btn btn-primary" style="width:100%;" onclick="renderHub()">🏠 返回中枢</button>`;
    }else{
      const inst=GameData.instances[p.currentInstanceId];
      inst.floors.forEach((f,i)=>{f.enemies=JSON.parse(JSON.stringify(f._origEnemies));});
      p.currentFloorIndex=0;p.currentInstanceId=null;
      updateTopBar();actionPanel.innerHTML=`<h2>💀 试炼失败</h2><div style="color:#ff6666;text-align:center;margin:8px 0;">被击败了，损失${lostGold}金币。</div><button class="btn btn-primary" style="width:100%;" onclick="renderHub()">🏠 返回中枢</button>`;
    }
  }
}

function finishInstance(){
  const inst=GameData.instances[State.player.currentInstanceId];
  addLog(`🏆 恭喜！通关了副本【${inst.name}】！`,'log-system');
  const bonusGold=inst.difficulty*120;
  State.player.gold+=bonusGold;State.player._totalGoldEarned+=bonusGold;
  addLog(`通关奖励：${bonusGold} 金币！`,'log-loot');
  gainXp(inst.difficulty*100);
  State.player._clearedInstances++;
  // 转生副本追踪
  if(inst.rebirthRequired){State.player._rebirthCleared++;}
  // 追踪已通关副本
  trackClearedInstance(inst.id);
  // 解锁对应世界观日志
  const loreMap={hospital:'lore3',ruins:'lore4',cyber:'lore5',abyss:'lore7',infinite_domain:'lore8'};
  if(loreMap[inst.id])addLore(loreMap[inst.id]);
  // 检查主线任务
  checkMainStoryline();
  const allEq=getAllEquip().filter(e=>e.rarity==='rare'||e.rarity==='epic'||(inst.difficulty>=10&&e.rarity==='mythic'));
  const drop=allEq[Math.floor(Math.random()*allEq.length)];
  State.player.inventory.push(Object.assign({},drop));
  addLog(`🎁 副本奖励：【${drop.name}】(${GameData.rarityNames[drop.rarity]})`,'log-loot');
  inst.floors.forEach((f,i)=>{f.enemies=JSON.parse(JSON.stringify(f._origEnemies));});
  State.player.currentInstanceId=null;State.player.currentFloorIndex=0;
  updateTopBar();checkAchievements();autoSave();
  if(State.autoExplore){
    // 自动探索模式：直接继续
    const instId=inst.id;
    State.player.currentInstanceId=instId;
    State.player.currentFloorIndex=0;
    State._autoExploreHandled=true;
    addLog('🔄 自动探索：副本重置，继续刷。','log-system');
    setTimeout(()=>autoExploreNext(),500);
    return;
  }
  actionPanel.innerHTML=`<h2>🏆 副本通关！</h2><div style="color:#ffcc00;text-align:center;margin:8px 0;">通关【${inst.name}】！<br>获得奖励金币和装备！</div><button class="btn btn-primary" style="width:100%;" onclick="renderHub()">🏠 返回中枢</button>`;
}

// ==================== 商店系统 ====================
function renderShop(){
  clearLog();updateTopBar();const p=State.player;
  let pots='';
  GameData.shopPotions.forEach(pot=>{
    let desc=pot.heal>0?`+${pot.heal}HP`:
      pot.clearPoison?'清除中毒':
      pot.clearAll?'全恢复':
      pot.buffAtk?`ATK+${Math.floor(pot.buffAtk*100)}%`:
      pot.buffDef?`DEF+${Math.floor(pot.buffDef*100)}%`:
      pot.buffSpd?`SPD+${Math.floor(pot.buffSpd*100)}%`:
      pot.buffCrit?`暴击率+${Math.floor(pot.buffCrit*100)}%`:
      pot.restoreMana?`MP+${pot.restoreMana}`:
      pot.revive?'复活一次':'消耗品';

function getEnhanceCost(eq){
  const lvl=eq.enhanceLevel||0;
  // 无限强化，成本递增，每5级大跳，每20级巨跳
  let base;
  if(lvl<=5)base=20+lvl*20;
  else if(lvl<=10)base=100+lvl*50;
  else if(lvl<=15)base=300+lvl*100;
  else if(lvl<=20)base=800+lvl*200;
  else if(lvl<=30)base=2000+lvl*500;
  else if(lvl<=50)base=5000+lvl*1000;
  else base=10000+lvl*2000;
  return base;
}
function getEnhanceRate(eq){
  const lvl=eq.enhanceLevel||0;
  if(lvl<=5)return 0.95;
  if(lvl<=10)return 0.80;
  if(lvl<=15)return 0.65;
  if(lvl<=20)return 0.50;
  if(lvl<=30)return 0.40;
  if(lvl<=50)return 0.30;
  return 0.20;
}
function getEnhanceStoneCost(eq){
  const targetLvl=(eq.enhanceLevel||0)+1;
  if(targetLvl<=5)return 0;
  if(targetLvl<=10)return 1;
  if(targetLvl<=15)return 2;
  if(targetLvl<=20)return 3;
  if(targetLvl<=30)return 5;
  if(targetLvl<=50)return 8;
  return 12;
}
function enhanceEquip(slot,useProtection=false){
  const p=State.player;const eq=p.equipment[slot];
  if(!eq)return;
  const lvl=eq.enhanceLevel||0;
  const cost=getEnhanceCost(eq);
  const stoneCost=getEnhanceStoneCost(eq);
  if(p.gold<cost){addLog('金币不足！','log-system');return;}
  if(p.enhancementStones<stoneCost){addLog(`强化石不足！需要${stoneCost}个强化石`,'log-system');return;}
  if(useProtection&&p._protectionStones<1){addLog('保护石不足！','log-system');return;}
  p.gold-=cost;
  p.enhancementStones-=stoneCost;
  if(useProtection)p._protectionStones--;
  const rate=getEnhanceRate(eq);
  const roll=Math.random();
  if(roll<0.05){ // 大成功 +2
    eq.enhanceLevel=lvl+2;
    addLog(`🔧 大成功！【${eq.name}】强化等级+2！→ +${eq.enhanceLevel}`,'log-system');
  }else if(roll<rate){
    eq.enhanceLevel=lvl+1;
    addLog(`🔧 强化成功！【${eq.name}】→ +${eq.enhanceLevel}`,'log-system');
    updateDailyQuestProgress('enhance',1);
  }else{
    if(useProtection){
      addLog(`🛡️ 保护石生效！【${eq.name}】强化失败但等级不变。`,'log-system');
    }else{
      // 安全等级：+5,+10,+15,+20等不会降级
      if(lvl>0&&lvl%5!==0){
        eq.enhanceLevel=lvl-1;
        addLog(`💔 强化失败！【${eq.name}】→ +${eq.enhanceLevel}`,'log-system');
      }else{
        addLog(`🔧 强化失败！【${eq.name}】等级不变（安全等级保护）。`,'log-system');
      }
    }
  }
  applyEnhanceBonus(eq);
  recalcStats();updateTopBar();renderEquipment();
}
function applyEnhanceBonus(eq){
  if(!eq)return;
  const lvl=eq.enhanceLevel||0;
  if(eq._baseAtk===undefined){eq._baseAtk=eq.atk||0;eq._baseDef=eq.def||0;eq._baseSpd=eq.spd||0;eq._baseHp=eq.hp||0;}
  // 每级+6%基础，每5级额外+20%，每20级额外+50%
  let bonus=1+lvl*0.06;
  bonus+=Math.floor(lvl/5)*0.20;
  bonus+=Math.floor(lvl/20)*0.50;
  eq.atk=Math.floor(eq._baseAtk*bonus);
  eq.def=Math.floor(eq._baseDef*bonus);
  eq.spd=Math.floor(eq._baseSpd*bonus);
  eq.hp=Math.floor(eq._baseHp*bonus);
}
function equipItem(idx){
  const item=State.player.inventory[idx];if(!item)return;const p=State.player;
  if(p.equipment[item.slot])p.inventory.push(p.equipment[item.slot]);
  p.equipment[item.slot]=item;p.inventory.splice(idx,1);
  recalcStats();updateTopBar();addLog(`装备了【${item.name}】！`,'log-system');renderEquipment();
}
function unequip(slot){
  const p=State.player;if(!p.equipment[slot])return;
  p.inventory.push(p.equipment[slot]);p.equipment[slot]=null;
  recalcStats();updateTopBar();addLog('卸下了装备。','log-info');renderEquipment();
}
function sellItem(idx){
  const item=State.player.inventory[idx];
  if(item._locked){addLog('🔒 该装备已锁定，无法出售！','log-system');return;}
  const price=Math.floor((item.price||20)*0.4);
  State.player.gold+=price;State.player.inventory.splice(idx,1);
  updateTopBar();addLog(`出售【${item.name}】，获得${price}💰`,'log-loot');renderEquipment();
}
function toggleLockItem(idx){
  const item=State.player.inventory[idx];
  if(!item)return;
  item._locked=!item._locked;
  addLog(item._locked?`🔒 已锁定【${item.name}】`:`🔓 已解锁【${item.name}】`,'log-system');
  renderEquipment();
}
function sellAllJunk(){
  const p=State.player;
  let sold=0,gold=0;
  p.inventory=p.inventory.filter(item=>{
    if(item._locked||item.rarity==='legendary'||item.rarity==='mythic'||item.rarity==='creation')return true;
    gold+=Math.floor((item.price||20)*0.4);
    sold++;
    return false;
  });
  if(sold>0){
    p.gold+=gold;
    addLog(`🗑️ 一键出售了 ${sold} 件装备，获得 ${gold}💰`,'log-loot');
  }else{
    addLog('没有可出售的装备。','log-system');
  }
  updateTopBar();renderEquipment();
}
function sortInventory(){
  const rarityOrder={creation:0,mythic:1,legendary:2,epic:3,rare:4,common:5};
  State.player.inventory.sort((a,b)=>{
    if(rarityOrder[a.rarity]!==rarityOrder[b.rarity])return rarityOrder[a.rarity]-rarityOrder[b.rarity];
    return (b.atk+b.def+b.spd+b.hp)-(a.atk+a.def+a.spd+a.hp);
  });
  addLog('📋 装备已按品质排序。','log-system');
  renderEquipment();
}
function autoEquipBest(){
  const p=State.player;
  let changed=0;
  ['weapon','armor','accessory'].forEach(slot=>{
    const current=p.equipment[slot];
    const candidates=p.inventory.filter(i=>i.slot===slot);
    if(candidates.length===0)return;
    // 优先装等高的，同装等选总属性高的
    candidates.sort((a,b)=>{
      if(a.rarity!==b.rarity){
        const order={creation:0,mythic:1,legendary:2,epic:3,rare:4,common:5};
        return (order[a.rarity]||5)-(order[b.rarity]||5);
      }
      return (b.atk+b.def+b.spd+b.hp)-(a.atk+a.def+a.spd+a.hp);
    });
    const best=candidates[0];
    if(!current||current.rarity!==best.rarity||(best.atk+best.def+best.spd+best.hp)>(current.atk+current.def+current.spd+current.hp)){
      if(current)p.inventory.push(current);
      p.equipment[slot]=best;
      p.inventory=p.inventory.filter(i=>i!==best);
      changed++;
    }
  });
  if(changed>0){
    addLog(`⚡ 自动装备了 ${changed} 件最佳装备！`,'log-system');
    recalcStats();updateTopBar();
  }else{
    addLog('当前装备已是最佳。','log-system');
  }
  renderEquipment();
}

function renderTalentTree(){
  clearLog();updateTopBar();const p=State.player;
  let nodes='';
  GameData.talents.forEach(t=>{
    const rank=p.talents[t.id]||0;
    const cls=rank>=t.maxRank?'learned':p.talentPoints>0&&rank<t.maxRank?'talent-node available':'talent-node';
    const title=`${t.icon} ${t.name} ${rank}/${t.maxRank}\n${t.desc}`;
    nodes+=`<div class="${cls}" title="${title}" onclick="learnTalent('${t.id}')">${t.icon}<span style="font-size:9px;position:absolute;bottom:1px;right:3px;color:#fff;">${rank}/${t.maxRank}</span></div>`;
  });
  actionPanel.innerHTML=`
    ${backToHubBtn()}<h2>⭐ 天赋树</h2>
    <div style="color:#44ccff;text-align:center;font-size:13px;margin:4px 0;">天赋点: ${p.talentPoints}</div>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px;padding:8px;">${nodes}</div>
    <div style="font-size:11px;color:#888;text-align:center;">点击绿色节点消耗1天赋点学习</div>
    <button class="btn btn-info" style="width:100%;margin-top:6px;" onclick="resetTalents()">🔄 重置天赋 (50💰)</button>
    <button class="btn" style="width:100%;margin-top:4px;" onclick="renderHub()">← 返回中枢</button>
  `;
  addLog('天赋树：升级获得天赋点，永久强化你的角色。','log-info');
}
function learnTalent(tid){
  const p=State.player;const t=GameData.talents.find(t=>t.id===tid);
  if(!t)return;const rank=p.talents[tid]||0;
  if(rank>=t.maxRank){addLog('已达最大等级！','log-system');return;}
  // 无限天赋（maxRank>=999）每级递增消耗：1,2,3,4,5...
  const cost=t.maxRank>=999?rank+1:1;
  if(p.talentPoints<cost){addLog(`天赋点不足！需要${cost}点。`,'log-system');return;}
  p.talentPoints-=cost;p.talents[tid]=rank+1;
  addLog(`学习天赋：【${t.name}】(${p.talents[tid]}/${t.maxRank>=999?'∞':t.maxRank})`,'log-system');
  recalcStats();updateTopBar();checkAchievements();renderTalentTree();
}
function resetTalents(){

function getPetEffectDetail(pet,level){
  const sv=pet.skillValue;
  switch(pet.skill){
    case'heal':return `当前效果：每3回合恢复 ${Math.floor(sv*level*100)}% HP`;
    case'burn':return `当前效果：${Math.floor(sv*level*100)}% 概率灼烧敌人`;
    case'shield':return `当前效果：战斗开始获得 ${2+Math.floor(level*0.5)} 回合护盾`;
    case'speed':return `当前效果：速度 +${Math.floor(sv*level)}`;
    case'crit':return `当前效果：暴击率 +${Math.floor(sv*level*100)}%`;
    case'dragon':return `当前效果：全属性 +${Math.floor(sv*level*100)}%`;
    case'revive':return `当前效果：死亡时满血复活（一次性）`;
    case'luck':return `当前效果：掉落率 x${(1+sv*(1+0.2*(level-1))).toFixed(1)}`;
    case'slow':return `当前效果：${Math.floor(sv*level*100)}% 概率减速敌人`;
    case'stun':return `当前效果：${Math.floor(sv*level*100)}% 概率眩晕敌人`;
    case'regen':return `当前效果：每2回合恢复 ${Math.floor(sv*Math.min(3,level)*100)}% HP`;
    case'atk':return `当前效果：攻击力 +${Math.floor(sv*level*100)}%`;
    case'multi':return `当前效果：全属性 +${Math.floor(sv*level*100)}% + 掉落率 +${Math.floor(sv*level*50)}%`;
    case'manaburn':return `当前效果：${Math.floor(sv*level*100)}% 概率消耗 ${20*level} 法力`;
    case'gold':return `当前效果：金币获取 +${Math.floor(sv*level*100)}%`;
    case'superShield':return `当前效果：每${Math.max(2,6-Math.floor(level*0.5))}回合 ${1+Math.floor(level*0.2)} 回合无敌`;
    case'superCrit':return `当前效果：暴击率 +${Math.floor(sv*level*100)}%`;
    case'superDragon':return `当前效果：全属性 +${Math.floor(sv*level*100)}%`;
    case'time':return `当前效果：速度 +${Math.floor(sv*level*100)}%，${Math.floor(30*level)}% 概率额外减CD`;
    case'ultimate':return `当前效果：全属性 +${Math.floor(sv*level*100)}%，暴击 +${Math.floor(15*level)}%，金币/掉落 +${Math.floor(15*level)}%`;
    default:return pet.skillDesc;
  }
}

function triggerPetEffect(){
  const p=State.player;
  if(!p.pet||!State.combat.active)return;
  State.petTurnCounter++;
  const pet=p.pet;
  const enemy=State.combat.enemy;
  // 幽灵治疗
  if(pet.skill==='heal'&&State.petTurnCounter%3===0){
    const heal=Math.floor(p.maxHp*pet.skillValue*p.petLevel);
    p.hp=Math.min(p.maxHp,p.hp+heal);
    addLog(`${pet.icon} ${pet.name}为你恢复了${heal}HP！`,'log-heal');
  }
  // 火元素灼烧
  if(pet.skill==='burn'&&Math.random()<pet.skillValue*p.petLevel){
    const burnDmg=Math.floor(getEffAtk()*0.3);
    enemy.statusEffects.push({type:'burn',turnsLeft:2,value:burnDmg});
    addLog(`${pet.icon} ${pet.name}灼烧了${enemy.name}！`,'log-damage');
  }
  // 石像护盾 - 战斗开始时触发
  if(pet.skill==='shield'&&State.combat.turnCount===1){
    State.shieldTurns=2+Math.floor(p.petLevel*0.5);
    addLog(`${pet.icon} ${pet.name}为你施加了护盾(${State.shieldTurns}回合)！`,'log-system');
  }
  // 暗影猫暴击 (passive, handled in getCritRate)
  // 幼龙、金翅鸟 (passive, handled in recalcStats)
  // 麒麟掉落 (handled in checkCombatEnd)
  // 凤凰复活 (handled in checkCombatEnd)
  // 冰霜精灵减速
  if(pet.skill==='slow'&&Math.random()<pet.skillValue*p.petLevel){
    enemy.statusEffects.push({type:'slow',turnsLeft:2,value:0.3});
    addLog(`${pet.icon} ${pet.name}减速了${enemy.name}！`,'log-system');
  }
  // 雷鸟眩晕
  if(pet.skill==='stun'&&Math.random()<pet.skillValue*p.petLevel){
    enemy.statusEffects.push({type:'stun',turnsLeft:1});
    addLog(`${pet.icon} ${pet.name}眩晕了${enemy.name}！`,'log-system');
  }
  // 树精再生
  if(pet.skill==='regen'&&State.petTurnCounter%2===0){
    const regen=Math.floor(p.maxHp*pet.skillValue*Math.min(3,p.petLevel));
    p.hp=Math.min(p.maxHp,p.hp+regen);
    if(regen>0)addLog(`${pet.icon} ${pet.name}为你恢复了${regen}HP！`,'log-heal');
  }
  // 狮鹫攻击 (passive, handled in recalcStats)
  // 九尾狐 (passive, handled in recalcStats)
  // 虚空幼体 - 消耗敌人法力
  if(pet.skill==='manaburn'&&Math.random()<pet.skillValue*p.petLevel){
    const manaburn=Math.floor(20*p.petLevel);
    enemy._mana=Math.max(0,(enemy._mana||0)-manaburn);
    addLog(`${pet.icon} ${pet.name}消耗了${enemy.name}${manaburn}点法力！`,'log-system');
  }
  // 远古守护者 - 无敌周期随等级缩短
  if(pet.skill==='superShield'&&State.petTurnCounter%Math.max(2,6-Math.floor(p.petLevel*0.5))===0){
    p.buffs.push({stat:'invincible',turnsLeft:1+Math.floor(p.petLevel*0.2)});
    addLog(`${pet.icon} ${pet.name}赋予你无敌效果！`,'log-system');
  }
  // 星界龙 (passive, handled in recalcStats)
  // 时之精灵 (passive, handled in recalcStats)
  // 万界之灵 (passive, handled in recalcStats)
  // 金甲虫 (passive, handled in gold drop)
  // 混沌之眼 (passive, handled in getCritRate)
}

function quickAddCraft(idx){

function selectForCraft(idx){

function addToCraftSlot(slotIdx){
  State.craftSelectingSlot=slotIdx;
  renderCrafting();
}
function removeFromCraftSlot(idx){
  const item=State.craftSlots.splice(idx,1)[0];
  State.player.inventory.push(item);
  State.craftSelectingSlot=-1;
  renderCrafting();

function craftItem(recipeIdx){
  const p=State.player;
  const recipe=GameData.craftRecipes[recipeIdx];
  if(p.gold<recipe.cost){addLog('金币不足！','log-system');return;}
  p.gold-=recipe.cost;
  let result='';
  if(recipe.type==='upgrade'){
    const rarityOrder=['common','rare','epic','legendary'];
    const currentRarity=State.craftSlots[0].rarity;
    const nextIdx=rarityOrder.indexOf(currentRarity)+1;
    const nextRarity=rarityOrder[nextIdx];
    const allEq=GameData.equipment.weapons.concat(GameData.equipment.armors).concat(GameData.equipment.accessories).filter(e=>e.rarity===nextRarity);
    const resultItem=allEq[Math.floor(Math.random()*allEq.length)];
    if(resultItem){p.inventory.push(Object.assign({},resultItem));result=`获得【${resultItem.name}】(${GameData.rarityNames[resultItem.rarity]})`;}
    else{result='合成失败，返还材料。';State.craftSlots.forEach(s=>p.inventory.push(s));}
  }else if(recipe.type==='reroll'){
    const item=State.craftSlots[0];
    const allEq=GameData.equipment.weapons.concat(GameData.equipment.armors).concat(GameData.equipment.accessories).filter(e=>e.rarity===item.rarity);
    const resultItem=allEq[Math.floor(Math.random()*allEq.length)];
    if(resultItem){p.inventory.push(Object.assign({},resultItem));result=`重铸获得【${resultItem.name}】`;}
    else{result='重铸失败。';p.inventory.push(item);}
  }else if(recipe.type==='petEgg'){
    const eligiblePets=GameData.pets.filter(pd=>p.level>=pd.unlock&&(!p.pet||p.pet.id!==pd.id));
    if(eligiblePets.length>0){
      const pet=eligiblePets[Math.floor(Math.random()*eligiblePets.length)];
      p.pet=Object.assign({},pet);p.petXp=0;p.petXpToNext=30;p.petLevel=1;
      result=`获得宠物：【${pet.name}】！`;
    }else{result='你已经拥有所有可获得的宠物！';State.craftSlots.forEach(s=>p.inventory.push(s));}
  }
  State.craftSlots=[];
  addLog(`合成完成！${result}`,'log-system');
  updateTopBar();renderCrafting();
}

// ==================== 每日任务 ====================
function initDailyQuests(){
  const today=new Date().toDateString();
  if(State.dailyQuestDate!==today){
    // 新的一天，重置任务
    State.dailyQuestDate=today;
    State.dailyQuests=[];
    State.boughtPotionsToday=0;
    State.gotEquipToday=0;
    const shuffled=GameData.dailyQuests.slice().sort(()=>Math.random()-0.5);
    const selected=shuffled.slice(0,3);
    selected.forEach(q=>{
      State.dailyQuests.push({id:q.id,progress:0,target:q.target,done:false});
    });
  }
  // 确保数据存在
  if(State.dailyQuests.length===0)initDailyQuests();
}
function updateDailyQuestProgress(type,amount){
  initDailyQuests();
  const dq=GameData.dailyQuests;
  State.dailyQuests.forEach(q=>{
    if(q.done)return;
    const def=dq.find(d=>d.id===q.id);
    if(!def||def.type!==type)return;
    q.progress=Math.min(q.target,q.progress+amount);
    if(q.progress>=q.target)addLog(`📋 每日任务完成：【${def.name}】！请前往中枢领取奖励。`,'log-system');
  });
}
function claimDailyQuest(qIdx){
  initDailyQuests();
  const q=State.dailyQuests[qIdx];
  if(!q||q.done||q.progress<q.target)return;
  const def=GameData.dailyQuests.find(d=>d.id===q.id);
  if(!def)return;
  q.done=true;
  const p=State.player;
  if(def.reward.gold){p.gold+=def.reward.gold;p._totalGoldEarned+=def.reward.gold;}
  if(def.reward.xp)gainXp(def.reward.xp);
  if(def.reward.talentPoints){p.talentPoints+=def.reward.talentPoints;}

// ==================== 赏金系统 ====================
function initBounties(){
  const p=State.player;
  if(!p._bounties)p._bounties=[];
  if(p._bounties.length===0){
    const shuffled=[...GameData.bounties].sort(()=>Math.random()-0.5);
    p._bounties=shuffled.slice(0,3).map(b=>({
      id:b.id,progress:0,targetCount:b.targetCount,claimed:false
    }));
  }
}
function updateBountyProgress(enemy){
  const p=State.player;
  if(!p._bounties||p._bounties.length===0)return;
  p._bounties.forEach(b=>{
    if(b.claimed)return;
    const def=GameData.bounties.find(d=>d.id===b.id);
    if(!def)return;
    let matched=false;
    if(def.targetType==='any')matched=true;
    else if(def.targetType==='boss'&&enemy.skill)matched=true;
    else if(def.targetType==='elite'&&enemy._eliteMod)matched=true;
    else if(enemy.name&&enemy.name.includes(def.targetType))matched=true;
    if(matched&&b.progress<b.targetCount){
      b.progress++;
      if(b.progress>=b.targetCount){
        addLog(`📜 赏金任务完成：【${def.name}】！请前往赏金板领取奖励。`,'log-system');
      }
    }
  });
}
function updateGoldBountyProgress(amount){
  const p=State.player;
  if(!p._bounties||p._bounties.length===0)return;
  p._bounties.forEach(b=>{
    if(b.claimed)return;
    const def=GameData.bounties.find(d=>d.id===b.id);
    if(!def||def.targetType!=='gold')return;
    b.progress=Math.min(b.targetCount,b.progress+amount);
    if(b.progress>=b.targetCount){
      addLog(`📜 赏金任务完成：【${def.name}】！请前往赏金板领取奖励。`,'log-system');
    }
  });
}
function claimBounty(idx){
  const p=State.player;
  if(!p._bounties||idx>=p._bounties.length)return;
  const b=p._bounties[idx];
  if(b.claimed||b.progress<b.targetCount)return;
  const def=GameData.bounties.find(d=>d.id===b.id);
  if(!def)return;
  b.claimed=true;
  const rep=GameData.getBountyReputationBonus(p._bountyReputation||0);
  let bonus=1;
  if(p._bountyReputation>=5)bonus=1.1;
  if(p._bountyReputation>=15)bonus=1.2;
  if(p._bountyReputation>=30)bonus=1.3;
  if(p._bountyReputation>=50)bonus=1.5;
  if(p._bountyReputation>=100)bonus=2.0;
  const g=Math.floor(def.reward.gold*bonus);
  p.gold+=g;p._totalGoldEarned+=g;
  if(def.reward.xp)gainXp(Math.floor(def.reward.xp*bonus));
  p._bountyReputation=(p._bountyReputation||0)+1;
  p._bountiesCompleted=(p._bountiesCompleted||0)+1;
  // 声望奖励额外掉落
  if(p._bountyReputation>=15){p.enhancementStones=(p.enhancementStones||0)+1;addLog('💎 声望奖励：获得1个强化石！','log-loot');}
  if(p._bountyReputation>=30){p._protectionStones=(p._protectionStones||0)+1;addLog('🛡️ 声望奖励：获得1个保护石！','log-loot');}
  if(p._bountyReputation>=50){p.enhancementStones=(p.enhancementStones||0)+2;addLog('💎 声望奖励：获得2个强化石！','log-loot');}
  if(p._bountyReputation>=100){p.enhancementStones=(p.enhancementStones||0)+3;p._protectionStones=(p._protectionStones||0)+2;addLog('💎 声望奖励：获得3个强化石+2个保护石！','log-loot');}
  addLog(`💰 领取赏金：【${def.name}】获得 ${g}金币 + ${Math.floor(def.reward.xp*bonus)}XP`,'log-loot');
  addLog(`⭐ 声望+1（总计: ${p._bountyReputation}）| ${rep.name}`,'log-system');
  // 检查是否全部完成
  if(p._bounties.every(b=>b.claimed)){
    addLog('🌟 所有赏金任务已完成！在赏金板刷新新任务。','log-system');
  }
  updateTopBar();renderBountyBoard();
}

function refreshBountyBoard(){
  const p=State.player;
  const allDone=p._bounties.every(b=>b.claimed);

    const cost=50;

    p.gold-=cost;
  }
  const shuffled=[...GameData.bounties].sort(()=>Math.random()-0.5);
  p._bounties=shuffled.slice(0,3).map(b=>({
    id:b.id,progress:0,targetCount:b.targetCount,claimed:false
  }));

function startArena(){

  nextArenaWave();

function nextArenaWave(){
  const p=State.player;
  State.arenaWave++;
  const wave=State.arenaWave;
  const isElite=wave%10===0;
  const isBoss=wave%25===0;
  const isMilestone=wave%50===0;

  const names=['角斗士','狂战士','暗杀者','法师','弓箭手','骑士','魔剑士','召唤师','忍者','龙骑士'];
  const nameIdx=(wave-1)%10;
  let prefix=names[nameIdx];

  const diff=1+wave*0.15;
  const eHp=Math.floor((100+wave*60)*diff);
  const eAtk=Math.floor((15+wave*5)*diff);
  const eDef=Math.floor((8+wave*3)*diff);
  const eSpd=Math.min(28,10+Math.floor(wave*0.5));
  const xpReward=Math.floor((60+wave*30)*diff);
  const goldReward=Math.floor((40+wave*20)*diff);

  let eSkill=null;
  if(isBoss&&wave>=50)eSkill='终焉审判';
  else if(isBoss&&wave>=25)eSkill='虚空吞噬';
  else if(isBoss)eSkill='重击';
  else if(isElite)eSkill=Math.random()<0.5?'剑气斩':'重击';

  let eliteMod=null;
  if(isBoss)eliteMod={name:'Boss',prefix:'🏟️ 竞技场之主·',hpMult:2.5,atkMult:2,defMult:1.5,xpMult:5,goldMult:5,color:'#ff4444',spdBonus:2};
  else if(isElite)eliteMod={name:'精英',prefix:'精英·',hpMult:1.8,atkMult:1.5,defMult:1.3,xpMult:3,goldMult:3,color:'#ffaa00',spdBonus:1};

  let enemyName=prefix;
  if(eliteMod)enemyName=eliteMod.prefix+prefix;
  const enemy={
    name:enemyName,
    hp:Math.floor(eHp*(eliteMod?eliteMod.hpMult:1)),maxHp:Math.floor(eHp*(eliteMod?eliteMod.hpMult:1)),
    atk:Math.floor(eAtk*(eliteMod?eliteMod.atkMult:1)),def:Math.floor(eDef*(eliteMod?eliteMod.defMult:1)),
    spd:eSpd+(eliteMod&&eliteMod.spdBonus?eliteMod.spdBonus:0),
    xp:Math.floor(xpReward*(eliteMod?eliteMod.xpMult:1)),
    gold:Math.floor(goldReward*(eliteMod?eliteMod.goldMult:1)),
    skill:eSkill,_eliteMod:eliteMod,statusEffects:[],shieldTurns:0,debuffed:false,atkBuffed:false,
  };

  State.combat={active:true,enemy:enemy,enemyHp:enemy.hp,enemyMaxHp:enemy.maxHp,turnCount:0,playerSpeedBar:50,enemySpeedBar:0};
  State.shieldTurns=0;State.petTurnCounter=0;
  p._combo=0;p.statusEffects=[];p.buffs=[];applyBuffs();
  if(p.pet&&p.pet.skill==='shield'){State.shieldTurns=2;addLog(`${p.pet.icon} ${p.pet.name}为你施加了护盾！`,'log-system');}
  updateTopBar();updateComboDisplay();

  let waveLabel=isBoss?`⚡ 第${wave}波 - Boss战！`:(isElite?`⭐ 第${wave}波 - 精英战！`:`➡️ 第${wave}波`);
  if(isMilestone)waveLabel+=` 🏆 里程碑！`;
  addLog(`🏟️ ${waveLabel}：${enemy.name} 出场！`,'log-system');
  showCombatUI();
}
function checkArenaMilestone(){
  const p=State.player;
  const wave=State.arenaWave;
  if(wave%50!==0)return;
  const rewardGold=wave*100;
  p.gold+=rewardGold;p._totalGoldEarned+=rewardGold;
  const talentReward=Math.floor(wave/10);
  p.talentPoints+=talentReward;
  addLog(`🏆 竞技场里程碑！第${wave}波达成！获得 💰${rewardGold} 金币 + ⭐${talentReward} 天赋点！`,'log-system');
  // 每100波额外奖励传说装备
  if(wave%100===0){
    const allEq=GameData.equipment.weapons.concat(GameData.equipment.armors).concat(GameData.equipment.accessories).filter(e=>e.rarity==='legendary');
    if(allEq.length>0){const drop=allEq[Math.floor(Math.random()*allEq.length)];p.inventory.push(Object.assign({},drop));addLog(`🎁 传说装备奖励：【${drop.name}】`,'log-loot');}
  }
  updateTopBar();
}

  const savedFastest=p._fastestBossKill;

  // 剧情相关
  const savedStorylineProgress=p._storylineProgress;

function getBreakthroughCost(level){
  // 逐级递增：基础1000金，每级*1.5
  return Math.floor(1000*Math.pow(1.5,level));
}
function renderBreakthrough(){

  addLog('突破后的属性在转生后依然保留，是轮回者变强的核心途径。','log-info');
  const stats=[
    {key:'breakthroughAtk',name:'攻击力',icon:'⚔️',val:p.breakthroughAtk,desc:'每级+5攻击力'},
    {key:'breakthroughDef',name:'防御力',icon:'🛡️',val:p.breakthroughDef,desc:'每级+3防御力'},
    {key:'breakthroughHp',name:'生命值',icon:'💖',val:p.breakthroughHp,desc:'每级+20生命值'},
    {key:'breakthroughSpd',name:'速度',icon:'💨',val:p.breakthroughSpd,desc:'每级+2速度'},
  ];
  let html='';
  stats.forEach(s=>{
    const cost=getBreakthroughCost(s.val);
    html+=`<div style="background:#1a1a2e;border:1px solid #333;border-radius:6px;padding:8px;margin:4px 0;display:flex;justify-content:space-between;align-items:center;">
      <div><span style="font-size:14px;">${s.icon}</span> <b>${s.name}</b> Lv.${s.val}<br><span style="font-size:10px;color:#888;">${s.desc}</span></div>
      <button class="btn btn-warning" style="padding:4px 10px;font-size:11px;" onclick="doBreakthrough('${s.key}')">💰 ${cost} 突破</button>
    </div>`;
  });
  actionPanel.innerHTML=`
    <h2>💪 属性突破</h2>
    <div style="font-size:11px;color:#888;text-align:center;margin:4px 0;">消耗金币永久提升属性，无上限！</div>
    <div style="color:#ffaa00;font-size:11px;text-align:center;">💰 当前金币: ${p.gold}</div>
    ${html}
    <button class="btn" style="width:100%;margin-top:6px;" onclick="renderHub()">← 返回中枢</button>
  `;

function doBreakthrough(key){
  const p=State.player;
  const currentLv=p[key];
  const cost=getBreakthroughCost(currentLv);
  if(p.gold<cost){addLog('金币不足！','log-system');return;}
  p.gold-=cost;
  p[key]++;
  recalcStats();applyBuffs();updateTopBar();
  const names={breakthroughAtk:'攻击力',breakthroughDef:'防御力',breakthroughHp:'生命值',breakthroughSpd:'速度'};
  addLog(`💪 ${names[key]}突破成功！当前Lv.${p[key]}，消耗${cost}金币。`,'log-system');
  updateDailyQuestProgress('breakthrough',1);
  renderBreakthrough();
}

function toggleAutoBattle(){

    if(State._playerActing&&State.combat.active){
      State._playerActing=false;
      autoBattleAct();
    }
  }else{
    stopAutoBattle();
  }
  showCombatUI();

  const idx=speeds.indexOf(State.combatSpeed);
  State.combatSpeed=speeds[(idx+1)%speeds.length];
  addLog(`⏩ 战斗速度切换至 ${State.combatSpeed}x`,'log-system');

  addLog(State.autoPotion?'🧪 自动喝药已开启（HP低于阈值自动使用）':'🧪 自动喝药已关闭','log-system');
  showCombatUI();
}

function autoUsePotion(){
  if(!State.autoPotion||!State.combat.active)return;
  const pl=State.player;
  const threshold=Math.floor(pl.maxHp*State.autoPotionThreshold);
  if(pl.hp>=threshold)return;
  // 找最好的药水
  const sortedPots=[...pl.potions].sort((a,b)=>b.heal-a.heal);
  if(sortedPots.length===0)return;
  const best=sortedPots.find(p=>p.qty>0);
  if(!best)return;
  best.qty--;
  pl.hp=Math.min(pl.maxHp,pl.hp+best.heal);
  if(best.qty<=0)pl.potions=pl.potions.filter(p=>p.qty>0);
  addLog(`🧪 自动使用【${best.name}】，恢复 ${best.heal}HP！`,'log-heal');
  updateTopBar();
  if(State.combat.active)showCombatUI();
}

function stopAutoBattle(){
  State.autoBattle=false;
  const ind=document.getElementById('auto-indicator');
  if(ind)ind.remove();
}

// 自动战斗AI（由速度条tick触发，不再使用setTimeout）
function autoBattleAct(){
  if(!State.autoBattle||!State.combat.active)return;
  const p=State.player;
  // 优先使用治疗技能
  const healSkill=p.equippedSkills.find(s=>{
    if(s==='治疗术'||s==='生命汲取'){
      const sk=GameData.playerSkills[s];
      if(!sk)return false;
      if(p.skillCooldowns[s]&&p.skillCooldowns[s]>0)return false;
      if(sk.manaCost>0&&p.mana<sk.manaCost)return false;
      return true;
    }
    return false;
  });
  if(healSkill&&p.hp<Math.floor(p.maxHp*0.4)){
    useSkill(healSkill);
  }else if(p.equippedSkills.length>0&&Math.random()<0.5){
    const avail=p.equippedSkills.filter(s=>{
      const sk=GameData.playerSkills[s];
      if(!sk)return false;
      if(p.skillCooldowns[s]&&p.skillCooldowns[s]>0)return false;
      if(sk.manaCost>0&&p.mana<sk.manaCost)return false;
      return true;
    });
    if(avail.length>0){useSkill(avail[Math.floor(Math.random()*avail.length)]);}
    else{playerAttack();}
  }else{playerAttack();}
}

    <button class="btn" style="width:100%;margin-top:6px;" onclick="renderHub()">← 返回中枢</button>

function getSkillUpgradeCost(level){
  // 成本递增：每级基础成本*level，每5级翻倍，每20级再翻倍
  let base=200;
  if(level<=5)base=200*level;
  else if(level<=10)base=500*level;
  else if(level<=15)base=1000*level;
  else if(level<=20)base=2000*level;
  else if(level<=30)base=5000*level;
  else if(level<=50)base=15000*level;
  else base=50000*level;
  // 每20级有额外跳跃
  if(level>20)base=Math.floor(base*(1+Math.floor((level-20)/20)*0.5));
  return base;
}

function getSkillUpgradeBonus(level){
  if(level%20===0)return '⚡超大幅提升！伤害+100%';
  if(level%5===0)return '🔥大幅提升！伤害+50%';
  return `效果提升 +${10}%`;
}

function getNextSkillMilestone(level){
  if(level%20===0)return '超大幅提升！';
  if(level%5===0)return '大幅提升！';
  return '';
}

function upgradeSkill(name){
  const p=State.player;const lv=p.skillLevels[name]||0;
  const cost=getSkillUpgradeCost(lv+1);
  if(p.gold<cost){addLog('金币不足！','log-system');return;}
  p.gold-=cost;
  p.skillLevels[name]=lv+1;
  const bonus=getSkillUpgradeBonus(lv+1);
  addLog(`⬆️ 【${name}】升级至 Lv.${lv+1}！${bonus}`,'log-system');
  updateDailyQuestProgress('skillUp',1);
  recalcStats();updateTopBar();
  renderSkillUpgradeShop();
}

function getSkillMultiplier(name){
  const p=State.player;const sk=GameData.playerSkills[name];
  if(!sk)return sk?sk.multiplier:1;
  const lv=p.skillLevels[name]||0;
  let bonus=1+lv*0.1; // 每级+10%
  // 每5级额外+50%
  bonus+=Math.floor(lv/5)*0.5;
  // 每20级额外+100%
  bonus+=Math.floor(lv/20)*1.0;
  return sk.multiplier*bonus;
}

function spinFateWheel(){
  const p=State.player;
  const now=Date.now();
  if(!p._fateWheelLastSpin)p._fateWheelLastSpin=0;
  if(now-p._fateWheelLastSpin<3600000)return;
  p._fateWheelLastSpin=now;
  if(!p._fateWheelSpinCount)p._fateWheelSpinCount=0;
  p._fateWheelSpinCount++;

  const prizes=[
    {name:'💎 幸运金币',effect:'gold',value:200,desc:'获得200金币'},
    {name:'📖 经验之书',effect:'xp',value:50,desc:'获得50经验'},
    {name:'⭐ 天赋之光',effect:'talent',value:1,desc:'获得1天赋点'},
    {name:'🔮 法力回复',effect:'mana',value:100,desc:'恢复100法力'},
    {name:'🛡️ 临时护盾',effect:'shield',value:2,desc:'下次战斗获得护盾'},
    {name:'⚔️ 攻击祝福',effect:'atkBuff',value:3,desc:'下3次战斗攻击+30%'},
    {name:'💰 金币雨',effect:'gold',value:500,desc:'获得500金币'},
    {name:'🎁 神秘宝箱',effect:'mystery',value:0,desc:'随机获得一件装备'},
  ];
  const prize=prizes[Math.floor(Math.random()*prizes.length)];

  addLog(`🎡 命运之轮转动中...`,'log-system');
  // 模拟转动效果
  setTimeout(()=>{
    switch(prize.effect){
      case 'gold':p.gold+=prize.value;p._totalGoldEarned+=prize.value;break;
      case 'xp':gainXp(prize.value);break;
      case 'talent':p.talentPoints+=prize.value;break;
      case 'mana':p.mana=Math.min(p.maxMana,p.mana+prize.value);break;
      case 'shield':p._fateShield=(p._fateShield||0)+prize.value;break;
      case 'atkBuff':p._fateAtkBuff=(p._fateAtkBuff||0)+prize.value;break;
      case 'mystery':{
        const allEq=getAllEquip().filter(e=>e.rarity!=='creation'||(e.rebirthRequired&&e.rebirthRequired<=p.rebirthTier));
        const drop=allEq[Math.floor(Math.random()*allEq.length)];
        if(drop){p.inventory.push(Object.assign({},drop));addLog(`🎁 获得装备：【${drop.name}】`,'log-loot');}
        break;
      }
    }
    addLog(`🎉 命运之轮结果：【${prize.name}】— ${prize.desc}`,'log-system');
    updateDailyQuestProgress('fateWheel',1);
    updateTopBar();
    renderFateWheel();
  },1500);
}

function checkElementalTrialReward(){
  if(!State._elementalTrialReward)return;

  addLog(`🎉 元素试炼完成！获得 💰${reward.gold} 金币！`,'log-system');

function selectRuneForSocket(slot,index){
  const p=State.player;
  const eq=p.equipment[slot];
  if(!eq||!p._runeInventory||p._runeInventory.length===0){
    addLog('背包中没有符文！','log-system');return;

  window._selectingRuneFor={slot,index};

function socketRune(slot,index,runeId){
  const p=State.player;
  const eq=p.equipment[slot];
  if(!eq)return;
  // 移除旧符文
  if(eq._socketedRunes[index]){
    const oldRuneId=eq._socketedRunes[index];
    const oldEntry=p._runeInventory.find(r=>r.runeId===oldRuneId);
    if(oldEntry)oldEntry.count++;
    else p._runeInventory.push({runeId:oldRuneId,count:1});
  }
  // 消耗新符文
  const entry=p._runeInventory.find(r=>r.runeId===runeId);
  if(!entry||entry.count<=0)return;
  entry.count--;
  if(entry.count<=0)p._runeInventory=p._runeInventory.filter(r=>r.runeId!==runeId);
  eq._socketedRunes[index]=runeId;
  // 清理弹窗
  document.querySelectorAll('body>div').forEach(d=>{if(d.style.zIndex==='999')d.remove();});
  recalcStats();updateTopBar();
  const rune=GameData.runes.find(r=>r.id===runeId);
  addLog(`🔮 ${rune?rune.name:runeId} 已嵌入 ${eq.name}！`,'log-system');
  renderRuneSystem();
}

function clearEquipmentRunes(slot){
  const p=State.player;
  const eq=p.equipment[slot];
  if(!eq||!eq._socketedRunes)return;
  eq._socketedRunes.forEach(runeId=>{
    const entry=p._runeInventory.find(r=>r.runeId===runeId);
    if(entry)entry.count++;
    else p._runeInventory.push({runeId,count:1});
  });
  eq._socketedRunes=[];
  recalcStats();updateTopBar();
  addLog('符文已全部卸下并归还到背包。','log-system');
  renderRuneSystem();
}

function combineRunes(rarity){
  const p=State.player;
  if(!p._runeInventory)p._runeInventory=[];
  const sameRarity=p._runeInventory.filter(e=>{
    const rune=GameData.runes.find(r=>r.id===e.runeId);
    return rune&&rune.rarity===rarity;
  });
  const totalCount=sameRarity.reduce((sum,e)=>sum+e.count,0);
  if(totalCount<3){addLog(`没有3个${GameData.rarityNames[rarity]}符文来合成！`,'log-system');return;}
  const cost=GameData.runeCombineCost[rarity]||50;
  if(p.gold<cost){addLog(`金币不足！需要${cost}金币。`,'log-system');return;}
  p.gold-=cost;
  // 消耗3个符文
  let consumed=0;
  const remaining=[];
  for(const entry of sameRarity){
    while(entry.count>0&&consumed<3){entry.count--;consumed++;}
    if(entry.count>0)remaining.push(entry);
  }
  p._runeInventory=p._runeInventory.filter(e=>{
    const rune=GameData.runes.find(r=>r.id===e.runeId);
    return !rune||rune.rarity!==rarity;
  }).concat(remaining);
  // 生成新符文
  const samePool=GameData.runes.filter(r=>r.rarity===rarity);
  const newRune=samePool[Math.floor(Math.random()*samePool.length)];
  const existing=p._runeInventory.find(r=>r.runeId===newRune.id);
  if(existing)existing.count++;
  else p._runeInventory.push({runeId:newRune.id,count:1});
  addLog(`🔄 合成了【${newRune.name}】(${GameData.rarityNames[rarity]})！`,'log-system');
  updateDailyQuestProgress('runeCombine',1);
  recalcStats();updateTopBar();
  renderRuneSystem();
}

function confirmDissolve(idx){
  const p=State.player;
  const item=p.inventory[idx];
  if(!item)return;
  const matName=item.rarity==='common'?'锻造粉尘':(item.rarity==='rare'?'锻造碎片':(item.rarity==='epic'?'锻造精华':'锻造核心'));
  const matQty=item.rarity==='common'?1:(item.rarity==='rare'?2:(item.rarity==='epic'?3:5));
  if(!p._craftMats)p._craftMats={};
  if(!p._craftMats[matName])p._craftMats[matName]=0;
  p._craftMats[matName]+=matQty;
  p.inventory.splice(idx,1);
  if(!p._totalDissolved)p._totalDissolved=0;
  p._totalDissolved++;
  addLog(`分解了 ${item.name}，获得 ${matName} x${matQty}`,'log-system');
  updateDailyQuestProgress('dissolve',1);
  dissolveEquipment();
}

function craftFromMats(){

  const matCosts=[

function doMaterialCraft(rarity){
  const p=State.player;
  const matCosts=[
    {name:'随机稀有装备',mats:{'锻造粉尘':10,'锻造碎片':5},cost:100,rarity:'rare'},
    {name:'随机史诗装备',mats:{'锻造碎片':10,'锻造精华':5},cost:300,rarity:'epic'},
    {name:'随机传说装备',mats:{'锻造精华':10,'锻造核心':5},cost:800,rarity:'legendary'},
    {name:'随机神话装备',mats:{'锻造核心':10},cost:2000,rarity:'mythic'},
  ];
  const recipe=matCosts.find(r=>r.rarity===rarity);
  if(!recipe)return;
  let canCraft=true;
  Object.entries(recipe.mats).forEach(([mat,qty])=>{if((p._craftMats[mat]||0)<qty)canCraft=false;});
  if(p.gold<recipe.cost)canCraft=false;
  if(!canCraft)return;
  Object.entries(recipe.mats).forEach(([mat,qty])=>{p._craftMats[mat]-=qty;});
  p.gold-=recipe.cost;
  const pool=getAllEquip().filter(e=>e.rarity===rarity&&!e.rebirthRequired);
  if(pool.length>0){
    const drop=pool[Math.floor(Math.random()*pool.length)];
    p.inventory.push(Object.assign({},drop));
    addLog(`🔨 锻造成功！获得【${drop.name}】(${GameData.rarityNames[rarity]})！`,'log-system');
    if(!p._totalCrafted)p._totalCrafted=0;
    p._totalCrafted++;
  }
  document.querySelectorAll('body>div').forEach(d=>{if(d.style.zIndex==='999')d.remove();});
  recalcStats();updateTopBar();updateDailyQuestProgress('getEquip',1);
  dissolveEquipment();
}

  let contractsHtml='';
  GameData.soulContracts.forEach(sc=>{
    const completed=p._completedContracts.includes(sc.id);
    const canComplete=!completed&&p._soulFragments>=sc.require;
    let rewardStr=[];
    if(sc.reward.atk)rewardStr.push(`ATK+${sc.reward.atk}`);
    if(sc.reward.def)rewardStr.push(`DEF+${sc.reward.def}`);
    if(sc.reward.hp)rewardStr.push(`HP+${sc.reward.hp}`);
    if(sc.reward.spd)rewardStr.push(`SPD+${sc.reward.spd}`);
    contractsHtml+=`<div style="padding:6px 8px;background:rgba(0,0,0,0.3);border-radius:5px;margin:3px 0;display:flex;justify-content:space-between;align-items:center;font-size:11px;${completed?'opacity:0.4;':''}">
      <div><span style="color:#cc88ff;">${sc.icon} ${sc.name}</span><br><span style="color:#888;font-size:9px;">${sc.desc} → ${rewardStr.join(' ')}</span></div>
      ${completed?`<span style="color:#44ff44;">✅ 完成</span>`:(
        canComplete?`<button class="btn btn-warning" style="padding:3px 8px;font-size:10px;" onclick="completeContract('${sc.id}')">契约</button>`:
        `<span style="color:#ff4444;font-size:10px;">${p._soulFragments}/${sc.require}</span>`

    </div>`;
  });

  actionPanel.innerHTML=`${backToHubBtn()}<h2>💀 灵魂契约</h2>

}

function completeContract(contractId){
  const p=State.player;
  const contract=GameData.soulContracts.find(sc=>sc.id===contractId);
  if(!contract)return;
  if(p._completedContracts.includes(contractId)){addLog('该契约已完成！','log-system');return;}
  if(p._soulFragments<contract.require){addLog('灵魂碎片不足！','log-system');return;}
  p._soulFragments-=contract.require;
  p._completedContracts.push(contractId);
  recalcStats();updateTopBar();
  let rewardStr=[];
  if(contract.reward.atk)rewardStr.push(`ATK+${contract.reward.atk}`);
  if(contract.reward.def)rewardStr.push(`DEF+${contract.reward.def}`);
  if(contract.reward.hp)rewardStr.push(`HP+${contract.reward.hp}`);
  if(contract.reward.spd)rewardStr.push(`SPD+${contract.reward.spd}`);
  addLog(`💀 灵魂契约完成：【${contract.name}】→ ${rewardStr.join(' ')}`,'log-system');
  updateDailyQuestProgress('completeContract',1);
  renderSoulContracts();
}

async function sendAIMessage(){
  const input=document.getElementById('aiChatInput');
  if(!input)return;
  const msg=input.value.trim();
  if(!msg)return;
  input.value='';
  input.disabled=true;
  const ai=GameData.aiCompanion;
  const p=State.player;
  // 添加用户消息
  State.aiChatHistory.push({role:'user',content:msg});
  renderAICompanion();
  // 显示打字中（重新查询DOM，因为renderAICompanion重建了innerHTML）
  let typingEl=document.getElementById('aiTyping');
  if(typingEl)typingEl.style.display='block';
  // 检查API设置
  const settings=State.aiApiSettings;
  if(!settings.apiKey){
    // 无API Key时使用本地fallback
    await new Promise(r=>setTimeout(r,800+Math.random()*1200));
    const fallback=generateAIFallback(msg);
    State.aiChatHistory.push({role:'assistant',content:fallback});
    renderAICompanion();
    // 重新查询并聚焦输入框
    const newInput=document.getElementById('aiChatInput');
    if(newInput){newInput.disabled=false;newInput.focus();}
    return;
  }
  // 构建系统提示
  const ctx=`\n[当前状态：Lv.${p.level}，转生${p.rebirthTier}次，ATK ${p.atk}，DEF ${p.def}，HP ${p.hp}/${p.maxHp}，金币 ${p.gold}]`;
  const systemPrompt=ai.personality+ctx;
  // 构建消息
  const messages=[
    {role:'system',content:systemPrompt},
    ...State.aiChatHistory.slice(-10),
  ];
  try{
    const response=await fetch(settings.endpoint,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':`Bearer ${settings.apiKey}`,
      },
      body:JSON.stringify({
        model:settings.model,
        messages:messages,
        max_tokens:300,
        temperature:0.8,
        stream:false,
      }),
    });
    if(!response.ok){
      const errText=await response.text();
      throw new Error(`API错误 ${response.status}: ${errText.substring(0,100)}`);
    }
    const data=await response.json();
    const reply=data.choices[0].message.content;
    State.aiChatHistory.push({role:'assistant',content:reply});
  }catch(e){
    State.aiChatHistory.push({role:'assistant',content:`（连接失败：${e.message}。请检查API设置或网络连接。）`});
    addLog(`❌ AI对话失败：${e.message}`,'log-system');
  }
  typingEl=document.getElementById('aiTyping');
  if(typingEl)typingEl.style.display='none';
  renderAICompanion();
  const newInput=document.getElementById('aiChatInput');
  if(newInput){newInput.disabled=false;newInput.focus();}
}

function generateAIFallback(msg){

  }

  const genericReplies=[

function renderFishing(){
  const p=State.player;
  let html='<h2>🎣 钓鱼</h2><div style="font-size:12px;color:#aaa;margin-bottom:8px;">选择钓鱼地点，看准时机点击"收杆"！</div>';

  GameData.fishSpots.forEach(s=>{
    html+=`<button class="btn" style="background:rgba(30,30,60,0.8);text-align:left;padding:8px;" onclick="startFishing('${s.id}')">
      <div style="font-size:13px;font-weight:bold;">${s.name} <span style="color:#ffcc44;font-size:11px;">${s.cost>0?s.cost+'金/次':'免费'}</span></div>
      <div style="font-size:10px;color:#888;">${s.desc} (难度:${'⭐'.repeat(s.difficulty)})</div>
    </button>`;
  });
  html+='</div>';
  html+='<button class="btn" style="width:100%;margin-top:8px;" onclick="renderHub()">🏠 返回中枢</button>';

function startFishing(spotId){
  const spot=GameData.fishSpots.find(s=>s.id===spotId);
  if(!spot)return;
  const p=State.player;
  if(spot.cost>0&&p.gold<spot.cost){addLog('金币不足！','log-info');return;}

  fishingState.spot=spot;
  fishingState.attempts=0;
  fishingState.active=true;
  if(spot.cost>0){p.gold-=spot.cost;updateTopBar();}
  nextFishingAttempt();
}

function nextFishingAttempt(){
  if(fishingState.attempts>=fishingState.maxAttempts){endFishing();return;}
  const spot=fishingState.spot;
  const speed=1+spot.difficulty*0.8;
  const greenWidth=Math.max(8,22-spot.difficulty*3);
  const greenStart=20+Math.floor(Math.random()*(80-greenWidth));
  fishingState.indicatorPos=Math.random()<0.5?0:100;
  fishingState.direction=fishingState.indicatorPos<50?1:-1;
  fishingState.speed=speed;
  fishingState.greenStart=greenStart;
  fishingState.greenEnd=greenStart+greenWidth;
  fishingState.attempts++;

  renderFishingGame();
  if(fishingState.animId)clearInterval(fishingState.animId);
  fishingState.animId=setInterval(()=>{
    fishingState.indicatorPos+=fishingState.direction*fishingState.speed;
    if(fishingState.indicatorPos>=100){fishingState.indicatorPos=100;fishingState.direction=-1;}
    if(fishingState.indicatorPos<=0){fishingState.indicatorPos=0;fishingState.direction=1;}
    document.getElementById('fish-indicator').style.left=fishingState.indicatorPos+'%';
  },30);
}

function renderFishingGame(){
  const spot=fishingState.spot;
  const p=State.player;
  let html='<h2>🎣 钓鱼 - '+spot.name+'</h2>';
  html+=`<div style="font-size:12px;color:#aaa;margin-bottom:4px;">剩余次数: ${fishingState.maxAttempts-fishingState.attempts+1}/${fishingState.maxAttempts}</div>`;
  html+='<div style="position:relative;height:50px;background:#1a1a2e;border-radius:8px;margin:12px 0;overflow:hidden;border:2px solid #333;">';
  // 绿色区域
  const gs=fishingState.greenStart,ge=fishingState.greenEnd;
  html+=`<div style="position:absolute;left:${gs}%;width:${ge-gs}%;height:100%;background:rgba(68,255,68,0.3);border-left:2px solid #44ff44;border-right:2px solid #44ff44;"></div>`;
  // 指示器
  html+=`<div id="fish-indicator" style="position:absolute;left:${fishingState.indicatorPos}%;top:0;width:3px;height:100%;background:#ff4444;box-shadow:0 0 8px #ff4444;transition:none;"></div>`;
  html+='</div>';
  html+=`<button class="btn btn-primary" style="width:100%;padding:12px;font-size:14px;" onclick="tryCatchFish()">🎣 收杆！</button>`;
  html+=`<button class="btn btn-danger" style="width:100%;margin-top:4px;" onclick="endFishing()">🏃 不钓了</button>`;
  actionPanel.innerHTML=html;
}

function tryCatchFish(){
  if(fishingState.animId){clearInterval(fishingState.animId);fishingState.animId=null;}
  const pos=fishingState.indicatorPos;
  const spot=fishingState.spot;
  const p=State.player;
  const inGreen=pos>=fishingState.greenStart&&pos<=fishingState.greenEnd;

  if(inGreen){
    // 成功！随机鱼
    const fishName=spot.fish[Math.floor(Math.random()*spot.fish.length)];
    const fishData=GameData.fishData[fishName];
    p._fishBucket.push({name:fishName,value:fishData.value,icon:fishData.icon});
    p._fishingTotal++;
    addLog(`🎣 钓到了【${fishData.icon} ${fishName}】（价值${fishData.value}金）！`,'log-loot');
    renderFishingResult(true,fishName,fishData);
  }else{
    addLog('🎣 鱼跑了...','log-info');
    p._fishingTotal++;
    renderFishingResult(false);
  }
}

function renderFishingResult(success,fishName,fishData){
  const spot=fishingState.spot;
  let html='<h2>🎣 钓鱼 - '+spot.name+'</h2>';
  if(success){
    html+=`<div style="text-align:center;color:#44ff44;font-size:18px;margin:12px 0;">${fishData.icon} 钓到了【${fishName}】！</div>`;
    html+=`<div style="text-align:center;color:#ffcc44;margin-bottom:16px;">价值: ${fishData.value} 金币</div>`;
  }else{
    html+='<div style="text-align:center;color:#ff6644;font-size:18px;margin:12px 0;">🐟 鱼跑了...</div>';
    html+='<div style="text-align:center;color:#aaa;margin-bottom:16px;">下次一定能钓到！</div>';
  }
  html+=`<div style="font-size:12px;color:#aaa;text-align:center;margin-bottom:12px;">剩余次数: ${fishingState.maxAttempts-fishingState.attempts}/${fishingState.maxAttempts}</div>`;
  html+=`<button class="btn btn-primary" style="width:100%;" onclick="nextFishingAttempt()">🎣 继续钓鱼</button>`;
  html+=`<button class="btn btn-danger" style="width:100%;margin-top:4px;" onclick="endFishing()">🏃 不钓了</button>`;
  actionPanel.innerHTML=html;
}

function endFishing(){
  if(fishingState.animId){clearInterval(fishingState.animId);fishingState.animId=null;}
  fishingState.active=false;
  renderFishing();
}

function sellFish(idx){

  addLog(`💰 出售【${fish.icon} ${fish.name}】，获得 ${fish.value} 金币！`,'log-loot');
