    star.style.height = size + 'px';
    star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
    star.style.setProperty('--delay', Math.random() * 3 + 's');
    container.appendChild(star);
  }
}

// ========== 标签切换 ==========
let currentTab = 'upgrades';
function switchTab(tabName) {
  currentTab = tabName;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
  document.getElementById('panel-' + tabName).classList.add('active');
  if (tabName === 'upgrades') { renderUpgrades(); updateBuyAllButton(); }
  if (tabName === 'daily') renderDailyQuests();
  if (tabName === 'prestige') renderPrestige();
  if (tabName === 'achievements') renderAchievements();
  if (tabName === 'stats') renderStats();
}

// ========== 游戏主循环 ==========
let lastTick = Date.now();
function gameLoop() {
  const now = Date.now();
  let dt = Math.min((now - lastTick) / 1000, 1);
  // 时间扭曲事件：游戏速度翻倍
  if (game.eventActive && game.eventType && game.eventType.timeWarp) {
    dt *= 2;
  }
  lastTick = now;

  // 事件系统
  const eventCooldownMin = getEventCooldownMin();
  const eventCooldownMax = getEventCooldownMax();

  if (game.eventActive && game.eventType) {
    game.eventTimer -= dt;
    if (game.eventTimer <= 0) {
      game.eventActive = false;
      game.eventType = null;
      game.eventTimer = 0;
      game.eventCooldown = eventCooldownMin + Math.random() * (eventCooldownMax - eventCooldownMin);
    }
    updateEventBar();
  } else if (!game.eventActive) {
    game.eventCooldown -= dt;
    if (game.eventCooldown <= 0) {
      triggerRandomEvent();
      game.eventCooldown = eventCooldownMin + Math.random() * (eventCooldownMax - eventCooldownMin);
    }
  }

  // 金色数字刷新
  updateGoldenNumber(dt);

  // 自动点击器
  updateAutoClicker(dt);

  // 自动购买
  autoBuyTick();

  // 自动产出
  const eventBonus = getEventMultiplier();
  let autoGen = getEffectiveAutoPerSec() * eventBonus.speed * dt;
  // 闲置增殖升级
  const idleLevel = game.upgrades['idle1'] || 0;
  if (idleLevel > 0 && game.idleTime > 5) {
    autoGen *= (1 + idleLevel * 0.2);
  }

  // 挑战系统
  updateChallenge(dt, autoGen);
  if (autoGen > 0) {
    game.numbers += autoGen;
    game.totalGenerated += autoGen;
  }

  // 数字瀑布特效
  spawnWaterfall(autoGen, dt);

  // 每日任务进度
  updateDailyQuests(dt);

  // 游戏时间
  game.playTime += dt;
  if (game.lastClickTime > 0) {
    game.idleTime = now / 1000 - game.lastClickTime;
  }

  // 每0.5秒更新一次UI
  if (Math.floor(now / 500) !== Math.floor((now - dt * 1000) / 500)) {
    updateDisplay();
    updateUpgradeStates();
    checkAchievements();
    checkMilestones();
    if (currentTab === 'prestige') renderPrestige();
    if (currentTab === 'stats') renderStats();
    updateEventBar();
    updateIdleIndicator();
    updateVelocityIndicator();
    renderDailyQuests();
    updateDailyTabBadge();
  }

  // 每10秒存档
  if (now - game.lastSaveTime > 10000) {
    saveGame();
  }

  requestAnimationFrame(gameLoop);
}

// ========== 金色数字 ==========
function spawnGoldenNumber() {
  if (document.querySelector('.golden-number')) return;
  const gn = document.createElement('div');
  gn.className = 'golden-number';
  gn.textContent = '✨ ' + formatNumber(Math.floor(game.numbers * (0.5 + Math.random() * 1.5))) + ' ✨';
  gn.style.left = (10 + Math.random() * 70) + '%';
  gn.style.top = (15 + Math.random() * 65) + '%';
  gn.dataset.value = Math.floor(game.numbers * (0.5 + Math.random() * 1.5) * getEffectiveClickPower() * 5 * Math.pow(2, game.prestigeUpgrades['p_goldenM'] || 0));
  gn.addEventListener('click', (e) => {
    e.stopPropagation();
    const val = parseFloat(gn.dataset.value) || game.numbers * 5;
    game.numbers += val;
    game.totalGenerated += val;
    // 每日任务追踪
    if (game.dailyQuestProgress) {
      game.dailyQuestProgress.golden = (game.dailyQuestProgress.golden || 0) + 1;
      game.dailyQuestProgress.goldenTotal = (game.dailyQuestProgress.goldenTotal || 0) + 1;
    }
    sfxGolden();
    spawnFloatNumberRaw(gn, '+' + formatNumber(Math.floor(val)), true);
    gn.remove();
    updateDisplay();
    saveGame();
  });
  document.body.appendChild(gn);
  // 10秒后消失
  setTimeout(() => { if (gn.parentNode) { gn.style.animation = 'goldenFadeOut 0.5s ease-in forwards'; setTimeout(() => gn.remove(), 500); } }, 10000);
}
function updateGoldenNumber(dt) {
  if (game.numbers < 100) return;
  game.goldenTimer = (game.goldenTimer || 0) - dt;
  if (game.goldenTimer <= 0 && !document.querySelector('.golden-number')) {
    spawnGoldenNumber();
    const pGolden = game.prestigeUpgrades['p_golden'] || 0;
    game.goldenTimer = (25 + Math.random() * 35) / (1 + pGolden * 0.25);
  }
}
function spawnFloatNumberRaw(el, text, special) {
  const fe = document.createElement('div');
  fe.className = 'float-number' + (special ? ' crit' : '');
  fe.textContent = text;
  const rect = el.getBoundingClientRect();
  fe.style.left = (rect.left + rect.width / 2) + 'px';
  fe.style.top = rect.top + 'px';
  document.getElementById('floatLayer').appendChild(fe);
  setTimeout(() => fe.remove(), 800);
}

// ========== 自动点击器 ==========
let autoClickTimer = 0;
function updateAutoClicker(dt) {
  const autoClickLevel = game.upgrades['autoclick'] || 0;
  if (autoClickLevel <= 0) return;
  autoClickTimer += dt;
  const interval = Math.max(0.5, 5 - autoClickLevel * 0.4);
  if (autoClickTimer >= interval) {
    autoClickTimer -= interval;
    let power = getEffectiveClickPower() * 0.5;
    const event = getEventMultiplier();
    if (Math.random() * 100 < game.critChance) {
      power *= getEffectiveCritMultiplier();
      game.totalCrits++;
    }
    power *= event.mult;
    const luckChance = game.luckChance + event.luck;
    if (Math.random() * 100 < luckChance) {
      power *= (event.luck > 0 ? event.luckMult : game.luckMultiplier);
    }
    game.numbers += power;
    game.totalGenerated += power;
    game.totalClicks++;
  }
}

// ========== 闲置奖励 ==========
function getIdleBonus() {
  if (game.idleTime < 10) return 1;
  const pIdle = game.prestigeUpgrades['p_idle'] || 0;
  return Math.min(10 + pIdle * 2, 1 + Math.floor(game.idleTime / 10) * (0.5 + pIdle * 0.3));
}
function updateIdleIndicator() {
  const el = document.getElementById('idleIndicator');
  if (!el) return;
  const bonus = getIdleBonus();
  if (bonus > 1) {
    el.textContent = '💤 闲置奖励 x' + bonus.toFixed(1) + ' (下次点击生效)';
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

// ========== 速度指示器 ==========
let lastNumbersForVelocity = 0;
let velocityDirection = 'stable';
function updateVelocityIndicator() {
  const el = document.getElementById('velocityIndicator');
  if (!el) return;
  const diff = game.numbers - lastNumbersForVelocity;
  if (diff > 0.01) {
    el.textContent = '📈 增长加速中';
    el.className = 'velocity-indicator up';
    velocityDirection = 'up';
  } else if (diff < -0.01) {
    el.textContent = '';
    el.className = 'velocity-indicator stable';
  } else {
    el.textContent = '';
    el.className = 'velocity-indicator stable';
  }
  lastNumbersForVelocity = game.numbers;
}

// ========== 数字瀑布特效 ==========
let waterfallTimer = 0;
function spawnWaterfall(autoGen, dt) {
  waterfallTimer += dt;
  const rate = Math.min(getEffectiveAutoPerSec() / 100, 3); // 每秒最多3个
  if (rate <= 0.1) return;
  const interval = 1 / rate;
  while (waterfallTimer >= interval) {
    waterfallTimer -= interval;
    const digit = document.createElement('div');
    digit.className = 'digit-fall';
    digit.textContent = '+' + formatNumber(getEffectiveAutoPerSec() * 0.5);
    digit.style.left = (5 + Math.random() * 90) + '%';
    digit.style.setProperty('--dur', (2 + Math.random() * 3) + 's');
    digit.style.setProperty('--rot', (Math.random() * 60 - 30) + 'deg');
    digit.style.color = ['#6ec6ff','#c44dff','#ff6b9d','#00ff88'][Math.floor(Math.random()*4)];
    document.body.appendChild(digit);
    setTimeout(() => digit.remove(), 5000);
  }
}

// ========== 升级购买反馈 ==========
function showUpgradeToast(name, level) {
  const existing = document.querySelector('.upgrade-toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'upgrade-toast';
  toast.textContent = '✅ ' + name + ' → Lv.' + level;
  document.body.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 1200);
}

// ========== 每日任务 ==========
const dailyQuestPool = [
  { id: 'click_q',   name: '勤劳点击',   desc: '点击 {target} 次',          type: 'clicks',    getTarget(lvl){ return 50 + lvl * 50; },   reward(lvl){ return 500 + lvl * 500; } },
  { id: 'earn_q',    name: '数字收集',   desc: '累计获得 {target} 数字',    type: 'earn',      getTarget(lvl){ return 500 + lvl * 1000; }, reward(lvl){ return 300 + lvl * 500; } },
  { id: 'upgrade_q', name: '升级达人',   desc: '购买 {target} 次升级',      type: 'upgrades',  getTarget(lvl){ return 3 + lvl * 2; },     reward(lvl){ return 800 + lvl * 800; } },
  { id: 'combo_q',   name: '连击挑战',   desc: '达到 {target} 连击',        type: 'combo',     getTarget(lvl){ return 8 + lvl * 3; },     reward(lvl){ return 400 + lvl * 600; } },
  { id: 'crit_q',    name: '暴击达人',   desc: '触发 {target} 次暴击',      type: 'crits',     getTarget(lvl){ return 10 + lvl * 10; },   reward(lvl){ return 600 + lvl * 600; } },
  { id: 'golden_q',  name: '金色收割者', desc: '收集 {target} 个金色数字',  type: 'golden',    getTarget(lvl){ return 1 + lvl; },          reward(lvl){ return 5000 + lvl * 3000; } },
];

function generateDailyQuests() {
  const today = new Date().toDateString();
  if (game.dailyQuestDate === today && game.dailyQuests && game.dailyQuests.length > 0) return;
  game.dailyQuestDate = today;
  const pool = [...dailyQuestPool];
  // 随机选3个
  const quests = [];
  for (let i = 0; i < 3 && pool.length > 0; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    quests.push(pool.splice(idx, 1)[0]);
  }
  game.dailyQuests = quests.map(q => {
    const lvl = game.prestigeCount;
    const target = q.getTarget(lvl);
    return { id: q.id, name: q.name, desc: q.desc.replace('{target}', formatNumber(target)), type: q.type, target, reward: q.reward(lvl), progress: 0, claimed: false };
  });
  const savedGT = game.dailyQuestProgress ? game.dailyQuestProgress.goldenTotal || 0 : 0;
  game.dailyQuestProgress = { clicks: 0, earn: 0, upgrades: 0, combo: 0, crits: 0, golden: 0, goldenTotal: savedGT };
  saveGame();
}

function updateDailyQuests(dt) {
  generateDailyQuests();
  if (!game.dailyQuests) return;
  let changed = false;
  const progress = game.dailyQuestProgress || {};
  game.dailyQuests.forEach(q => {
    if (q.claimed) return;
    let val = 0;
    if (q.type === 'clicks') val = progress.clicks || 0;
    else if (q.type === 'earn') val = Math.floor(game.totalGenerated);
    else if (q.type === 'upgrades') val = progress.upgrades || 0;
    else if (q.type === 'combo') val = Math.max(progress.combo || 0, game.combo);
    else if (q.type === 'crits') val = progress.crits || 0;
    else if (q.type === 'golden') val = progress.golden || 0;

    if (val !== q.progress) {
      q.progress = Math.min(val, q.target);
      changed = true;
    }
  });
  if (changed) saveGame();
}

function claimDailyQuest(index) {
  if (!game.dailyQuests || index >= game.dailyQuests.length) return;
  const q = game.dailyQuests[index];
  if (q.claimed || q.progress < q.target) return;
  q.claimed = true;
  game.numbers += q.reward;
  game.totalGenerated += q.reward;
  updateDisplay();
  saveGame();
}

function updateDailyTabBadge() {
  const tab = document.querySelector('[data-tab="daily"]');
  if (!tab || !game.dailyQuests) return;
  const completable = game.dailyQuests.filter(q => !q.claimed && q.progress >= q.target).length;
  if (completable > 0) {
    tab.textContent = '每日 (' + completable + ')';
    tab.style.color = '#6ec6ff';
  } else {
    tab.textContent = '每日';
    tab.style.color = '';
  }
}

function renderDailyQuests() {
  const panel = document.getElementById('panel-daily');
  if (!panel || !panel.classList.contains('active')) return;
  generateDailyQuests();
  if (!game.dailyQuests) return;
  panel.innerHTML = '<div class="section-title">📋 每日任务</div>' + game.dailyQuests.map((q, i) => {
    const done = q.progress >= q.target;
    const claimed = q.claimed;
    let cls = 'quest-card';
    if (claimed) cls += ' claimed';
    else if (done) cls += ' completable';
    const progressPct = Math.min(100, (q.progress / q.target) * 100);
    return `<div class="quest-card ${cls}" data-qidx="${i}">
      <div class="quest-info">
        <div class="quest-name">${q.name}</div>
        <div class="quest-desc">${q.desc}</div>
        <div class="quest-progress-bar"><div class="quest-progress-fill" style="width:${progressPct}%"></div></div>
        <div class="quest-progress-text">${formatNumber(q.progress)} / ${formatNumber(q.target)}</div>
      </div>
      <div class="quest-reward">
        ${claimed ? '<span class="quest-done">✅</span>' : (done ? '<button class="quest-claim-btn">领取 +' + formatNumber(q.reward) + '</button>' : '<span class="quest-pending">+' + formatNumber(q.reward) + '</span>')}
      </div>
    </div>`;
  }).join('');

  // 绑定领取按钮
  panel.querySelectorAll('.quest-claim-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.closest('.quest-card').dataset.qidx);
      claimDailyQuest(idx);
    });
  });
}

// ========== 主题系统 ==========
const themes = [
  { id: 'default', name: '暗夜紫',   colors: { bg:'#0a0a1a',display:'#111133',border:'#2a2a5a',accent:'#c44dff',clickBg:'#222244',cardBg:'#111133' } },
  { id: 'ocean',   name: '深海蓝',   colors: { bg:'#0a1628',display:'#0d2137',border:'#1a4a6a',accent:'#4da6ff',clickBg:'#1a2a44',cardBg:'#0d2137' }, unlock: { prestigeCount: 1 } },
  { id: 'forest',  name: '翡翠绿',   colors: { bg:'#0a1a0f',display:'#0d280d',border:'#1a5a2a',accent:'#4dff6e',clickBg:'#1a331a',cardBg:'#0d280d' }, unlock: { prestigeCount: 3 } },
  { id: 'sunset',  name: '日落橙',   colors: { bg:'#1a0f0a',display:'#28150d',border:'#5a2a1a',accent:'#ff8c4d',clickBg:'#331a1a',cardBg:'#28150d' }, unlock: { prestigeCount: 5 } },
  { id: 'cyber',   name: '赛博朋克', colors: { bg:'#0a0a0a',display:'#111a11',border:'#1a5a3a',accent:'#00ff88',clickBg:'#1a221a',cardBg:'#111a11' }, unlock: { totalClicks: 10000 } },
];

function applyTheme(id) {
  const t = themes.find(t => t.id === id) || themes[0];
  game.theme = id;
  const c = t.colors;
  document.body.style.background = c.bg;
  document.querySelectorAll('.display-area').forEach(el => { el.style.background = 'linear-gradient(145deg,' + c.display + ',' + c.bg + ')'; el.style.borderColor = c.border; });
  document.querySelectorAll('.upgrade-card').forEach(el => { el.style.background = c.cardBg; });
  document.querySelectorAll('.prestige-card').forEach(el => { el.style.background = c.cardBg; });
  document.querySelectorAll('.click-button').forEach(el => { el.style.background = c.clickBg; });
  renderThemeSelector();
  saveGame();
}

function isThemeUnlocked(t) {
  if (!t.unlock) return true;
  for (const [key, val] of Object.entries(t.unlock)) {
    if ((game[key] || 0) < val) return false;
  }
  return true;
}

function renderThemeSelector() {
  const sel = document.getElementById('themeSelector');
  if (!sel) return;
  sel.innerHTML = '';
  themes.forEach(t => {
    const dot = document.createElement('div');
    dot.className = 'theme-dot';
    dot.title = t.name + (isThemeUnlocked(t) ? '' : ' (锁定)');
    dot.style.background = 'linear-gradient(135deg,' + t.colors.accent + ',' + t.colors.bg + ')';
    if (t.id === game.theme) dot.classList.add('active');
    if (!isThemeUnlocked(t)) dot.classList.add('locked');
    else dot.addEventListener('click', () => applyTheme(t.id));
    sel.appendChild(dot);
  });
}

// ========== 初始化 ==========
function init() {
  createStars();
  initUpgrades();
  initAchievements();
  initPrestigeUpgrades();
  loadGame();

  // 兼容旧数据
  if (!game.idleTime) game.idleTime = 0;
  if (!game.goldenTimer) game.goldenTimer = 20;
  if (!game.dailyQuestProgress) game.dailyQuestProgress = { clicks: 0, earn: 0, upgrades: 0, combo: 0, crits: 0, golden: 0, goldenTotal: 0 };
  if (!game.autoBuy) game.autoBuy = false;
  if (!game.theme) game.theme = 'default';
  if (game.soundEnabled === undefined) game.soundEnabled = true;
  if (!game.prestigeBestRun) game.prestigeBestRun = 0;
  if (!game.prestigeFastest) game.prestigeFastest = 0;
  if (!game.totalEvents) game.totalEvents = 0;
  if (!game.prestigeHistory) game.prestigeHistory = [];
  if (!game.bestCombo) game.bestCombo = 0;
  if (!game.challengesCompleted) game.challengesCompleted = 0;
  if (!game.challengesFailed) game.challengesFailed = 0;

  recalcAllEffects();
  renderUpgrades();
  renderAchievements();
  renderStats();
  updateDisplay();
  updateBuyAllButton();
  generateDailyQuests();
  renderThemeSelector();
  applyTheme(game.theme);

  // 初始化事件冷却
  if (!game.eventCooldown || game.eventCooldown <= 0) {
    game.eventCooldown = getEventCooldownMin() + Math.random() * (getEventCooldownMax() - getEventCooldownMin());
  }

  // 点击处理
  const clickBtn = document.getElementById('clickBtn');
  clickBtn.addEventListener('click', doClick);
  clickBtn.addEventListener('touchstart', (e) => { e.preventDefault(); doClick(e); });
  // 涟漪效果
  clickBtn.addEventListener('click', function(e) {
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
    this.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  });

  // 升级面板事件委托
  document.getElementById('upgradeList').addEventListener('click', handleUpgradeClick);

  // 全部购买
  document.getElementById('buyAllBtn').addEventListener('click', buyAllAffordable);

  // 转生
  document.getElementById('prestigeBtn').addEventListener('click', doPrestige);

  // 重置
  document.getElementById('resetBtn').addEventListener('click', resetGame);
  document.getElementById('exportBtn').addEventListener('click', exportSave);
  document.getElementById('importBtn').addEventListener('click', importSave);

  // 标签切换
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
  });

  // 移动端滑动手势切换标签
  let touchStartX = 0;
  let touchStartY = 0;
  const tabOrderKeys = ['upgrades', 'daily', 'prestige', 'achievements', 'stats'];
  document.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
    const idx = tabOrderKeys.indexOf(currentTab);
    if (dx < 0 && idx < tabOrderKeys.length - 1) {
      switchTab(tabOrderKeys[idx + 1]);
    } else if (dx > 0 && idx > 0) {
      switchTab(tabOrderKeys[idx - 1]);
    }
  });

  // 键盘快捷键
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      doClick({ clientX: window.innerWidth/2, clientY: window.innerHeight/2 });
    } else if (e.code === 'Digit1') switchTab(tabOrderKeys[0]);
    else if (e.code === 'Digit2') switchTab(tabOrderKeys[1]);
    else if (e.code === 'Digit3') switchTab(tabOrderKeys[2]);
    else if (e.code === 'Digit4') switchTab(tabOrderKeys[3]);
    else if (e.code === 'Digit5') switchTab(tabOrderKeys[4]);
    else if (e.code === 'KeyB' && e.ctrlKey) {
      e.preventDefault();
      toggleAutoBuy();
    }
    else if (e.code === 'KeyM') {
      game.soundEnabled = !game.soundEnabled;
      showUpgradeToast(game.soundEnabled ? '音效: 开' : '音效: 关', '');
    }
    else if (e.code === 'KeyN') {
      game.scientificNotation = !game.scientificNotation;
      showUpgradeToast(game.scientificNotation ? '科学计数法: 开' : '科学计数法: 关', '');
    }
  });

  // 自动购买按钮
  addAutoBuyToggle();

  lastTick = Date.now();
  requestAnimationFrame(gameLoop);
}

init();
</script>
